<link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
<style>
  :root { --font-serif: "Georgia", serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: var(--font-serif); }
  canvas { display: block; cursor: crosshair; }

  /* Loading Screen Styles */
  #loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000; /* Ensure it's on top of the canvas */
    transition: opacity 1s ease-out; /* For fade out effect */
  }

  #loading-screen.hidden {
    opacity: 0;
    pointer-events: none; /* Allow clicks through once hidden */
  }

  #loading-indicator {
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-left-color: #00f;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
    box-shadow: 0 0 10px #00f;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Spell UI */
  #spell-bar {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
    align-items: center;
  }

  .orb { width: 110px; height: 110px; cursor: pointer; flex-shrink: 0; }
  .orb svg { width: 100%; height: 100%; display: block; }

  .spell-icon {
    width: 60px;
    height: 60px;
    background: rgba(0, 0, 0, 0.7);
    border: 2px solid #444;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #888;
    font-family: 'Metamorphous', cursive;
    font-size: 1.2em;
    transition: all 0.2s ease;
    pointer-events: auto;
  }

  .spell-icon.active {
    border-color: #00f;
    color: #fff;
    box-shadow: 0 0 15px rgba(0, 100, 255, 0.6);
    background: rgba(0, 20, 50, 0.8);
    transform: scale(1.1);
  }

  .spell-icon:hover {
    border-color: #08f;
    color: #fff;
    box-shadow: 0 0 18px rgba(0, 150, 255, 0.7);
    background: rgba(0, 30, 60, 0.85);
    transform: scale(1.08);
    cursor: pointer;
  }

  #spell-tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #4488cc;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'Metamorphous', cursive;
    color: #ccc;
    font-size: 0.85em;
    opacity: 0;
    transition: opacity 0.15s ease;
    white-space: nowrap;
  }
  #spell-tooltip.visible { opacity: 1; }
  #spell-tooltip .tt-name { color: #fff; font-size: 1.2em; margin-bottom: 2px; }
  #spell-tooltip .tt-stat { color: #aaa; font-size: 0.9em; }

  /* Return to Overworld Button */
  #return-overworld-container {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
  }
  #return-overworld-btn {
    padding: 10px 20px;
    font-size: 1.1em;
    font-family: 'Metamorphous', cursive;
    background-color: rgba(0, 0, 0, 0.6);
    border: 2px solid #00f;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 0, 255, 0.4);
    transition: all 0.3s ease;
  }
  #return-overworld-btn:hover {
    background-color: rgba(0, 0, 255, 0.3);
    box-shadow: 0 0 15px rgba(0, 0, 255, 0.8);
    transform: scale(1.05);
  }

  /* Biome Dropdown */
  #biome-select-container {
    position: fixed;
    top: 70px;
    left: 20px;
    z-index: 100;
  }
  #biome-select {
    padding: 8px 14px;
    font-size: 1em;
    font-family: 'Metamorphous', cursive;
    background-color: rgba(0, 0, 0, 0.6);
    border: 2px solid #00f;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 0, 255, 0.4);
    transition: all 0.3s ease;

  #biome-select:hover {
    background-color: rgba(0, 0, 255, 0.3);
    box-shadow: 0 0 15px rgba(0, 0, 255, 0.8);
  }
  #biome-select option {
    background-color: #111;
    color: white;
  }
  /* Dialogue Overlay */
  #dialogue-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: none; justify-content: center;
    align-items: center; z-index: 200; font-family: 'Metamorphous', cursive;
  }
  #dialogue-box {
    background: rgba(10,10,20,0.95); border: 2px solid #4488cc;
    border-radius: 12px; padding: 28px 36px; max-width: 560px;
    width: 90%; box-shadow: 0 0 30px rgba(0,100,255,0.3);
  }
  #dialogue-name {
    color: #88bbff; font-size: 1.3em; margin-bottom: 12px;
    border-bottom: 1px solid #335577; padding-bottom: 8px;
  }
  #dialogue-text {
    color: #ddd; font-size: 1.1em; line-height: 1.5; margin-bottom: 20px;
    min-height: 60px;
  }
  #dialogue-options {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end;
  }
  .dialogue-btn {
    padding: 10px 24px; font-family: 'Metamorphous', cursive; font-size: 1em;
    background: rgba(0,0,0,0.6); border: 2px solid #4488cc; color: #ccc;
    border-radius: 6px; cursor: pointer; transition: all 0.2s ease;
  }
  .dialogue-btn:hover {
    background: rgba(0,60,120,0.5); border-color: #66aaff; color: #fff;
    box-shadow: 0 0 12px rgba(0,100,255,0.5);
  }
  /* Quest HUD */
  #quest-hud {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(0,0,0,0.7); border: 2px solid #666;
    border-radius: 8px; padding: 12px 20px; color: #ddaa44;
    font-family: 'Metamorphous', cursive; font-size: 1.1em;
    box-shadow: 0 0 12px rgba(0,0,0,0.5); pointer-events: none;
    display: none;
  }
  #quest-hud.completed {
    text-decoration: line-through; color: #66dd88;
    border-color: #66dd88; box-shadow: 0 0 12px rgba(100,220,130,0.3);
  }

  #orb-tooltip {
    position: fixed; pointer-events: none; z-index: 200;
    background: rgba(0,0,0,0.85); border: 1px solid #4488cc;
    border-radius: 6px; padding: 6px 12px;
    font-family: 'Metamorphous', cursive; color: #ccc;
    font-size: 0.85em; opacity: 0; transition: opacity 0.15s ease;
    white-space: nowrap;
  }
  #orb-tooltip.visible { opacity: 1; }
</style>

let envAccum = 0;
function updateEnvironment(dt) {
  gameTime = (gameTime + dt / 60) % 24;
  const dayAngle = ((gameTime - 6) / 24) * Math.PI * 2;
  const sunUp = Math.sin(dayAngle);
  const dusk = Math.max(0, 1 - Math.abs(sunUp) * 5);
  
  const sunDist = 15000;
  // Offset light positions to follow player so shadow camera tracks the player
  sun.position.set(playerPos.x + Math.cos(dayAngle)*sunDist, Math.sin(dayAngle)*sunDist, playerPos.z);
  sun.target.position.copy(playerPos);
  sun.shadow.camera.left = playerPos.x - 200;
  sun.shadow.camera.right = playerPos.x + 200;
  sun.shadow.camera.top = playerPos.z + 200;
  sun.shadow.camera.bottom = playerPos.z - 200;
  sun.shadow.camera.updateProjectionMatrix();
  sunVisual.position.set(Math.cos(dayAngle)*sunDist, Math.sin(dayAngle)*sunDist, 0);
  moon.position.set(playerPos.x + Math.cos(dayAngle + Math.PI)*sunDist, Math.sin(dayAngle + Math.PI)*sunDist, playerPos.z);

  const b = currentBiome;
  sun.intensity = Math.max(0, sunUp) * b.sunIntensity;
  moon.intensity = Math.max(0, -sunUp) * b.moonIntensity;
  ambient.intensity = b.ambientIntensityBase + Math.max(0, sunUp) * 0.5;
  hemiLight.intensity = b.hemiIntensityBase + Math.max(0, sunUp) * 0.5;
  stars.material.opacity = Math.max(0, -sunUp);

  const skyCol = new THREE.Color(b.skyNight).lerp(new THREE.Color(b.skyDay), Math.max(0, sunUp));
  if(Math.abs(sunUp) < 0.2) skyCol.lerp(new THREE.Color(b.skyDusk), 1 - Math.abs(sunUp)*5);
  scene.background = skyCol;
  // throttle very cheap visual updates that don't need to run every frame
  envAccum += dt;
  if (envAccum >= 0.05) {
    stars.rotation.y += envAccum * 0.005;
    envAccum = 0;
  }
}

const RUIN_CHECK_DIST = 30; // Max distance for a goblin to consider colliding with a ruin
function checkRuinCollision(pos, radius) {
  for (const r of ruins) {
    const distToCenter = pos.distanceTo(r.pos);
    // Only do detailed part collision if goblin is near the ruin center
    if (distToCenter < RUIN_CHECK_DIST) {
      for (const p of r.parts) {
        const d = pos.distanceTo(p.world);
        const minDist = p.rad + radius;
        if (d < minDist) {
          const push = new THREE.Vector3().subVectors(pos, p.world).setY(0);
          const up = new THREE.Vector3(0, 1, 0);
          // Ensure push vector has some length before normalizing
          if (push.lengthSq() > 0.0001) push.projectOnPlane(up).normalize();
          pos.addScaledVector(push, minDist - d);
        }
      }
    }
  }
}
function makeCastleRuin(spawnPos, parentGroup) {
  const h = getH(spawnPos);
  const stoneM = new THREE.MeshLambertMaterial({color:0x555555});
  const ruinCenter = new THREE.Vector3(spawnPos.x, h, spawnPos.z);
  const radius = 14, walls = 22, rData = { pos: ruinCenter.clone(), parts: [], parentChunkGroup: parentGroup };

  function place(lx, lz, geo, rotY, collRad=0){
    const itemX = ruinCenter.x + lx, itemZ = ruinCenter.z + lz;
    const ph = getH({x: itemX, z: itemZ});
    const itemSurface = new THREE.Vector3(itemX, ph, itemZ);
    const mesh = new THREE.Mesh(geo, stoneM);
    mesh.castShadow = true;
    mesh.position.copy(itemSurface);
    const halfHeight = (geo && geo.parameters && geo.parameters.height) ? (geo.parameters.height / 2) : 0;
    mesh.position.y += halfHeight;
    mesh.rotation.y = rotY;
    parentGroup.add(mesh);
    staticObjects.push(mesh);
    if(collRad > 0) rData.parts.push({ world: itemSurface.clone(), rad: collRad, mesh: mesh });
    return mesh;
  }
  
  for(let i=0; i<walls; i++){
    const ang = (i/walls) * Math.PI * 2;
    const lx = Math.sin(ang)*radius, lz = Math.cos(ang)*radius;
    if(Math.random() > 0.3){
      const wh = 2 + Math.random() * 7;
      place(lx, lz, new THREE.BoxGeometry(5, wh, 2), ang, 2.8);
      if(Math.random() > 0.6){
        const dx = Math.sin(ang)*(radius+4), dz = Math.cos(ang)*(radius+4);
        const m = place(dx, dz, new THREE.BoxGeometry(0.8, 0.8, 0.8), 0, 0);
        m.rotation.set(Math.random(), Math.random(), Math.random());
      }
    }
  }
  
  for(let i=0; i<4; i++){
    const ang = i * (Math.PI/2);
    const lx = Math.sin(ang)*radius, lz = Math.cos(ang)*radius, th = 9 + Math.random() * 6;
    place(lx, lz, new THREE.CylinderGeometry(2.5, 3, th, 8), 0, 3.5);
  }

  const kh = 14 + Math.random() * 8;
  place(0, 0, new THREE.BoxGeometry(7, kh, 7), 0, 5.5);
  ruins.push(rData);
  return rData;
}

function updateTreeDebris(dt) {
  for (let i = treeDebris.length - 1; i >= 0; i--) {
    const d = treeDebris[i];
    d.life += dt;
    if (d.life < 1.2) {
      d.vel.y -= 18 * dt;
      d.pos.addScaledVector(d.vel, dt);
      d.group.position.copy(d.pos);
      d.group.rotation.x += d.rot.x * dt;
      d.group.rotation.y += d.rot.y * dt;
      d.group.rotation.z += d.rot.z * dt;
    }
    if (d.life > d.maxLife - 0.8) {
      const f = Math.max(0, (d.maxLife - d.life) / 0.8);
      d.group.traverse(c => { if (c.isMesh) { c.material.transparent = true; c.material.opacity = f; } });
    }
    if (d.life >= d.maxLife) { scene.remove(d.group); treeDebris.splice(i, 1); }
  }
}

function createChunk(cx, cz) {
  const group = new THREE.Group();
  const xOffset = cx * CHUNK_SIZE;
  const zOffset = cz * CHUNK_SIZE;
  const chunkGoblins = [];
  const chunkTrolls = [];
  const chunkWretches = [];
  const chunkHusks = [];
  const chunkZombies = [];
  const chunkRangers = [];
  const chunkIceElementals = [];

  // Deterministic seed for structures
  const seed = Math.abs(Math.sin(cx * 12.9898 + cz * 78.233) * 43758.5453) % 1;

  // For town biome, skip terrain for chunks entirely outside the town
  if (currentBiomeId === 'town') {
    const limit = 1000; // townHalf=800 + one chunk width buffer
    if (Math.abs(cx) * CHUNK_SIZE + CHUNK_SIZE/2 > limit || Math.abs(cz) * CHUNK_SIZE + CHUNK_SIZE/2 > limit) {
      // Still add town-specific content (walls, etc.) but no terrain
      generateTownChunk(group, cx, cz);
      if (group.children.length > 0) {
        scene.add(group);
        return {
          group,
          dispose: () => {
            scene.remove(group);
            group.traverse(c => {
              const si = staticObjects.indexOf(c);
              if (si !== -1) staticObjects.splice(si, 1);
              if (c.isMesh && c.geometry) c.geometry.dispose();
              if (c.isMesh && c.material) c.material.dispose();
            });
          }
        };
      }
      return { group, dispose: () => {} };
    }
  }

  // 1. Terrain
  const tSegs = currentBiomeId === 'town' ? 160 : 80;
  const tGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, tSegs, tSegs);
  tGeo.rotateX(-Math.PI / 2);
  const tp = tGeo.attributes.position;
  const colors = [];
  for(let i=0; i<tp.count; i++) {
    const vx = tp.getX(i) + xOffset;
    const vz = tp.getZ(i) + zOffset;
    const h = getH({x: vx, z: vz});
    tp.setY(i, h);

    const c = new THREE.Color();
    const b = currentBiome;
    if (h > b.snowHeight) c.setHex(b.snowColor);
    else if (h > b.rockHeight) c.setHex(b.rockColor);
    else if (h < 0) c.setHex(b.waterBedColor);
    else if (h < b.dirtHeight) c.setHex(b.dirtColor);
    else c.setHex(b.grassColor);

    colors.push(c.r, c.g, c.b);
  }
  tGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  tGeo.computeVertexNormals();
  const terrainMesh = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({vertexColors: true}));
  terrainMesh.receiveShadow = true;
  terrainMesh.position.set(xOffset, 0, zOffset);
  group.add(terrainMesh);
  staticObjects.push(terrainMesh);

  if (currentBiomeId === 'town') {
    generateTownChunk(group, cx, cz);
    scene.add(group);
    return {
      group,
      dispose: () => {
        scene.remove(group);
        group.traverse(c => {
          const si = staticObjects.indexOf(c);
          if (si !== -1) staticObjects.splice(si, 1);
          if (c.isMesh && c.geometry) c.geometry.dispose();
        });
        for (let i = ruins.length - 1; i >= 0; i--) {
          if (ruins[i].parentChunkGroup === group) ruins.splice(i, 1);
        }
      }
    };
  }

  // 2. Water (One per chunk or one giant shifting plane)
  const waterM = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE), new THREE.MeshLambertMaterial({color: currentBiome.waterColor, transparent: true, opacity: currentBiome.waterOpacity}));
  waterM.rotateX(-Math.PI/2);
  waterM.position.set(xOffset, currentBiome.waterLevel, zOffset);
  group.add(waterM);

  // 3. Path Overlay (high-resolution ribbon, replaces per-vertex path blending)
  if (currentBiome.pathEnabled) {
    const pathVerts = [];
    const pathSegs = 200;
    const halfWidth = 1.5;
    const step = CHUNK_SIZE / pathSegs;
    const startX = xOffset - CHUNK_SIZE/2;
    for (let s = 0; s <= pathSegs; s++) {
      const wx = startX + s * step;
      const wz = Math.sin(wx * 0.01) * 60 + Math.cos(wx * 0.005) * 40;
      if (wz < zOffset - CHUNK_SIZE/2 - 3 || wz > zOffset + CHUNK_SIZE/2 + 3) continue;
      const h = getH({x: wx, z: wz});
      if (h < 0 || h >= 60) continue;
      const lx = wx, lz = wz - halfWidth, rx = wx, rz = wz + halfWidth;
      const lh = getH({x: lx, z: lz}) + 0.05;
      const rh = getH({x: rx, z: rz}) + 0.05;
      pathVerts.push(lx, lh, lz, rx, rh, rz);
    }
    if (pathVerts.length >= 6) {
      const idx = [];
      for (let i = 0; i < pathVerts.length / 6 - 1; i++) {
        const a = i*2, b = i*2+1, c = i*2+2, d = i*2+3;
        idx.push(a, b, c, b, d, c);
      }
      const pGeo = new THREE.BufferGeometry();
      pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pathVerts, 3));
      pGeo.setIndex(idx);
      pGeo.computeVertexNormals();
      const pathMesh = new THREE.Mesh(pGeo, new THREE.MeshLambertMaterial({color: currentBiome.pathColor}));
      pathMesh.receiveShadow = true;
      group.add(pathMesh);
    }
  }

  // 4. Bridges
  let inWater = false;
  if (currentBiome.bridgeEnabled) {
  let waterStart = 0;
  for (let step = -CHUNK_SIZE/2; step <= CHUNK_SIZE/2; step += 5) {
    const wx = xOffset + step;
    const wz = Math.sin(wx * 0.01) * 60 + Math.cos(wx * 0.005) * 40;
    
    const inChunkZ = (wz >= zOffset - CHUNK_SIZE/2 && wz <= zOffset + CHUNK_SIZE/2);
    const h = getH({x: wx, z: wz});
    const isWater = h < 3 && inChunkZ;

    if (isWater && !inWater) {
      inWater = true;
      waterStart = step;
    } else if (inWater && (!isWater || step >= CHUNK_SIZE/2 - 5)) {
      const midStep = (waterStart + step) / 2;
      const bX = xOffset + midStep;
      const bZ = Math.sin(bX * 0.01) * 60 + Math.cos(bX * 0.005) * 40;
      const angle = Math.atan2(Math.sin((bX+1)*0.01)*60+Math.cos((bX+1)*0.005)*40 - bZ, 1);
      makeBridge({x: bX, z: bZ}, group, angle);
      inWater = false;
    }
  }
  } // end bridgeEnabled

  // 5. Structures
  if (cx === 0 && cz === 0) {
    makeTavern({x: 0, z: 0}, group);
  } else if (seed < 0.04) {
    makeCastleRuin({x: xOffset + (seed - 0.02) * 200, z: zOffset + (seed - 0.02) * 200}, group);
  }

  // 6. Trees (Instanced per chunk) — after structures so they don't overlap
  const chunkTrees = [];
  const MAX_TREE_ATTEMPTS = currentBiome.maxTreeAttempts;
  for(let i=0; i<MAX_TREE_ATTEMPTS; i++) {
    const tx = xOffset + (Math.random() - 0.5) * CHUNK_SIZE;
    const tz = zOffset + (Math.random() - 0.5) * CHUNK_SIZE;

    const fNoise = Math.sin(tx * 0.008) * Math.cos(tz * 0.008) + Math.sin(tx * 0.02) * 0.2;
    const densityThreshold = currentBiome.treeDensityThreshold;
    if (Math.random() > (fNoise + densityThreshold)) continue;

    const th = getH({x: tx, z: tz});
    if (th > 3 && th < 30 && (Math.abs(tx) > 40 || Math.abs(tz) > 40)) {
      _tObj.position.set(tx, th, tz);
      _tObj.rotation.y = Math.random() * Math.PI * 2;
      _tObj.scale.setScalar(currentBiome.treeScaleMin + Math.random() * (currentBiome.treeScaleMax - currentBiome.treeScaleMin));
      _tObj.updateMatrix();
      chunkTrees.push(_tObj.matrix.clone());
    }
  }

  treeTemplate.traverse(child => {
    if (child.isMesh && chunkTrees.length > 0) {
      const inst = new THREE.InstancedMesh(child.geometry, child.material, chunkTrees.length);
      inst.castShadow = true;
      inst.userData.isTree = true;
      for (let i = 0; i < chunkTrees.length; i++) {
        inst.setMatrixAt(i, _tMat.copy(chunkTrees[i]).multiply(child.matrix));
      }
      inst.instanceMatrix.needsUpdate = true;
      group.add(inst);
    }
  });

  // 6. Mobs (Spawn only away from center for safety)
  if (Math.abs(cx) > 1 || Math.abs(cz) > 1) {
    const gobCount = Math.floor(seed * currentBiome.goblinCount);
    for(let i=0; i<gobCount; i++) {
      const gx = xOffset + (Math.random() - 0.5) * CHUNK_SIZE;
      const gz = zOffset + (Math.random() - 0.5) * CHUNK_SIZE;
      const gob = spawnGoblin(gx, gz);
      if(gob) chunkGoblins.push(gob);
    }
    if (seed < currentBiome.trollChance) {
      const tr = spawnTroll(xOffset + (Math.random() - 0.5) * 100, zOffset + (Math.random() - 0.5) * 100);
      if(tr) chunkTrolls.push(tr);
    }
    const wCount = currentBiome.wretchCount || 0;
    for(let i=0;i<wCount;i++){const gx=xOffset+(Math.random()-0.5)*CHUNK_SIZE;const gz=zOffset+(Math.random()-0.5)*CHUNK_SIZE;const e=spawnWretch(gx,gz);if(e)chunkWretches.push(e);}
    const hCount = currentBiome.huskCount || 0;
    for(let i=0;i<hCount;i++){const gx=xOffset+(Math.random()-0.5)*CHUNK_SIZE;const gz=zOffset+(Math.random()-0.5)*CHUNK_SIZE;const e=spawnHusk(gx,gz);if(e)chunkHusks.push(e);}
    const zCount = currentBiome.zombieCount || 0;
    for(let i=0;i<zCount;i++){const gx=xOffset+(Math.random()-0.5)*CHUNK_SIZE;const gz=zOffset+(Math.random()-0.5)*CHUNK_SIZE;const e=spawnZombie(gx,gz);if(e)chunkZombies.push(e);}
    const rCount = currentBiome.rangerCount || 0;
    for(let i=0;i<rCount;i++){const gx=xOffset+(Math.random()-0.5)*CHUNK_SIZE;const gz=zOffset+(Math.random()-0.5)*CHUNK_SIZE;const e=spawnRanger(gx,gz);if(e)chunkRangers.push(e);}
    const iCount = currentBiome.iceElementalCount || 0;
    for(let i=0;i<iCount;i++){const gx=xOffset+(Math.random()-0.5)*CHUNK_SIZE;const gz=zOffset+(Math.random()-0.5)*CHUNK_SIZE;const e=spawnIceElemental(gx,gz);if(e)chunkIceElementals.push(e);}
  }

  // Biome-specific decorations
  if (currentBiomeId === 'snow-mountains') {
    const campfireCount = Math.floor(seed * 3);
    for (let i = 0; i < campfireCount; i++) {
      const fx = xOffset + (Math.random() - 0.5) * CHUNK_SIZE;
      const fz = zOffset + (Math.random() - 0.5) * CHUNK_SIZE;
      const fh = Math.max(getH({x: fx, z: fz}), 0);
      if (fh > 5 && fh < 30) {
        const fire = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 0.2, 8), new THREE.MeshLambertMaterial({color: 0x8B4513}));
        fire.position.set(fx, fh, fz); group.add(fire);
        const flames = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.6, 6), new THREE.MeshBasicMaterial({color: 0xff6600, transparent: true, opacity: 0.7}));
        flames.position.set(fx, fh + 0.3, fz); group.add(flames);
        const glow = new THREE.PointLight(0xff6600, 3, 15);
        glow.position.set(fx, fh + 0.5, fz); group.add(glow);
      }
    }
  }

  if (currentBiomeId === 'countryside') {
    const fieldCount = Math.floor(seed * 6) + 2;
    const cropMat = new THREE.MeshLambertMaterial({color: 0x8aac3a});
    const cropGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 4);
    for (let i = 0; i < fieldCount; i++) {
      const fx = xOffset + (Math.random() - 0.5) * CHUNK_SIZE * 0.8;
      const fz = zOffset + (Math.random() - 0.5) * CHUNK_SIZE * 0.8;
      const fh = Math.max(getH({x: fx, z: fz}), 0);
      if (fh < 4) {
        for (let r = 0; r < 20; r++) {
          const crop = new THREE.Mesh(cropGeo, cropMat);
          crop.position.set(fx + (Math.random() - 0.5) * 5, fh, fz + (Math.random() - 0.5) * 5);
          crop.rotation.set(Math.random() * 0.3, Math.random() * Math.PI * 2, 0);
          group.add(crop);
        }
        const barn = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 3), new THREE.MeshLambertMaterial({color: 0x8B4513}));
        barn.position.set(fx + 6, fh + 1.5, fz); group.add(barn);
        const roof = new THREE.Mesh(new THREE.ConeGeometry(2.8, 2, 4), new THREE.MeshLambertMaterial({color: 0xcc5533}));
        roof.position.set(fx + 6, fh + 4, fz); roof.rotation.y = Math.PI/4; group.add(roof);
      }
    }
  }

  if (currentBiomeId === 'port-town') {
    const pierMat = new THREE.MeshLambertMaterial({color: 0x6b4a2a});
    const pierPositions = [];
    for (let px = -300; px <= 300; px += 150) for (let pz = -300; pz <= 300; pz += 150) {
      if (Math.abs(px) < 50 && Math.abs(pz) < 50) continue;
      const ph = Math.max(getH({x: px, z: pz}), 0);
      if (ph < 1) {
        pierPositions.push({x: px, z: pz});
        const deck = new THREE.Mesh(new THREE.BoxGeometry(10, 0.3, 6), pierMat);
        deck.position.set(px, ph + 0.15, pz); group.add(deck); staticObjects.push(deck);
        for (let p = -4; p <= 4; p += 2) {
          const post = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 6), pierMat);
          post.position.set(px + p, ph - 1, pz); group.add(post);
        }
      }
    }
    if (pierPositions.length > 0) {
      const sp = pierPositions[Math.floor(Math.random() * pierPositions.length)];
      const boat = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 2), new THREE.MeshLambertMaterial({color: 0x4a2a0a}));
      boat.position.set(sp.x + 3, Math.max(getH({x: sp.x+3, z: sp.z}), 0) + 0.5, sp.z); group.add(boat);
      const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 6), new THREE.MeshLambertMaterial({color: 0x8B7355}));
      mast.position.set(sp.x + 3, Math.max(getH({x: sp.x+3, z: sp.z}), 0) + 2, sp.z); group.add(mast);
    }
  }

  scene.add(group);

  return {
    group,
    dispose: () => {
      scene.remove(group);
      
      group.traverse(child => {
        const sIdx = staticObjects.indexOf(child);
        if (sIdx !== -1) staticObjects.splice(sIdx, 1);
        if (child.isMesh && child.geometry) child.geometry.dispose();
      });

      // Remove from global ruins tracking
      for(let i = ruins.length - 1; i >= 0; i--) {
        if(ruins[i].parentChunkGroup === group) ruins.splice(i, 1);
      }

      // Remove mobs
      chunkGoblins.forEach(g => {
        const idx = goblins.indexOf(g);
        if (idx !== -1) { scene.remove(g.mesh.group); goblins.splice(idx, 1); }
      });
      chunkTrolls.forEach(t => {
        const idx = trolls.indexOf(t);
        if (idx !== -1) { scene.remove(t.mesh.group); trolls.splice(idx, 1); }
      });

      const cleanupEnemy = (arr, globalArr) => {
        arr.forEach(e => {
          const idx = globalArr.indexOf(e);
          if (idx !== -1) { scene.remove(e.mesh.group); globalArr.splice(idx, 1); }
        });
      };
      cleanupEnemy(chunkWretches, wretches);
      cleanupEnemy(chunkHusks, husks);
      cleanupEnemy(chunkZombies, zombies);
      cleanupEnemy(chunkRangers, rangers);
      cleanupEnemy(chunkIceElementals, iceElementals);
    }
  };
}

function generateTownChunk(group, cx, cz) {
  const townHalf = 800;
  const wx = cx * CHUNK_SIZE;
  const wz = cz * CHUNK_SIZE;
  const chunkMinX = wx - CHUNK_SIZE/2;
  const chunkMaxX = wx + CHUNK_SIZE/2;
  const chunkMinZ = wz - CHUNK_SIZE/2;
  const chunkMaxZ = wz + CHUNK_SIZE/2;
  const outerHalf = townHalf + 80;
  if (chunkMaxX < -outerHalf || chunkMinX > outerHalf || chunkMaxZ < -outerHalf || chunkMinZ > outerHalf) return;

  // Tavern copies around town (center tavern removed — it blocked the fountain area)
  if (cx === 0 && cz === 0) {
    makeTavern({x: 220, z: 220}, group);
    makeTavern({x: -220, z: 220}, group);
    makeTavern({x: 220, z: -220}, group);
    makeTavern({x: -220, z: -220}, group);
  }

  const rng = mulberry32(Math.abs(Math.sin(cx*12.9898+cz*78.233)*43758.5453)%1 * 0xFFFFFFFF);
  const bColors = [0x8B7355,0xA0896B,0x6B4A2A,0x9B8B7A,0x7A6040,0xBA9F7A,0x5C4033,0x8A7A6A];
  const blockSize = 22;
  const margin = 2.5;
  const buildingRects = [];
  const grid = 12;
  const gridOff = (grid - 1) / 2;

  for (let bx = 0; bx < grid; bx++) {
    for (let bz = 0; bz < grid; bz++) {
      const worldX = wx + (bx - gridOff) * blockSize;
      const worldZ = wz + (bz - gridOff) * blockSize;
      if (Math.abs(worldX) > townHalf - margin || Math.abs(worldZ) > townHalf - margin) continue;
      if (cx === 0 && cz === 0 && Math.abs(worldX) < 18 && Math.abs(worldZ) < 18) continue;
      const ed = Math.min(townHalf - Math.abs(worldX), townHalf - Math.abs(worldZ));
      if (ed < 250) continue;
      if (rng() > 0.55) continue;
      const isRes = rng() > 0.3;
      let w, d, h;
      if (isRes) { w = 5 + rng() * 10; d = 5 + rng() * 8; h = 4 + rng() * 6; }
      else { w = 9 + rng() * 12; d = 8 + rng() * 10; h = 5 + rng() * 7; }
      const maxOff = Math.max(0, blockSize - Math.max(w, d) - margin * 2) * 0.15;
      const xx = worldX + (rng() - 0.5) * maxOff * 2;
      const zz = worldZ + (rng() - 0.5) * maxOff * 2;
      const rvx = townRiverX(zz);
      if (Math.abs(xx - rvx) < 35) continue;
      const lkx = -100, lkz = -120;
      if (Math.hypot(xx - lkx, zz - lkz) < 38) continue;
      if (Math.hypot(xx - (-10), zz - (-8)) < 15) continue;
      makeBuilding({
        x: xx, z: zz, w, d, h,
        type: isRes ? 'residential' : 'commercial',
        rot: (rng() - 0.5) * 0.1,
        col: bColors[Math.floor(rng() * bColors.length)]
      }, group);
      buildingRects.push({ x: xx, z: zz, w, d });
    }
  }

  // Shared water material
  const waterMat = new THREE.MeshLambertMaterial({
    color: 0x3a8aba,
    transparent: true,
    opacity: 0.82,
    side: THREE.DoubleSide,
  });

  // River water mesh
  const riverSegs = 40;
  const riverVerts = [];
  const usedSegs = [];
  for (let i = 0; i <= riverSegs; i++) {
    const t = i / riverSegs;
    const rz = -townHalf + t * 2 * townHalf;
    const rvx = townRiverX(rz);
    const hw = 24;
    if (rz < chunkMinZ - 10 || rz > chunkMaxZ + 10) continue;
    usedSegs.push(riverVerts.length / 3);
    riverVerts.push(rvx - hw, -1.5, rz, rvx + hw, -1.5, rz);
  }
  if (usedSegs.length >= 2) {
    const rIdx = [];
    for (let i = 0; i < usedSegs.length - 1; i++) {
      const a = usedSegs[i], b = a + 1;
      const c = usedSegs[i + 1], d = c + 1;
      rIdx.push(a, b, c, b, d, c);
    }
    const rGeo = new THREE.BufferGeometry();
    rGeo.setAttribute('position', new THREE.Float32BufferAttribute(riverVerts, 3));
    rGeo.setIndex(rIdx);
    rGeo.computeVertexNormals();
    const riverMesh = new THREE.Mesh(rGeo, waterMat);
    riverMesh.position.y = 0;
    group.add(riverMesh);
  }

  // Lake water mesh (circular disc, rendered in center chunk)
  if (cx === -1 && cz === -1) {
    const lkR = 38;
    const lakeGeo = new THREE.CircleGeometry(lkR, 28);
    lakeGeo.rotateX(-Math.PI / 2);
    const lakeMesh = new THREE.Mesh(lakeGeo, waterMat);
    lakeMesh.position.set(-100, -0.8, -120);
    lakeMesh.receiveShadow = true;
    group.add(lakeMesh);
  }

  // Bridge at town center river crossing
  if (cx === 0 && cz === 0) {
    const bz = -30;
    const bx = townRiverX(bz);
    const riverDx = townRiverX(bz + 1) - townRiverX(bz - 1);
    const perpAngle = Math.atan2(-riverDx, 2);
    makeBridge({ x: bx, z: bz }, group, -perpAngle);
  }

  // Fountain at town center
  if (cx === 0 && cz === 0) {
    const fStone = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const fTrim = new THREE.MeshLambertMaterial({ color: 0x6a6a6a });
    const fWater = new THREE.MeshLambertMaterial({ color: 0x4488cc, transparent: true, opacity: 0.55 });
    const fx = -10, fz = -8;
    const fh = Math.max(getH({ x: fx, z: fz }), 0);
    // Lower basin
    const basin = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.8, 0.9, 20), fStone);
    basin.position.set(fx, fh + 0.45, fz);
    basin.castShadow = true; basin.receiveShadow = true;
    group.add(basin);
    // Basin rim
    const rim = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.15, 8, 24), fTrim);
    rim.position.set(fx, fh + 0.9, fz);
    rim.rotation.x = Math.PI / 2;
    rim.castShadow = true;
    group.add(rim);
    // Central pillar
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2.8, 10), fStone);
    pillar.position.set(fx, fh + 1.85, fz);
    pillar.castShadow = true;
    group.add(pillar);
    // Upper basin
    const ubasin = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.6, 0.35, 16), fStone);
    ubasin.position.set(fx, fh + 3.2, fz);
    ubasin.castShadow = true;
    group.add(ubasin);
    // Water in lower basin
    const bWater = new THREE.Mesh(new THREE.CylinderGeometry(2.9, 2.9, 0.1, 20), fWater);
    bWater.position.set(fx, fh + 0.95, fz);
    group.add(bWater);
    // Water column
    const wCol = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.9, 6), fWater);
    wCol.position.set(fx, fh + 3.8, fz);
    group.add(wCol);
    // Water splash top
    const splash = new THREE.Mesh(new THREE.SphereGeometry(0.35, 6, 6), fWater);
    splash.position.set(fx, fh + 4.35, fz);
    splash.scale.set(1, 0.3, 1);
    group.add(splash);

    // Town NPC near fountain
    createTownNPC(group);
  }

  // Stone ground for flat town area (grey stippled)
  group.traverse(child => {
    if (!child.isMesh || !child.geometry) return;
    const pos = child.geometry.attributes.position;
    const col = child.geometry.attributes.color;
    if (!pos || !col) return;
    for (let i = 0; i < pos.count; i++) {
      const vx = pos.getX(i) + wx, vz = pos.getZ(i) + wz, vy = pos.getY(i);
      if (vy > 0.5 || vy < -0.5) continue;
      const ax = Math.abs(vx), az = Math.abs(vz);
      if (ax > townHalf - 10 || az > townHalf - 10) continue;
      const rvx = townRiverX(vz);
      if (Math.abs(vx - rvx) < 28) continue;
      const n = Math.sin(vx * 0.5 + vz * 0.7) * 0.06 + Math.sin(vx * 1.1 + vz * 0.9) * 0.03 + Math.sin(vx * 2.3 + vz * 1.7) * 0.015;
      const g = 0.47 + n;
      col.setXYZ(i, g, g, g);
    }
    col.needsUpdate = true;
  });

  // Forest ring around town (trees between buildings and mountains)
  const treePositions = [];
  for (let i = 0; i < 150; i++) {
    const tx = wx + (Math.random() - 0.5) * CHUNK_SIZE;
    const tz = wz + (Math.random() - 0.5) * CHUNK_SIZE;
    const ax = Math.abs(tx), az = Math.abs(tz);
    if (ax > townHalf || az > townHalf) continue;
    const ed = Math.min(townHalf - ax, townHalf - az);
    if (ed < 250 || ed > 400) continue;
    const h = getH({x: tx, z: tz});
    if (h > 1) continue;
    let blocked = false;
    for (const r of buildingRects) {
      if (Math.abs(tx - r.x) < r.w / 2 + 1.5 && Math.abs(tz - r.z) < r.d / 2 + 1.5) { blocked = true; break; }
    }
    if (blocked) continue;
    _tObj.position.set(tx, h, tz);
    _tObj.rotation.y = Math.random() * Math.PI * 2;
    _tObj.scale.setScalar(currentBiome.treeScaleMin + Math.random() * (currentBiome.treeScaleMax - currentBiome.treeScaleMin));
    _tObj.updateMatrix();
    treePositions.push(_tObj.matrix.clone());
  }
  if (treePositions.length > 0) {
    treeTemplate.traverse(child => {
      if (child.isMesh) {
        const inst = new THREE.InstancedMesh(child.geometry, child.material, treePositions.length);
        inst.castShadow = true;
        for (let i = 0; i < treePositions.length; i++) {
          inst.setMatrixAt(i, _tMat.copy(treePositions[i]).multiply(child.matrix));
        }
        inst.instanceMatrix.needsUpdate = true;
        group.add(inst);
      }
    });
  }

  // Town wall at edge chunks (inside mountain zone)
  const wallSegs = [];
  const segW = 8, segH = 5;
  if (cz === 2 || cz === -2) {
    const zw = cz === 2 ? townHalf : -townHalf;
    for (let x = Math.max(chunkMinX, -townHalf); x < Math.min(chunkMaxX, townHalf); x += segW) {
      const gx = x + segW/2;
      if (Math.abs(gx) < 12) continue;
      wallSegs.push({ x: gx, z: zw, w: segW, h: segH, d: 1 });
    }
  }
  if (cx === 2 || cx === -2) {
    const xw = cx === 2 ? townHalf : -townHalf;
    for (let z = Math.max(chunkMinZ, -townHalf); z < Math.min(chunkMaxZ, townHalf); z += segW) {
      const gz = z + segW/2;
      if (Math.abs(gz) < 12) continue;
      wallSegs.push({ x: xw, z: gz, w: 1, h: segH, d: segW });
    }
  }

  if (wallSegs.length > 0) {
    const wGeo = new THREE.BoxGeometry(1,1,1);
    const wDummy = new THREE.Object3D();
    const wInst = new THREE.InstancedMesh(wGeo, new THREE.MeshLambertMaterial({color: 0x8a7a5a}), wallSegs.length);
    for (let i = 0; i < wallSegs.length; i++) {
      const s = wallSegs[i];
      wDummy.position.set(s.x, s.h/2, s.z);
      wDummy.scale.set(s.w, s.h, s.d);
      wDummy.updateMatrix();
      wInst.setMatrixAt(i, wDummy.matrix);
    }
    wInst.instanceMatrix.needsUpdate = true;
    wInst.castShadow = true;
    wInst.receiveShadow = true;
    group.add(wInst);
    staticObjects.push(wInst);
  }
}

function updateChunks() {
  const px = Math.floor(playerPos.x / CHUNK_SIZE);
  const pz = Math.floor(playerPos.z / CHUNK_SIZE);

  // Load new chunks
  for (let x = px - VIEW_DISTANCE; x <= px + VIEW_DISTANCE; x++) {
    for (let z = pz - VIEW_DISTANCE; z <= pz + VIEW_DISTANCE; z++) {
      const key = `${x},${z}`;
      if (!activeChunks.has(key)) {
        activeChunks.set(key, createChunk(x, z));
      }
    }
  }

  // Unload old chunks
  for (const [key, chunk] of activeChunks) {
    const [cx, cz] = key.split(',').map(Number);
    if (Math.abs(cx - px) > VIEW_DISTANCE || Math.abs(cz - pz) > VIEW_DISTANCE) {
      chunk.dispose();
      activeChunks.delete(key);
    }
  }
}

function makeBridge(pos, parentGroup, angle) {
  const bridgeMat = new THREE.MeshLambertMaterial({color: 0x4a2e19});
  const group = new THREE.Group();
  const bridgeY = 1.0;
  group.position.set(pos.x, bridgeY, pos.z);
  group.rotation.y = -angle; 
  
  // Main deck — wide enough to span the river channel (~80 units)
  const deck = new THREE.Mesh(new THREE.BoxGeometry(80, 0.6, 11), bridgeMat);
  deck.castShadow = true;

    handrail.position.set(0, 1.8, zSide);
    handrail.castShadow = true;
    group.add(handrail);
    staticObjects.push(handrail);

    // Vertical posts along the bridge side
    for (let xPos = -38; xPos <= 38; xPos += 7.6) {
      const postHeight = 35; // Tall enough to reach the deepest riverbeds
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.6, postHeight, 0.6), bridgeMat);
      post.position.set(xPos, -postHeight/2 + 1.8, zSide);
      post.castShadow = true;
      group.add(post);
      staticObjects.push(post);
    }
  });

}

function makeTavern(pos, parentGroup) {
  const h = getH(pos);
  const vPos = new THREE.Vector3(pos.x, h, pos.z);
  const woodM = new THREE.MeshLambertMaterial({color: 0x4a2e19});
  const stoneM = new THREE.MeshLambertMaterial({color: 0x666666});
  const group = new THREE.Group();
  group.position.copy(vPos);
  parentGroup.add(group);
  // Groups have no geometry, skip adding to staticObjects
  const rData = { pos: vPos.clone(), parts: [], parentChunkGroup: parentGroup };

  const W = 32, D = 24, wallH = 8;

  // Foundation/Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(W, 0.6, D), stoneM);
  floor.position.y = 0.3; floor.receiveShadow = true; group.add(floor);
  staticObjects.push(floor);
  rData.parts.push({ world: vPos.clone().add(new THREE.Vector3(0, 0.3, 0)), rad: Math.max(W,D)/2, mesh: floor });

  // Walls
  const wall = (x, z, w, d) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, d), woodM);
    m.position.set(x, wallH/2 + 0.6, z); m.castShadow = true; group.add(m);
    staticObjects.push(m);
    rData.parts.push({ world: vPos.clone().add(new THREE.Vector3(x, wallH/2, z)), rad: Math.max(w, d) / 2, mesh: m });
  };

  // Perimeter
  wall(0, -D/2 + 0.3, W, 0.6); // Back wall
  wall(-W/2 + 0.3, 0, 0.6, D); // Left wall
  wall(W/2 - 0.3, 0, 0.6, D);  // Right wall
  wall(-W/2 + 6, D/2 - 0.3, 12, 0.6); // Front Left
  wall(W/2 - 6, D/2 - 0.3, 12, 0.6);  // Front Right

  // Interior Rooms
  // Vertical divider creating a hall on the left and rooms on the right
  wall(2, -D/4, 0.6, D/2); 
  wall(2, D/2 - 2, 0.6, 4); 

  // Horizontal divider splitting the right side into two rooms
  wall(W/2 - 7, 0, 14, 0.6);

  // Roof
  const roofWidth = W/2 + 2;
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(roofWidth, 0.5, D + 2), stoneM);
  roofL.position.set(-W/4, wallH + 2.5, 0); roofL.rotation.z = 0.55; group.add(roofL);
  const roofR = new THREE.Mesh(new THREE.BoxGeometry(roofWidth, 0.5, D + 2), stoneM);
  roofR.position.set(W/4, wallH + 2.5, 0); roofR.rotation.z = -0.55; group.add(roofR);
  staticObjects.push(roofL, roofR);
  rData.parts.push({ world: vPos.clone().add(new THREE.Vector3(-W/4, wallH + 2, 0)), rad: 10, mesh: roofL });
  rData.parts.push({ world: vPos.clone().add(new THREE.Vector3(W/4, wallH + 2, 0)), rad: 10, mesh: roofR });

  ruins.push(rData);
  return rData;
}

const invisMat = new THREE.MeshBasicMaterial({visible: false});
function makeBuilding(bData, parentGroup) {
  const pos = new THREE.Vector3(bData.x, 0, bData.z);
  pos.y = Math.max(getH(pos), 0);
  const w = Math.max(bData.w, 6), d = Math.max(bData.d, 5), hh = Math.max(bData.h, 3);
  const wallH = hh, thick = 0.4;
  const isRes = bData.type !== 'commercial';

  const wallM = new THREE.MeshLambertMaterial({ color: bData.col || 0x8B7355 });
  const roofM = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
  const stoneM = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const trimM = new THREE.MeshLambertMaterial({ color: 0x4a2e19 });
  const doorM = new THREE.MeshLambertMaterial({ color: 0x1a0a00 });
  const winM = new THREE.MeshLambertMaterial({ color: 0x1a1a30 });

  const group = new THREE.Group();
  group.position.copy(pos);
  group.rotation.y = bData.rot || 0;
  parentGroup.add(group);

  const baseY = 0;
  const roofPeak = Math.max(2, wallH * 0.35);
  const slopeLen = Math.sqrt((w / 2) * (w / 2) + roofPeak * roofPeak);
  const roofAngle = Math.atan2(roofPeak, w / 2);
  const doorW = Math.min(1.8, w * 0.3);
  const gapHalf = doorW / 2;
  const doorH = Math.min(2.8, wallH - 0.8);
  const roofOverhang = 1.5;

  // Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, d), trimM);
  floor.position.y = baseY + 0.15;
  floor.receiveShadow = true; floor.castShadow = true;
  group.add(floor);

  // Back wall
  const bw = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, thick), wallM);
  bw.position.set(0, baseY + wallH / 2 + 0.3, -d / 2 + thick / 2);
  bw.castShadow = true; bw.receiveShadow = true;
  group.add(bw);

  // Left wall
  const lw = new THREE.Mesh(new THREE.BoxGeometry(thick, wallH, d), wallM);
  lw.position.set(-w / 2 + thick / 2, baseY + wallH / 2 + 0.3, 0);
  lw.castShadow = true; lw.receiveShadow = true;
  group.add(lw);

  // Right wall
  const rw = new THREE.Mesh(new THREE.BoxGeometry(thick, wallH, d), wallM);
  rw.position.set(w / 2 - thick / 2, baseY + wallH / 2 + 0.3, 0);
  rw.castShadow = true; rw.receiveShadow = true;
  group.add(rw);

  // Front wall with doorway gap
  const fwHalf = w / 2 - gapHalf;
  if (fwHalf > 0.3) {
    const fl = new THREE.Mesh(new THREE.BoxGeometry(fwHalf, wallH, thick), wallM);
    fl.position.set(-(w / 4 + gapHalf / 2), baseY + wallH / 2 + 0.3, d / 2 - thick / 2);
    fl.castShadow = true; fl.receiveShadow = true;
    group.add(fl);
    const fr = new THREE.Mesh(new THREE.BoxGeometry(fwHalf, wallH, thick), wallM);
    fr.position.set(w / 4 + gapHalf / 2, baseY + wallH / 2 + 0.3, d / 2 - thick / 2);
    fr.castShadow = true; fr.receiveShadow = true;
    group.add(fr);
  }

  // Doorway fill
  const doorFill = new THREE.Mesh(new THREE.BoxGeometry(doorW - 0.15, doorH, 0.15), doorM);
  doorFill.position.set(0, baseY + doorH / 2 + 0.3, d / 2 - thick - 0.05);
  group.add(doorFill);

  // Lintel above door
  if (wallH > doorH) {
    const lintel = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.4, 0.3, thick + 0.2), wallM);
    lintel.position.set(0, baseY + doorH + 0.3 + 0.15, d / 2 - thick / 2);
    lintel.castShadow = true;
    group.add(lintel);
  }

  // Roof slopes
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(slopeLen, 0.35, d + roofOverhang), roofM);
  roofL.position.set(-w / 4, baseY + wallH + roofPeak / 2 + 0.3, 0);
  roofL.rotation.z = roofAngle;
  roofL.castShadow = true;
  group.add(roofL);

  const roofR = new THREE.Mesh(new THREE.BoxGeometry(slopeLen, 0.35, d + roofOverhang), roofM);
  roofR.position.set(w / 4, baseY + wallH + roofPeak / 2 + 0.3, 0);
  roofR.rotation.z = -roofAngle;
  roofR.castShadow = true;
  group.add(roofR);

  const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, d + roofOverhang), roofM);
  ridge.position.set(0, baseY + wallH + roofPeak + 0.3, 0);
  ridge.castShadow = true;
  group.add(ridge);

  // Residential-only features: chimney, interior wall, interior door
  if (isRes) {
    const chimW = 1.2, chimD = 1.0, chimH = wallH + roofPeak + 0.8;
    const chimney = new THREE.Mesh(new THREE.BoxGeometry(chimW, chimH, chimD), stoneM);
    chimney.position.set(w / 3 - 0.5, baseY + chimH / 2 + 0.3, -d / 2 + thick + chimD / 2);
    chimney.castShadow = true;
    group.add(chimney);
    const chimCap = new THREE.Mesh(new THREE.BoxGeometry(chimW + 0.4, 0.25, chimD + 0.4), stoneM);
    chimCap.position.set(w / 3 - 0.5, baseY + chimH + 0.3, -d / 2 + thick + chimD / 2);
    chimCap.castShadow = true;
    group.add(chimCap);

    const intWall = new THREE.Mesh(new THREE.BoxGeometry(w * 0.55, wallH * 0.7, thick), wallM);
    intWall.position.set(0, baseY + wallH * 0.35 + 0.3, 0);
    intWall.castShadow = true;
    group.add(intWall);

    const intDoor = new THREE.Mesh(new THREE.BoxGeometry(0.9, 2, 0.12), doorM);
    intDoor.position.set(0, baseY + 1.3, 0);
    group.add(intDoor);
  }

  // Windows (residential: 2 per side, commercial: 3 larger windows per side)
  if (isRes) {
    const winW = 1.0, winH = 1.2;
    for (let si = -1; si <= 1; si += 2) {
      for (let wi = 0; wi < 2; wi++) {
        const wz = -d / 5 + wi * (d * 0.35);
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.08, winH, winW), winM);
        win.position.set(si * (w / 2 - thick / 2 - 0.04), baseY + 2.0, wz);
        win.castShadow = true;
        group.add(win);
      }
    }
  } else {
    const winW = 1.4, winH = 1.6;
    for (let si = -1; si <= 1; si += 2) {
      for (let wi = 0; wi < 3; wi++) {
        const wz = -d / 3 + wi * (d * 0.3);
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.08, winH, winW), winM);
        win.position.set(si * (w / 2 - thick / 2 - 0.04), baseY + 2.2, wz);
        win.castShadow = true;
        group.add(win);
      }
    }
    // Awning over door for commercial
    const awningMat = new THREE.MeshLambertMaterial({ color: [0xcc4444,0x4488cc,0x44cc44,0xcccc44][Math.abs(Math.floor(bData.x * 7 + bData.z * 13)) % 4] });
    const awning = new THREE.Mesh(new THREE.BoxGeometry(doorW + 2.5, 0.08, 1.8), awningMat);
    awning.position.set(0, baseY + doorH + 0.8, d / 2 - thick - 0.5);
    awning.rotation.x = -0.35;
    awning.castShadow = true;
    group.add(awning);
    // Sign post
    const signM = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    const signPost = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 2.2, 5), wallM);
    signPost.position.set(w / 3, baseY + 1.5, d / 2 - 1);
    signPost.castShadow = true;
    group.add(signPost);
    const signBoard = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 0.04), signM);
    signBoard.position.set(w / 3, baseY + 2.6, d / 2 - 1);
    signBoard.castShadow = true;
    group.add(signBoard);
  }

  // Add a single invisible collision box per building instead of individual meshes
  const bbox = new THREE.Box3().setFromObject(group);
  const bSize = bbox.getSize(new THREE.Vector3());
  const bCenter = bbox.getCenter(new THREE.Vector3());
  if (bSize.x > 0.1 && bSize.z > 0.1) {
    const collider = new THREE.Mesh(new THREE.BoxGeometry(bSize.x, bSize.y, bSize.z), invisMat);
    collider.position.copy(bCenter);
    group.add(collider);
    staticObjects.push(collider);
  }
}

function roundRect2D(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
}
function makeLabelSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font = 'bold 56px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(text).width;
  const padX = 50, padY = 24;
  const rx = canvas.width/2, ry = canvas.height/2, rw = tw/2 + padX, rh = 48 + padY;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  roundRect2D(ctx, rx - rw, ry - rh, rw*2, rh*2, 18);
  ctx.fill();
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 16;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, rx, ry + 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(6, 1.5, 1);
  return sprite;
}

function updateQuestUI() {

let _handlingInteraction = false;
function handleInteraction() {
  if (!npcGroup || playerPos.distanceTo(npcPos) > 5) return;
  if (_handlingInteraction) return;
  _handlingInteraction = true;
  if (quest.rewarded) {
    showDialogue('Mysterious Wizard', 'The road ahead is long. Travel safely.', [
      { label: 'Farewell', action: hideDialogue }
    ]);
  } else if (quest.completed && !quest.rewarded) {
    showDialogue('Mysterious Wizard', 'Excellent work! The town is safer because of you.', [
      { label: 'Complete Quest', action: claimReward }
    ]);
  } else if (quest.active && quest.killed >= quest.required) {
    quest.completed = true;
    saveQuestState();
    updateQuestUI();
    _handlingInteraction = false;
    setTimeout(handleInteraction, 0);
    return;
  } else if (quest.active) {
    showDialogue('Mysterious Wizard', 'The goblins are still out there. Return when you\'ve slain them all.', [
      { label: 'I\'m on it', action: hideDialogue }
    ]);
  } else {
    dialogueState = 'GREETING';
    showDialogue('Mysterious Wizard', 'Greetings, traveller. I have a task for you.', [
      { label: 'Next', action: showQuestIntro }
    ]);
  }
  _handlingInteraction = false;
}

function createFollower() {
  if (follower) return;
  const result = createWizardClone(0x4444aa);
  follower = result;
  const offset = new THREE.Vector3(-2, 0, -2).applyAxisAngle(new THREE.Vector3(0,1,0), facingYaw);
  followerPos.copy(playerPos).add(offset);
  followerPos.y = Math.max(getH(followerPos), 0);
  follower.position.copy(followerPos);
  scene.add(follower);
  sessionStorage.setItem('npc_follower_active', 'true');
}

function updateFollower(dt) {
  if (!follower) return;
  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const fSpeed = running ? 25 : 8;
  const offset = new THREE.Vector3(-2, 0, -2).applyAxisAngle(new THREE.Vector3(0,1,0), facingYaw);
  const target = playerPos.clone().add(offset);
  target.y = Math.max(getH(target), 0);
  followerPos.lerp(target, fSpeed * dt);
  follower.position.copy(followerPos);
  const dx = target.x - followerPos.x;
  const dz = target.z - followerPos.z;
  if (dx*dx+dz*dz > 0.01) {
    follower.rotation.y = Math.atan2(dx, dz);
  }
  // Walk animation
  const spd = Math.sqrt(dx*dx+dz*dz);
  if (spd > 0.3) {
    const t = performance.now() / 300;
    // Animate legs - find hip groups by position
    const subs = follower.children;
    for (let i = 0; i < subs.length; i++) {
      const c = subs[i];
      if (c.position.x < -0.1 && Math.abs(c.position.y - 0.65) < 0.01) c.rotation.x = Math.sin(t) * 0.65;
      if (c.position.x > 0.1 && Math.abs(c.position.y - 0.65) < 0.01) c.rotation.x = -Math.sin(t) * 0.65;
    }
  }
}

function followerAttack() {
  if (!follower || followerAttackCooldown > 0) return;
  let target = null;
  let isTroll = false;
  if (lastDamagedEnemy) {
    const e = lastDamagedEnemy;
    if (!e.dead) {
      const d = e.pos.distanceTo(followerPos);
      if (d < 30) { target = e; isTroll = e.maxHp !== undefined && e.maxHp > 100; }
    }
  }
  if (!target) {
    let minDist = 31;
    goblins.forEach(gb => {
      if (gb.dead) return;
      const d = gb.pos.distanceTo(followerPos);
      if (d < minDist) { minDist = d; target = gb; isTroll = false; }
    });
    if (!target) {
      trolls.forEach(tr => {
        if (tr.dead) return;
        const d = tr.pos.distanceTo(followerPos);
        if (d < minDist) { minDist = d; target = tr; isTroll = true; }
      });
    }
  }
  if (target) {
    if (isTroll) damageTroll(target, 15);
    else damageGoblin(target, 15);
    followerAttackCooldown = 0.8;
    const subs = follower.children;
    for (let i = 0; i < subs.length; i++) {
      const c = subs[i];
      if (c.position.x > 0.2 && Math.abs(c.position.y - 1.23) < 0.01) {
        c.rotation.x = -1.5;
        setTimeout(() => { if (c) c.rotation.x = 0; }, 200);
        break;
      }
    }
  }
}

function checkTreeHits(impactPos, radius, damage) {
  activeChunks.forEach((chunk, chunkKey) => {
    const treeParts = chunk.group.children.filter(c => c.isInstancedMesh && c.userData.isTree);
    if (treeParts.length === 0) return;

    // Use the first instanced mesh as the position reference for the whole tree
    const ref = treeParts[0];
    for (let i = 0; i < ref.count; i++) {
      ref.getMatrixAt(i, _tMat);
      _v3_util.setFromMatrixPosition(_tMat);
      if (_v3_util.y < -100) continue; 

      const d = _v3_util.distanceTo(impactPos);
      if (d < radius) {
        const treeId = `${chunkKey}_${i}`;
        let hp = treeHealth.get(treeId) ?? 100;
        hp -= damage;

        // Visual hit feedback (Blink white)
        treeParts.forEach(part => {
          if (!part.instanceColor) {
            const arr = new Float32Array(part.count * 3);
            arr.fill(1);
            part.instanceColor = new THREE.InstancedBufferAttribute(arr, 3);
          }
          // Set color to overbright white
          part.setColorAt(i, new THREE.Color(5, 5, 5));
          part.instanceColor.needsUpdate = true;
          treeBlinks.push({ mesh: part, index: i, time: 0.12 });
        });
        
        if (hp <= 0) {
          const dropPos = _v3_util.clone();
          const hideMatrix = new THREE.Matrix4().makeTranslation(0, -1000, 0);
          
          // Move ALL mesh parts of this tree instance below ground simultaneously
          treeParts.forEach(part => {
            part.setMatrixAt(i, hideMatrix);
            part.instanceMatrix.needsUpdate = true;
          });

          spawnTreeDebris(dropPos);
          treeHealth.delete(treeId);
        } else {
          treeHealth.set(treeId, hp);
        }
      }
    }
  });
}

function checkRuinHits(impactPos, radius, sourcePos) {
  for (const r of ruins) {
    for (let i = r.parts.length - 1; i >= 0; i--) {
      const p = r.parts[i];
      if (!p.mesh) continue;
      
      const d = p.world.distanceTo(impactPos);
      if (d < radius) {
        // Remove from static collisions and camera raycasting
        const sIdx = staticObjects.indexOf(p.mesh);
        if (sIdx !== -1) staticObjects.splice(sIdx, 1);
        
        // Get world transform before removing from parent group
        const worldPos = new THREE.Vector3();
        const worldQuat = new THREE.Quaternion();
        p.mesh.getWorldPosition(worldPos);
        p.mesh.getWorldQuaternion(worldQuat);
        
        // Remove from structure group
        if (p.mesh.parent) p.mesh.parent.remove(p.mesh);
        
        r.parts.splice(i, 1);
      }
    }
  }
}

const tornadoes = [];
const tornadoMat = new THREE.MeshLambertMaterial({ color: 0x8888aa, transparent: true, opacity: 0.6, side: THREE.DoubleSide });

function spawnTornado(targetPos) {
  const group = new THREE.Group();
  const segments = 18;
  for (let i = 0; i < segments; i++) {
    // Inner layer
    const r1 = 0.5 + i * 0.8;
    const ring1 = new THREE.Mesh(new THREE.CylinderGeometry(r1, r1 * 0.7, 2, 8, 1, true), tornadoMat);
    ring1.position.y = i * 1.5;
    group.add(ring1);

    // Middle layer
    const r2 = 1.2 + i * 2.0;
    const ring2 = new THREE.Mesh(new THREE.CylinderGeometry(r2, r2 * 0.8, 3.5, 10, 1, true), tornadoMat);
    ring2.position.y = i * 2.8;
    group.add(ring2);

    // Outer layer
    const r3 = 2.5 + i * 3.5;
    const ring3 = new THREE.Mesh(new THREE.CylinderGeometry(r3, r3 * 0.8, 6.0, 12, 1, true), tornadoMat);
    ring3.position.y = i * 5.0;
    group.add(ring3);
  }
  group.position.copy(targetPos);
  scene.add(group);

  tornadoes.push({
    obj: group,
    pos: targetPos.clone(),
    vel: new THREE.Vector3((Math.random() - 0.5) * 12, 0, (Math.random() - 0.5) * 12),
    life: 10.0,
    timer: 0
  });
  camShake = 2.5;

  // Visual cast reaction
  swinging = false;
  rShoulder.rotation.x = -1.2;
  setTimeout(() => { rShoulder.rotation.x = 0; }, 400);
  followerAttack();
}

function updateTornadoes(dt) {
  for (let i = tornadoes.length - 1; i >= 0; i--) {
    const t = tornadoes[i];
    t.life -= dt;
    t.timer += dt;

    // Roaming logic: Change direction occasionally
    if (Math.random() < 0.02) {
      t.vel.x += (Math.random() - 0.5) * 15;
      t.vel.z += (Math.random() - 0.5) * 15;
      t.vel.clampLength(0, 12);
    }

    t.pos.addScaledVector(t.vel, dt);
    t.pos.y = getH(t.pos);
    t.obj.position.copy(t.pos);

    // Spinning animation
    t.obj.children.forEach((child, idx) => {
      child.rotation.y += dt * (12 + idx * 3);
      child.position.x = Math.sin(t.timer * 5 + idx) * (0.2 + idx * 0.05);
    });

    // Move the player if contacted
    const distP = t.pos.distanceTo(playerPos);
    if (distP < 15) {
        const pull = new THREE.Vector3().subVectors(t.pos, playerPos).normalize();
        velocity.addScaledVector(pull, dt * 25); // Pull toward center
        verticalVel += dt * 45; // Lift character
        // Tangential spin
        const tangent = new THREE.Vector3(pull.z, 0, -pull.x).multiplyScalar(30);
        velocity.addScaledVector(tangent, dt);
    }

    // Interaction: Affect environment and enemies
    if (t.timer % 0.15 < 0.05) {
      // Check at the maximum effective radius once per pulse
      checkTreeHits(t.pos, 45, 15);
      checkRuinHits(t.pos, 45, t.pos);
      checkLightningHitsGoblins(t.pos, 45, 3); // Continuous damage in wider radius
      checkLightningHitsTrolls(t.pos, 45, 5);
      damageEnemiesInRange(t.pos, 45, 3);
    }

    if (t.life <= 0) {
      scene.remove(t.obj);
      tornadoes.splice(i, 1);
    } else if (t.life < 1.0) {
      t.obj.scale.setScalar(t.life); // Fade out scale
    }
  }
}

function getMouseGroundTarget() {
  const raycaster = new THREE.Raycaster();
  const mouseNDC = new THREE.Vector2((mouseX / window.innerWidth) * 2 - 1, -(mouseY / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouseNDC, camera);
  const intersects = raycaster.intersectObjects(staticObjects);
  if (intersects.length > 0) return intersects[0].point;
  return raycaster.ray.origin.clone().addScaledVector(raycaster.ray.direction, 50);
}

const lightningBolts = [];
function makeLightningPoints(start, end, segments, spread) {
  const pts = [start.clone()];
  for (let i = 1; i < segments; i++) {
    const p = new THREE.Vector3().lerpVectors(start, end, i / segments);
    pts.push(p.add(new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).multiplyScalar(spread)));
  }
  pts.push(end.clone());
  return pts;
}

const _boltGeo = new THREE.CylinderGeometry(1, 1, 1, 4);
const _boltDummy = new THREE.Object3D();

const MAX_ACTIVE_LIGHTNING = 25; // Prevent hitting WebGL uniform light limits

function spawnLightning(from, to, range){
  if (lightningBolts.length >= MAX_ACTIVE_LIGHTNING) return;
  const meshes = [];
  const numLines = range ? 5 : 2;
  
  for(let j=0; j<numLines; j++) {
    const isCore = j === 0;
    const segments = range ? 20 : 10;
    const spread = isCore ? (range ? 0.8 : 0.3) : (range ? 3.5 : 1.2);
    const pts = makeLightningPoints(from, to, segments, spread);
    const radius = isCore ? (range ? 0.18 : 0.08) : (range ? 0.08 : 0.03);

    const mat = new THREE.MeshBasicMaterial({
      color: isCore ? 0xffffff : 0x44ffff,
      transparent: true,
      opacity: 1.0,
      blending: THREE.AdditiveBlending
    });

    const inst = new THREE.InstancedMesh(_boltGeo, mat, pts.length - 1);
    for(let i=0; i < pts.length - 1; i++){
      const p1 = pts[i], p2 = pts[i+1];
      _boltDummy.position.copy(p1).lerp(p2, 0.5);
      _boltDummy.scale.set(radius, p1.distanceTo(p2), radius);
      _boltDummy.lookAt(p2);
      _boltDummy.rotateX(Math.PI / 2);
      _boltDummy.updateMatrix();
      inst.setMatrixAt(i, _boltDummy.matrix);
    }
    inst.instanceMatrix.needsUpdate = true;
    scene.add(inst);
    meshes.push(inst);
  }

  const impact = new THREE.Mesh(
    new THREE.SphereGeometry(range ? 6.0 : 2.2, 16, 12),
    new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending})
  );
  impact.position.copy(to);
  scene.add(impact);

  const flash = new THREE.PointLight(0x88ccff, range ? 60 : 25, range ? 80 : 40);
  flash.position.copy(to);
  flash.castShadow = false;
  scene.add(flash);

  lightningBolts.push({ meshes, impact, flash, age:0, maxAge: range ? 0.5 : 0.25 });
}
function updateLightning(dt){
  for(let i=lightningBolts.length-1;i>=0;i--){
    const b=lightningBolts[i];
    b.age+=dt;
    const t=1-b.age/b.maxAge;
    b.meshes.forEach(m => m.material.opacity = t);
    b.impact.material.opacity = t;
    b.impact.scale.setScalar(1 + (1 - t) * 4);
    b.flash.intensity = t * (b.meshes.length > 2 ? 30 : 10);
    
    if(b.age>=b.maxAge){
      b.meshes.forEach(m => { scene.remove(m); m.material.dispose(); });
      scene.remove(b.flash, b.impact);
      b.impact.material.dispose();
      lightningBolts.splice(i,1);
    }
  }
}

function updateStaffSwipeAnim(dt){

  if(swingT < 0.4){
    const p = swingT / 0.4;
    rShoulder.rotation.x = -p * 1.5;
    rElbow.rotation.x = p * 0.5;
  } else if(swingT < 0.6){
    const p = (swingT - 0.4) / 0.2;
    rShoulder.rotation.x = -1.5 + p * 2.3;
  } else {
    const p = (swingT - 0.6) / 0.4;
    rShoulder.rotation.x = 0.8 * (1 - p);

  }
  if(swingT>=1){ swinging=false; rShoulder.rotation.x=0; rElbow.rotation.x=0; }

function triggerLightning(holdTime){
  const range = holdTime > 0.8;
  let targetPos = getMouseGroundTarget();
  
  targetPos.y = Math.max(getH(targetPos), 0);
  if(range) camShake = 0.6;
  
  const localDir = targetPos.clone().sub(playerPos).normalize();
  targetYaw = Math.atan2(localDir.x, localDir.z);

  swinging=false;
  rShoulder.rotation.x=-1.2;
  rElbow.rotation.x=0.3;
  setTimeout(()=>{ rShoulder.rotation.x=0; rElbow.rotation.x=0; },400);
  
  const skyOrigin = targetPos.clone().setY(200);
  spawnLightning(skyOrigin, targetPos, range);
  
  checkLightningHitsGoblins(targetPos, range ? 9.0 : 4.5, range ? 35 : 15);
  checkLightningHitsTrolls(targetPos, range ? 14.0 : 7.0, range ? 60 : 30);
  damageEnemiesInRange(targetPos, range ? 9.0 : 4.5, range ? 35 : 15);
  checkTreeHits(targetPos, range ? 20 : 10, 60);
  followerAttack();

  // Multiple strikes based on hold time: 1 + 1 per second, capped at 20 strikes total
  const totalStrikes = Math.min(20, Math.floor(holdTime) + 1);
  const extraStrikes = totalStrikes - 1;

  for (let i = 0; i < extraStrikes; i++) {
    const delay = 80 + i * 50; // Slightly faster stagger for high strike counts
    setTimeout(() => {
      const spread = range ? 45 : 15; // Increased spread so they aren't so grouped
      const scatter = targetPos.clone().add(new THREE.Vector3((Math.random() - .5) * spread, 0, (Math.random() - .5) * spread));
      scatter.y = Math.max(getH(scatter), 0);
      const skyOrigin2 = scatter.clone().setY(200);
      spawnLightning(skyOrigin2, scatter, range);
      checkLightningHitsGoblins(scatter, range ? 9.0 : 4.5, range ? 35 : 15);
      checkLightningHitsTrolls(scatter, range ? 14.0 : 7.0, range ? 60 : 30);
      damageEnemiesInRange(scatter, range ? 9.0 : 4.5, range ? 35 : 15);
      checkTreeHits(scatter, range ? 20 : 10, 60);
    }, delay);
  }
}

const goblinSkinM  = new THREE.MeshLambertMaterial({color:0x5a8a3a});

const trolls = [];
function spawnTroll(tx, tz) {
  if (Math.abs(tx) < 80 && Math.abs(tz) < 80) return null;
  const th = Math.max(getH({ x: tx, z: tz }), 0);
  const mesh = makeTrollMesh();
  const finalPos = new THREE.Vector3(tx, th, tz);
  mesh.group.position.copy(finalPos);
  scene.add(mesh.group);
  trolls.push({
    mesh, pos: finalPos, vel: new THREE.Vector3(),
    hp: 250, maxHp: 250, dead: false, animT: 0, stateTimer: 0, attackCooldown: 2,
    patrolTarget: finalPos.clone().add(new THREE.Vector3((Math.random()-0.5)*100,0,(Math.random()-0.5)*100)),
    facingYaw: Math.random()*Math.PI*2, deathTimer: 0
  });
  return trolls[trolls.length - 1];
}

function damageTroll(tr, dmg){
  if(tr.dead) return;
  lastDamagedEnemy = tr;
  tr.hp -= dmg;
  tr.mesh.group.traverse(c=>{ if(c.isMesh) { c._origMat=c._origMat||c.material; c.material=goblinHitMat; } });
  setTimeout(()=>{ if(!tr.dead) tr.mesh.group.traverse(c=>{ if(c.isMesh&&c._origMat) c.material=c._origMat; }); }, 100);
  if(tr.hp <= 0) killTroll(tr);
}
function killTroll(tr){
  tr.dead = true;
  tr.mesh.group.traverse(c=>{ if(c.isMesh && c._origMat) c.material=c._origMat; });
  const push = tr.pos.clone().sub(playerPos).normalize();
  tr.deathVel = push.setY(0).normalize().multiplyScalar(15 + Math.random()*12);
  tr.deathVel.y = 10 + Math.random()*8;
  tr.deathRot = new THREE.Vector3(Math.random()*4, Math.random()*4, Math.random()*4);
}
function updateTrolls(dt, playerPos){
  for(let i=trolls.length-1; i>=0; i--){
    const tr = trolls[i];
    if(tr.dead){
      tr.deathTimer += dt;
      tr.pos.addScaledVector(tr.deathVel, dt);
      tr.deathVel.y -= 28 * dt;
      tr.mesh.group.position.copy(tr.pos);
      tr.mesh.group.rotation.x += tr.deathRot.x * dt;
      tr.mesh.group.rotation.y += tr.deathRot.y * dt;
      tr.mesh.group.rotation.z += tr.deathRot.z * dt;
      if(tr.deathTimer > 7 || tr.pos.y < -100) { scene.remove(tr.mesh.group); trolls.splice(i, 1); }
      continue;
    }
    tr.stateTimer += dt;
    tr.attackCooldown = Math.max(0, tr.attackCooldown - dt);
    const dist = tr.pos.distanceTo(playerPos);
    let speed = 0;
    if(dist < 50) {
      tr.vel.subVectors(playerPos, tr.pos).normalize().multiplyScalar(4.5);
      speed = 4.5;
    } else {
      if(tr.stateTimer > 6 || tr.pos.distanceTo(tr.patrolTarget) < 4) {
        tr.patrolTarget.set(tr.pos.x + (Math.random()-0.5)*100, 0, tr.pos.z + (Math.random()-0.5)*100);
        tr.stateTimer = 0;
      }
      tr.vel.subVectors(tr.patrolTarget, tr.pos).normalize().multiplyScalar(2.2);
      speed = 2.2;
    }
    tr.pos.addScaledVector(tr.vel, dt);
    checkRuinCollision(tr.pos, 2.5);
    tr.pos.y = Math.max(getH(tr.pos), 0);unstuck(tr);
    tr.mesh.group.position.copy(tr.pos);
    if(tr.vel.lengthSq() > 0.001) tr.facingYaw = Math.atan2(tr.vel.x, tr.vel.z);
    tr.mesh.group.rotation.y = tr.facingYaw;
    tr.animT += dt * speed;
    tr.mesh.lLeg.rotation.x = Math.sin(tr.animT) * 0.5;
    tr.mesh.rLeg.rotation.x = -Math.sin(tr.animT) * 0.5;
    tr.mesh.lArm.rotation.x = -Math.sin(tr.animT) * 0.4;
    tr.mesh.rArm.rotation.x = Math.sin(tr.animT) * 0.4;
    if(dist < 9 && tr.attackCooldown <= 0) {
      camShake = 1.5;
      tr.attackCooldown = 3.5;
      tr.mesh.rArm.rotation.x = -1.6;
      setTimeout(()=> { tr.mesh.rArm.rotation.x = 0; }, 600);
    }
  }
}
function checkLightningHitsTrolls(impactPos, radius, dmg){
  trolls.forEach(tr => { if(!tr.dead && tr.pos.distanceTo(impactPos) < radius) damageTroll(tr, dmg); });
}
function checkStaffSwipeHitsTrolls(){
  trolls.forEach(tr => { if(!tr.dead && tr.pos.distanceTo(playerPos) < 13) damageTroll(tr, 60); });
}

const GOBLIN_IDLE=0, GOBLIN_PATROL=1, GOBLIN_CHASE=2, GOBLIN_ATTACK=3, GOBLIN_HIT=4, GOBLIN_DEAD=5;
const goblins=[];

function spawnGoblin(gx, gz) {
  if (Math.abs(gx) < 51 && Math.abs(gz) < 51) return null; // Scaled exclusion zone (30 * 1.7)
  const gh = Math.max(getH({ x: gx, z: gz }), 0);
  const mesh=makeGoblinMesh();
  const finalPos = new THREE.Vector3(gx, gh, gz);
  mesh.group.position.copy(finalPos);
  scene.add(mesh.group);

  const patrolTarget = finalPos.clone().add(new THREE.Vector3((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20));

  goblins.push({
    mesh,
    pos: finalPos,
    vel: new THREE.Vector3(0,0,0),
    hp:30, maxHp:30,
    state: GOBLIN_PATROL,
    animT:0,
    stateTimer:0,
    attackCooldown:Math.random()*2,
    hitTimer:0,
    patrolTarget,
    facingYaw:Math.random()*Math.PI*2,
    dead:false,
    deathTimer:0,
  });
  return goblins[goblins.length - 1];
}

function applyGoblinWalk(m, t, spd){
  const s=Math.min(spd/3,1);
  m.lLeg.rotation.x=Math.sin(t)*.7*s;
  m.rLeg.rotation.x=-Math.sin(t)*.7*s;
  m.lKnee.rotation.x=Math.max(0,Math.sin(t))*.8*s;
  m.rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.8*s;
  m.lArm.rotation.x=-Math.sin(t)*.6*s;
  m.rArm.rotation.x=Math.sin(t)*.6*s;
}
function applyGoblinAttack(m, t){
  const arc=Math.sin(t*Math.PI)*1.8;
  m.rArm.rotation.x=-arc;
  m.rFArm.rotation.x=Math.max(0,arc)*.5;
}
function damageGoblin(goblin, dmg){
  if(goblin.dead) return;
  lastDamagedEnemy = goblin;
  goblin.hp=Math.max(0,goblin.hp-dmg);
  goblin.state=GOBLIN_HIT;
  goblin.hitTimer=0.25;
  goblin.mesh.group.traverse(c=>{
    if(c.isMesh) { c._origMat=c._origMat||c.material; c.material=goblinHitMat; }
  });
  setTimeout(()=>{
    // Only restore materials if the goblin is still alive (avoid overwriting death material)
    if (goblin.dead) return;
    goblin.mesh.group.traverse(c=>{ if(c.isMesh&&c._origMat){ c.material=c._origMat; } });
  },150);
  if(goblin.hp<=0) killGoblin(goblin);
}
function killGoblin(goblin){
  goblin.dead=true;
  goblin.exploded=false;
  goblin.state=GOBLIN_DEAD;
  goblin.deathTimer=0;
  goblin.mesh.group.traverse(c=>{ if(c.isMesh) { c.material = goblinDeadMat; } });
  const push = goblin.pos.clone().sub(playerPos).normalize();
  goblin.deathVel = push.setY(0).normalize().multiplyScalar(25 + Math.random()*15);
  goblin.deathVel.y = 10 + Math.random() * 10;
  goblin.deathRot = new THREE.Vector3(Math.random()*12, Math.random()*12, Math.random()*12);
  if (quest.active && !quest.completed) {
    quest.killed = Math.min(quest.required, quest.killed + 1);
    if (quest.killed >= quest.required) quest.completed = true;
    saveQuestState();
    updateQuestUI();
  }
}
function checkLightningHitsGoblins(impactPos, radius, dmg){
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const dist=gb.pos.distanceTo(impactPos);
    if(dist<radius) damageGoblin(gb,dmg);
  });
}
function damageEnemiesInRange(center, radius, dmg){
  wretches.forEach(e=>{if(!e.dead&&e.pos.distanceTo(center)<radius)damageWretch(e,dmg);});
  husks.forEach(e=>{if(!e.dead&&e.pos.distanceTo(center)<radius)damageHusk(e,dmg);});
  zombies.forEach(e=>{if(!e.dead&&e.pos.distanceTo(center)<radius)damageZombie(e,dmg);});
  rangers.forEach(e=>{if(!e.dead&&e.pos.distanceTo(center)<radius)damageRanger(e,dmg);});
  iceElementals.forEach(e=>{if(!e.dead&&e.pos.distanceTo(center)<radius)damageIceElemental(e,dmg);});
}
function unstuck(e){
  if(e.vel.lengthSq()>0.1){
    if(e._pp){
      const moved=e.pos.distanceTo(e._pp);
      e._pp.copy(e.pos);
      if(moved<0.015&&e.vel.length()>1){
        const side=new THREE.Vector3(-e.vel.z,0,e.vel.x).normalize().multiplyScalar(3);
        e.vel.add(side);
      }
    }else{
      e._pp=e.pos.clone();
    }
  }
}
function checkStaffSwipeHitsGoblins(){
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const dist = gb.pos.distanceTo(playerPos);
    if(dist < 5.5){
      damageGoblin(gb, 25);
      if(!gb.dead && Math.random() < 0.4) killGoblin(gb);
    }
  });
  damageEnemiesInRange(playerPos, 5.5, 25);
}

// Wretch
const wretches=[];
const wretchSkinM=new THREE.MeshLambertMaterial({color:0x0d9488});
const wretchFleshM=new THREE.MeshLambertMaterial({color:0x047857});
const wretchEyeM=new THREE.MeshBasicMaterial({color:0xf59e0b});
function makeWretchMesh(){
  const g=new THREE.Group();
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(0.28-i*0.025,8,8),wretchSkinM);
    s.position.set(0,0.32+Math.sin(i*0.5)*0.04,-i*0.2+0.25);
    s.scale.set(1.1,0.8,1);s.castShadow=true;g.add(s);
  }
  for(const side of[-1,1]){
    const p=new THREE.Mesh(new THREE.TorusGeometry(0.12,0.03,6,6,Math.PI),wretchFleshM);
    p.position.set(side*0.15,0.35,0.4);p.rotation.set(0,side*0.5,Math.PI/2);g.add(p);
  }
  for(let i=0;i<3;i++)for(const side of[-1,1]){
    const e=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),wretchEyeM);
    e.position.set(side*(0.1+i*0.035),0.42+i*0.03,0.35);g.add(e);
  }
  g.scale.setScalar(3.8);return{group:g};
}
function spawnWretch(gx,gz){
  const h=Math.max(getH({x:gx,z:gz}),0);const m=makeWretchMesh();
  const p=new THREE.Vector3(gx,h,gz);m.group.position.copy(p);scene.add(m.group);
  const e={mesh:m,pos:p,vel:new THREE.Vector3(),hp:18,maxHp:18,state:GOBLIN_PATROL,animT:0,attackCooldown:Math.random()*2,patrolTarget:p.clone().add(new THREE.Vector3((Math.random()-0.5)*15,0,(Math.random()-0.5)*15)),facingYaw:Math.random()*Math.PI*2,dead:false,deathTimer:0};
  wretches.push(e);return e;
}
function damageWretch(w,dmg){w.hp-=dmg;if(w.hp<=0){w.dead=true;scene.remove(w.mesh.group);}}
function updateWretches(dt,pl){
  wretches.forEach(w=>{
    if(w.dead){w.deathTimer+=dt;if(w.deathTimer>3){scene.remove(w.mesh.group);}return;}
    const d=w.pos.distanceTo(pl);
    if(d<3.5&&w.attackCooldown<=0){damagePlayer(5);w.attackCooldown=2.5;}
    else if(d<25){const dir=new THREE.Vector3().subVectors(pl,w.pos).normalize();w.vel.lerp(dir.multiplyScalar(4.5),0.05);}
    else{w.vel.lerp(new THREE.Vector3().subVectors(w.patrolTarget,w.pos).normalize().multiplyScalar(1.8),0.02);if(w.pos.distanceTo(w.patrolTarget)<2)w.patrolTarget.copy(w.pos).add(new THREE.Vector3((Math.random()-0.5)*15,0,(Math.random()-0.5)*15));}
    w.attackCooldown=Math.max(0,w.attackCooldown-dt);
    w.pos.addScaledVector(w.vel,dt);w.pos.y=Math.max(getH(w.pos),0);unstuck(w);
    w.mesh.group.position.copy(w.pos);w.mesh.group.rotation.y+=dt*2;
  });
}
