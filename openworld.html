let playerHp=100, playerMaxHp=100, playerMana=100, playerMaxMana=100, shieldTimer=0;
function damagePlayer(dmg){
  if (shieldTimer > 0) dmg = Math.floor(dmg * 0.5);
  playerHp = Math.max(0, playerHp - dmg);
  if (playerHp <= 0) {
    playerHp = playerMaxHp;
    playerMana = playerMaxMana;
    playerPos.set(0, 5, 0);
    velocity.set(0, 0, 0);
    verticalVel = 0;
    isGrounded = false;
  }
}
let goblinAccum = 0;
function updateGoblins(dt, playerPos){
  goblinAccum += dt;
  const detailed = goblinAccum >= 0.05;
  if (detailed) goblinAccum = 0;

  goblins.forEach(gb=>{
    if(gb.dead){
      if(gb.exploded) return;
      gb.deathTimer+=dt;
      gb.pos.addScaledVector(gb.deathVel, dt);
      gb.mesh.group.position.copy(gb.pos); 
      gb.mesh.group.rotation.x += gb.deathRot.x * dt;
      gb.mesh.group.rotation.y += gb.deathRot.y * dt;
      gb.mesh.group.rotation.z += gb.deathRot.z * dt;

      if(gb.pos.y < -50 || gb.pos.y > 500){
        gb.exploded = true;
        scene.remove(gb.mesh.group);
      }

      if(gb.deathTimer>6){
        scene.remove(gb.mesh.group);
      }
      return;
    }

    // common lightweight updates
    gb.stateTimer+=dt;
    gb.attackCooldown=Math.max(0,gb.attackCooldown-dt);
    if(gb.hitTimer>0){ gb.hitTimer-=dt; if(!detailed) return; }

    const distToPlayer=gb.pos.distanceTo(playerPos);
    const DETECT_RANGE=22, CHASE_RANGE=30, ATTACK_RANGE=1.8;

    // If we're not doing a detailed tick, do a simplified, cheaper update
    if(!detailed){
      if(gb.state!==GOBLIN_ATTACK){
        if(distToPlayer<ATTACK_RANGE && gb.attackCooldown<=0){
          gb.state=GOBLIN_ATTACK; gb.animT=0; gb.stateTimer=0; // ATTACK_RANGE = 1.8 * 1.7 = 3.06
        } else if(distToPlayer<37.4){ // DETECT_RANGE = 22 * 1.7 = 37.4
          gb.state=GOBLIN_CHASE;
        } else if(distToPlayer>51 && gb.state===GOBLIN_CHASE){ // CHASE_RANGE = 30 * 1.7 = 51
          gb.state=GOBLIN_PATROL; gb.stateTimer=0;
        }
      }

      if(gb.state===GOBLIN_PATROL){
        if(gb.stateTimer>4||gb.pos.distanceTo(gb.patrolTarget)<1.5){
          gb.patrolTarget.set(gb.pos.x + (Math.random()-0.5)*51, 0, gb.pos.z + (Math.random()-0.5)*51); // Patrol target range scaled (30 * 1.7)
          gb.stateTimer=0;
        }
        const dist = gb.pos.distanceTo(gb.patrolTarget);
        if(dist>0.85){ // checkRuinCollision radius scaled (0.5 * 1.7)
          gb.vel.subVectors(gb.patrolTarget, gb.pos).normalize().multiplyScalar(3.06); // Patrol speed scaled (1.8 * 1.7)
        } else { gb.vel.multiplyScalar(0.8); }
      } else if(gb.state===GOBLIN_CHASE){
        const dist = gb.pos.distanceTo(playerPos);
        if(dist>0.17){ // Small threshold scaled (0.1 * 1.7)
          gb.vel.subVectors(playerPos, gb.pos).normalize().multiplyScalar(7.65); // Chase speed scaled (4.5 * 1.7)
        }
      } else if(gb.state===GOBLIN_ATTACK){
        gb.vel.multiplyScalar(0.7);
      }

      gb.pos.addScaledVector(gb.vel, dt);
      checkRuinCollision(gb.pos, 0.85); // Scaled collision radius (0.5 * 1.7)
      gb.pos.y = Math.max(getH(gb.pos), 0);unstuck(gb);

      gb.mesh.group.position.copy(gb.pos);
      gb.mesh.group.rotation.set(0, 0, 0);
      if (gb.vel.lengthSq() > 0.0001) gb.facingYaw = Math.atan2(gb.vel.x, gb.vel.z);
      gb.mesh.group.rotation.y = gb.facingYaw;
      return;
    }

    // Detailed AI/animation update (runs less frequently)
    if(gb.state!==GOBLIN_ATTACK){
      if(distToPlayer<ATTACK_RANGE && gb.attackCooldown<=0){
        gb.state=GOBLIN_ATTACK; gb.animT=0; gb.stateTimer=0; // ATTACK_RANGE = 1.8 * 1.7 = 3.06
      } else if(distToPlayer<37.4){ // DETECT_RANGE = 22 * 1.7 = 37.4
        gb.state=GOBLIN_CHASE;
      } else if(distToPlayer>51 && gb.state===GOBLIN_CHASE){ // CHASE_RANGE = 30 * 1.7 = 51
        gb.state=GOBLIN_PATROL; gb.stateTimer=0;
      }
    }
    let speed=0;
    if(gb.state===GOBLIN_PATROL){
      if(gb.stateTimer>4||gb.pos.distanceTo(gb.patrolTarget)<1.5){
        gb.patrolTarget.set(gb.pos.x + (Math.random()-0.5)*51, 0, gb.pos.z + (Math.random()-0.5)*51); // Patrol target range scaled (30 * 1.7)
        gb.stateTimer=0;
      }
      const dist = gb.pos.distanceTo(gb.patrolTarget);
      if(dist>0.85){ // checkRuinCollision radius scaled (0.5 * 1.7)
        gb.vel.subVectors(gb.patrolTarget, gb.pos).normalize().multiplyScalar(3.06); // Patrol speed scaled (1.8 * 1.7)
        speed = 3.06;
      } else { gb.vel.multiplyScalar(0.8); }
    } else if(gb.state===GOBLIN_CHASE){
      const dist = gb.pos.distanceTo(playerPos);
      if(dist>0.17){ // Small threshold scaled (0.1 * 1.7)
        gb.vel.subVectors(playerPos, gb.pos).normalize().multiplyScalar(7.65); // Chase speed scaled (4.5 * 1.7)
        speed=7.65;
      }
    } else if(gb.state===GOBLIN_ATTACK){
      gb.vel.multiplyScalar(0.7);
      gb.animT+=dt*5;
      applyGoblinAttack(gb.mesh,gb.animT);
      const toPlayer = playerPos.clone().sub(gb.pos);
      gb.facingYaw = Math.atan2(toPlayer.x, toPlayer.z);

      if(gb.animT>0.5 && gb.animT<0.6 && gb.attackCooldown<=0){ // Attack animation timing
        if(distToPlayer<3.06 + 0.51){ damagePlayer(8); } // ATTACK_RANGE + 0.3 scaled (1.8 * 1.7 + 0.3 * 1.7)
        gb.attackCooldown=2.2; // Attack cooldown remains the same for balance
      }
      if(gb.animT>=1){
        gb.state=GOBLIN_CHASE; gb.animT=0; // Transition to chase after attack
        gb.mesh.rArm.rotation.x=0; gb.mesh.rFArm.rotation.x=0;
      }
    }

    gb.pos.addScaledVector(gb.vel, dt); // Apply velocity
    checkRuinCollision(gb.pos, 0.85); // Scaled collision radius (0.5 * 1.7)
    gb.pos.y = Math.max(getH(gb.pos), 0);unstuck(gb);

    gb.mesh.group.position.copy(gb.pos);
    gb.mesh.group.rotation.set(0, 0, 0);

    if (speed > 0.1) {
      gb.facingYaw = Math.atan2(gb.vel.x, gb.vel.z);
    }
    gb.mesh.group.rotation.y = gb.facingYaw;

    if(gb.state!==GOBLIN_ATTACK){
      gb.animT+=dt*(speed>2?8:5);
      applyGoblinWalk(gb.mesh,gb.animT,speed/1.7); // Scale speed for animation to keep it consistent
    }
  });
}

const cameraTarget = new THREE.Vector3();
const cameraLerpSpeed = 0.12;
camera.position.set(0, 10, 10);
const targetVelocity = new THREE.Vector3();
let verticalVel = 0;
let facingYaw=0, animT=0, moving=false, isGrounded=true;
const clock=new THREE.Clock();

// Camera smoothing variables
const currentCameraPos = new THREE.Vector3();
const currentLookAt = new THREE.Vector3();

function applyWalk(t,spd){
  if(swinging) return;
  const s=Math.min(spd/3.5,1);
  lHip.rotation.x=Math.sin(t)*.65*s;
  rHip.rotation.x=-Math.sin(t)*.65*s;
  lKnee.rotation.x=Math.max(0,Math.sin(t))*.9*s;
  rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.9*s;
  if(!swinging){
    lShoulder.rotation.x=-Math.sin(t)*.5*s;
    rShoulder.rotation.x=Math.sin(t)*.5*s;
  }
  torso.rotation.z=Math.sin(t)*.04*s;
}
function resetWalk(){
  [lHip,rHip,lKnee,rKnee].forEach(p=>{p.rotation.x*=.85;});
  if(!swinging){ 
    lShoulder.rotation.x*=.85; rShoulder.rotation.x*=.85; 
    rShoulder.rotation.y*=.85; 
    rElbow.rotation.z*=.85;
    torso.rotation.y*=.85;
  }
  torso.rotation.z*=.85;
}
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);

  const running=keys['ShiftLeft']||keys['ShiftRight'];
  const speed=running?36:12; // Sprint 3x faster, Walk slightly faster
  const acceleration = running ? 10 : 15;
  const friction = 12;

  moving=false;
  const dir=new THREE.Vector3();
  if(keys['KeyW']){dir.z-=1;moving=true;}
  if(keys['KeyS']){dir.z+=1;moving=true;}
  const turnSpeed = 3.5;
  if(keys['KeyA']){targetYaw += turnSpeed * dt;}
  if(keys['KeyD']){targetYaw -= turnSpeed * dt;}

  if (moving) {
    // Move relative to character's target direction
    const moveDir = new THREE.Vector3(0, 0, -dir.z).applyAxisAngle(new THREE.Vector3(0,1,0), targetYaw).normalize();
    targetVelocity.copy(moveDir).multiplyScalar(speed);
  } else { 
    targetVelocity.set(0, 0, 0); 
  }

  // Smooth Velocity Lerping
  const lerpFactor = targetVelocity.lengthSq() > 0 ? acceleration : friction;
  velocity.lerp(targetVelocity, lerpFactor * dt);

  // Smooth Rotation Lerping (Shortest Path)
  let yawDiff = targetYaw - facingYaw;
  while (yawDiff < -Math.PI) yawDiff += Math.PI * 2;
  while (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
  facingYaw += yawDiff * 10 * dt;

  if(keys['Space'] && isGrounded){
    verticalVel = 14;
    isGrounded = false;
  }

  playerPos.addScaledVector(velocity, dt);
  checkRuinCollision(playerPos, 0.8);
  
  // Gravity and Grounding
  verticalVel -= 35 * dt;
  playerPos.y += verticalVel * dt;
  const groundH = Math.max(getH(playerPos), 0);
  if (playerPos.y <= groundH) {
    playerPos.y = groundH;
    verticalVel = Math.max(0, verticalVel);
    isGrounded = true;
  } else isGrounded = false;

  char.position.copy(playerPos);
  char.rotation.set(0, facingYaw, 0);
  const spd=Math.sqrt(velocity.x**2+velocity.z**2);
  if(moving&&spd>.3&&isGrounded){animT+=dt*(running?18:6);applyWalk(animT,spd);}
  else resetWalk();
  updateStaffSwipeAnim(dt);
  updateLightning(dt);
  updateTornadoes(dt);
  updateGoblins(dt, playerPos);
  updateTrolls(dt, playerPos);
  updateWretches(dt, playerPos);
  updateHusks(dt, playerPos);
  updateZombies(dt, playerPos);
  updateRangers(dt, playerPos);
  updateIceElementals(dt, playerPos);
  updateEnvironment(dt);
  updateTreeDebris(dt);

  // Rain update
  if (rainActive) {
    const rainArr = rainSystem.geometry.attributes.position.array;
    for (let i = 0; i < rainCount; i++) {
      rainArr[i*3+1] -= 20 * dt;
      if (rainArr[i*3+1] < -2) {
        rainArr[i*3] = (Math.random() - 0.5) * 200;
        rainArr[i*3+1] = 40 + Math.random() * 10;
        rainArr[i*3+2] = (Math.random() - 0.5) * 200;
      }
    }
    rainSystem.geometry.attributes.position.needsUpdate = true;
    rainSystem.position.x = playerPos.x;
    rainSystem.position.z = playerPos.z;
  }

  // Dust particle update
  if (dustActive) {
    const dustArr = dustSystem.geometry.attributes.position.array;
    for (let i = 0; i < dustCount; i++) {
      dustArr[i*3] += dustVel[i*3] * dt * 2;
      dustArr[i*3+1] += dustVel[i*3+1] * dt * 1.5;
      dustArr[i*3+2] += dustVel[i*3+2] * dt * 2;
      if (dustArr[i*3+1] > 45 || Math.abs(dustArr[i*3]) > 210 || Math.abs(dustArr[i*3+2]) > 210) {
        dustArr[i*3] = (Math.random() - 0.5) * 400;
        dustArr[i*3+1] = Math.random() * 5;
        dustArr[i*3+2] = (Math.random() - 0.5) * 400;
      }
    }
    dustSystem.geometry.attributes.position.needsUpdate = true;
    dustSystem.position.x = playerPos.x;
    dustSystem.position.z = playerPos.z;
  }

  // Mana regen
  playerMana = Math.min(playerMaxMana, playerMana + 5 * dt);
  // Shield timer & visual
  if (shieldTimer > 0) {
    shieldTimer = Math.max(0, shieldTimer - dt);
    if (shieldMesh) { shieldMesh.position.copy(playerPos); shieldMesh.position.y += 0.5; shieldMesh.material.opacity = 0.15 + (shieldTimer / 10) * 0.2; }
  } else if (shieldMesh) { scene.remove(shieldMesh); shieldMesh.geometry.dispose(); shieldMesh.material.dispose(); shieldMesh = null; }
  // Update orbs
  updateOrbs();

  // NPC proximity check & dialogue auto-close
  if (npcGroup) {
    const npcDist = playerPos.distanceTo(npcPos);
    if (npcLabelSprite) {
      npcLabelSprite.visible = npcDist < 7 && !isInDialogue && !quest.rewarded;
    }
    if (isInDialogue && npcDist > 8) {
      hideDialogue();
    }
  }
  followerAttackCooldown = Math.max(0, followerAttackCooldown - dt);
  updateFollower(dt);

  // Handle Tree Blinking Reversion
  for (let i = treeBlinks.length - 1; i >= 0; i--) {
    const b = treeBlinks[i];
    b.time -= dt;
    if (b.time <= 0) {
      b.mesh.setColorAt(b.index, new THREE.Color(1, 1, 1));
      b.mesh.instanceColor.needsUpdate = true;
      treeBlinks.splice(i, 1);
    }
  }

  updateChunks();

  // Force camera yaw to stay behind the player's current facing rotation
  camYaw = facingYaw + Math.PI;

  // Smooth Camera Logic
  const camOffset = new THREE.Vector3(Math.sin(camYaw)*Math.cos(camPitch)*camDist, Math.sin(camPitch)*camDist, Math.cos(camYaw)*Math.cos(camPitch)*camDist);
  let desiredCamPos = playerPos.clone().add(camOffset);
  const lookAtPos = new THREE.Vector3(playerPos.x, playerPos.y + 1.2, playerPos.z);
  
  const camRayDir = new THREE.Vector3().subVectors(desiredCamPos, lookAtPos).normalize();
  camRaycaster.set(lookAtPos, camRayDir);
  camRaycaster.far = camDist; 
  const camHits = camRaycaster.intersectObjects(staticObjects, false);
  
  if (camHits.length > 0) {
    desiredCamPos.copy(camHits[0].point).addScaledVector(camRayDir, -0.5);
  }

  // Interpolate camera for smooth transitions during occlusion or movement
  // Using dt makes the smoothing consistent regardless of framerate
  const camSmooth = 15; 
  currentCameraPos.lerp(desiredCamPos, Math.min(dt * camSmooth, 1.0));
  currentLookAt.lerp(lookAtPos, Math.min(dt * (camSmooth * 1.5), 1.0));

  // Apply Camera Shake
  if (camShake > 0) {
    currentCameraPos.x += (Math.random() - 0.5) * camShake;
    currentCameraPos.y += (Math.random() - 0.5) * camShake;
    camShake *= 0.9; // Decay shake
  }

  camera.position.copy(currentCameraPos);
  camera.up.set(0, 1, 0);
  camera.lookAt(currentLookAt);
  renderer.render(scene, camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Get loading screen elements
const loadingScreen = document.getElementById('loading-screen');
const loadingIndicator = document.getElementById('loading-indicator');

function hideLoadingScreen() {
  loadingScreen.classList.add('hidden');
  loadingScreen.style.display = 'none';
  loadingIndicator.style.display = 'none';
}

// Force-hide loading screen after 5s regardless of errors
const loadingFallback = setTimeout(hideLoadingScreen, 5000);

try {
  // Initial camera setup for currentCameraPos and currentLookAt
  // This prevents a camera jump when animate() first runs.
  const initialCamOffset = new THREE.Vector3(Math.sin(camYaw)*Math.cos(camPitch)*camDist, Math.sin(camPitch)*camDist, Math.cos(camYaw)*Math.cos(camPitch)*camDist);
  let initialDesiredCamPos = playerPos.clone().add(initialCamOffset);
  const initialLookAtPos = new THREE.Vector3(playerPos.x, playerPos.y + 1.2, playerPos.z);

  // Initialize currentCameraPos and currentLookAt to avoid initial jump
  currentCameraPos.copy(initialDesiredCamPos);
  currentLookAt.copy(initialLookAtPos);
  camera.position.copy(currentCameraPos);
  camera.lookAt(currentLookAt);

  updateChunks(); // Initial load
  updateQuestUI(); // Init quest HUD state from sessionStorage

  loadingScreen.classList.add('hidden'); // Start fade out
  loadingScreen.addEventListener('transitionend', () => {
    loadingScreen.style.display = 'none';
    loadingIndicator.style.display = 'none';
  }, { once: true });
  clearTimeout(loadingFallback);
  animate(); // Start the game loop
} catch (e) {
  hideLoadingScreen();
}

  1: { name: 'Staff Swipe', stats: 'Melee AoE • 40 dmg • 6m radius • 0 mana', cost: 0 },
  2: { name: 'Lightning', stats: 'Ranged strike • 25-60 dmg • Hold to charge • 20 mana', cost: 20 },
  3: { name: 'Tornado', stats: 'Summon vortex • Pulls & damages foes • 8s duration • 35 mana', cost: 35 },
  4: { name: 'Teleport', stats: 'Instant travel to target location • 2000m range • 25 mana', cost: 25 },

};
const tooltipEl = document.getElementById('spell-tooltip');
document.querySelectorAll('.spell-icon').forEach(el => {
  el.addEventListener('mouseenter', e => {
    if (!tooltipEl) return;
    const icon = e.target.closest('.spell-icon');
    if (!icon) return;
    const id = parseInt(icon.dataset.spell, 10);
    const m = SPELL_META[id];

    tooltipEl.style.left = (r.left + r.width/2) + 'px';

    tooltipEl.style.transform = 'translate(-50%, -100%)';

  });

    if (id >= 1 && id <= 5) { selectedSpell = id; selectSpell(id); document.title = 'Spell ' + id; }

// Teleport visual effect (ring flash at destination)
function spawnTeleportFX(pos) {
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.2, 2, 24), new THREE.MeshBasicMaterial({color: 0x88ddff, transparent: true, opacity: 1, side: THREE.DoubleSide, blending: THREE.AdditiveBlending}));
  ring.position.copy(pos);
  ring.position.y += 0.1;
  ring.rotation.x = -Math.PI/2;
  scene.add(ring);
  const flash = new THREE.PointLight(0x88ddff, 20, 40);
  flash.position.copy(pos);
  flash.position.y += 2;
  scene.add(flash);
  let age = 0;
  const maxAge = 0.6;
  const anim = setInterval(() => {
    age += 1/60;
    const t = 1 - age/maxAge;
    ring.scale.setScalar(1 + (1-t)*4);
    ring.material.opacity = t;
    flash.intensity = t * 20;
    if (age >= maxAge) {
      scene.remove(ring); ring.material.dispose();
      scene.remove(flash);
      clearInterval(anim);
    }
  }, 1000/60);
}

let shieldMesh = null;
function spawnShieldFX() {
  if (shieldMesh) { scene.remove(shieldMesh); shieldMesh.geometry.dispose(); shieldMesh.material.dispose(); }
  const sGeo = new THREE.SphereGeometry(1.8, 16, 16);
  const sMat = new THREE.MeshBasicMaterial({color: 0x4488ff, transparent: true, opacity: 0.25, side: THREE.DoubleSide, blending: THREE.AdditiveBlending});
  shieldMesh = new THREE.Mesh(sGeo, sMat);
  shieldMesh.position.copy(playerPos);
  shieldMesh.position.y += 0.5;
  scene.add(shieldMesh);
}
