<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wizard Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  canvas { display: block; cursor: crosshair; }
  #action-hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(180,160,255,0.8); font-size: 13px; letter-spacing: 0.12em;
    text-transform: uppercase; pointer-events: none;
    text-shadow: 0 1px 6px rgba(100,60,255,0.9);
    transition: opacity 0.4s;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 16px; height: 16px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:rgba(255,50,50,0.5);
  }
  #crosshair::before { width:1px; height:100%; left:50%; top:0; }
  #crosshair::after  { width:100%; height:1px; top:50%; left:0; }
  #charge-ring {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    width:40px; height:40px; border-radius:50%;
    border: 2px solid rgba(120,80,255,0);
    pointer-events:none; transition: border-color 0.1s;
    box-shadow: 0 0 0 0 rgba(120,80,255,0);
  }
</style>
</head>
<body>
<div id="action-hint">staff sheathed</div>
<div id="crosshair"></div>
<div id="charge-ring"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.018);
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 500);
const ambient = new THREE.AmbientLight(0x1a1a2e, 0.2);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffccaa, 0.6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{far:300,left:-120,right:120,top:120,bottom:-120});
scene.add(sun);

const moon = new THREE.DirectionalLight(0xaaaaff, 0.2);
moon.castShadow = false; // Moon shadows are expensive, disabling for performance
scene.add(moon);

const fill=new THREE.DirectionalLight(0x443366,0.2); fill.position.set(-40,20,-20); scene.add(fill);

// ── Day/Night State ───────────────────────────────────────────────────────────
let gameTime = 6; // Starts at 6 AM
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0; i<3000; i++) {
  const x = (Math.random()-0.5)*1000;
  const y = 40 + Math.random()*150;
  const z = (Math.random()-0.5)*1000;
  starPos.push(x,y,z);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.4, transparent:true, opacity:0}));
scene.add(stars);

// ── Procedural Soft Texture for Atmospheric Effects ──────────────────────────
function createSoftTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(canvas);
}
const softTex = createSoftTexture();

// ── Clouds & Mist ─────────────────────────────────────────────────────────────
const clouds = new THREE.Group();
const cloudMat = new THREE.MeshLambertMaterial({ map: softTex, transparent: true, opacity: 0.6, depthWrite: false });
for(let i=0; i<30; i++) {
  const cg = new THREE.Group();
  const count = 6 + Math.random()*6;
  for(let j=0; j<count; j++) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), cloudMat);
    m.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*8, (Math.random()-0.5)*25);
    m.rotation.z = Math.random() * Math.PI;
    cg.add(m);
  }
  cg.position.set((Math.random()-0.5)*400, 50+Math.random()*30, (Math.random()-0.5)*400);
  cg.userData.speed = 0.2 + Math.random()*0.8;
  clouds.add(cg);
}
scene.add(clouds);

const mist = new THREE.Group();
const mistMat = new THREE.MeshLambertMaterial({ map: softTex, transparent: true, opacity: 0.2, depthWrite: false, side: THREE.DoubleSide });
for(let i=0; i<150; i++) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), mistMat);
  const mx = (Math.random()-0.5)*250;
  const mz = (Math.random()-0.5)*250;
  m.position.set(mx, getH(mx, mz) + 1, mz);
  m.rotation.x = -Math.PI/2;
  m.userData.phase = Math.random() * Math.PI * 2;
  mist.add(m);
}
scene.add(mist);

function updateEnvironment(dt) {
  gameTime = (gameTime + dt / 60) % 24; // 1 hour = 1 minute real time
  const dayAngle = ((gameTime - 6) / 24) * Math.PI * 2;
  const sunUp = Math.sin(dayAngle);
  const dusk = Math.max(0, 1 - Math.abs(sunUp) * 5);
  
  sun.position.set(Math.cos(dayAngle)*180, Math.sin(dayAngle)*180, 50);
  moon.position.set(Math.cos(dayAngle + Math.PI)*180, Math.sin(dayAngle + Math.PI)*180, -50);

  sun.intensity = Math.max(0, sunUp) * 1.5;
  moon.intensity = Math.max(0, -sunUp) * 0.4;
  ambient.intensity = 0.2 + Math.max(0, sunUp) * 0.5;
  stars.material.opacity = Math.max(0, -sunUp);

  // Dynamic cloud/mist coloring
  const cloudCol = new THREE.Color(0x111115).lerp(new THREE.Color(0xddddff), Math.max(0, sunUp));
  if(dusk > 0) cloudCol.lerp(new THREE.Color(0xffaa44), dusk);
  cloudMat.color.copy(cloudCol);
  mistMat.color.copy(cloudCol);
  mistMat.opacity = (0.15 + dusk * 0.2) * (sunUp < 0 ? 0.5 : 1.0);

  mist.children.forEach(m => {
    m.position.y += Math.sin(Date.now()*0.001 + m.userData.phase) * 0.005;
  });

  const skyCol = new THREE.Color(0x050508).lerp(new THREE.Color(0x405060), Math.max(0, sunUp));
  if(Math.abs(sunUp) < 0.2) skyCol.lerp(new THREE.Color(0x4a3a2a), 1 - Math.abs(sunUp)*5); // Dawn/Dusk tint
  scene.background = skyCol;
  scene.fog.color = skyCol;

  clouds.children.forEach(c => {
    c.position.x += c.userData.speed * dt * 3;
    if(c.position.x > 300) c.position.x = -300;
    c.lookAt(camera.position); // Billboarding
  });
  stars.rotation.y += dt * 0.005;
}

function getH(x,z){
  const d=Math.sqrt(x*x+z*z), blend=Math.max(0,Math.min(1,(d-14)/18));
  return(Math.sin(x*.04)*Math.cos(z*.04)*6+Math.sin(x*.08+1.2)*Math.cos(z*.07)*3+Math.sin(x*.02-.5)*Math.cos(z*.015+.8)*8)*blend;
}
const tGeo=new THREE.PlaneGeometry(300,300,90,90); tGeo.rotateX(-Math.PI/2);
const tp=tGeo.attributes.position;
for(let i=0;i<tp.count;i++) tp.setY(i,getH(tp.getX(i),tp.getZ(i)));
tGeo.computeVertexNormals();
const terrain=new THREE.Mesh(tGeo,new THREE.MeshLambertMaterial({color:0x1a211a}));
terrain.receiveShadow=true; scene.add(terrain);
const GRASS_COUNT=120000;
const gMesh=new THREE.InstancedMesh(new THREE.PlaneGeometry(.12,.6),new THREE.MeshLambertMaterial({color:0x223322,side:THREE.DoubleSide}),GRASS_COUNT);
scene.add(gMesh);
const _d=new THREE.Object3D();
for(let i=0;i<GRASS_COUNT;i++){
  const gx=(Math.random()-.5)*260,gz=(Math.random()-.5)*260;
  _d.position.set(gx,getH(gx,gz)+.3,gz);
  _d.rotation.set((Math.random()-.5)*.3,Math.random()*Math.PI,0);
  _d.scale.set(1,.6+Math.random()*.9,1);
  _d.updateMatrix(); gMesh.setMatrixAt(i,_d.matrix);
  gMesh.setColorAt(i,new THREE.Color().setHSL(.26+Math.random()*.08,.4+Math.random()*.2,.1+Math.random()*.1));
}
gMesh.instanceMatrix.needsUpdate=true;
if(gMesh.instanceColor) gMesh.instanceColor.needsUpdate=true;
function makeTree(x,z){
  const gh=getH(x,z), g=new THREE.Group();
  const type=Math.random();

  if(type<0.5){
    const th=4+Math.random()*3;
    const barkM=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.07,.4,.08+Math.random()*.05)});
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.1,.28,th,8),barkM);
    trunk.position.y=th/2; trunk.castShadow=true; g.add(trunk);
    for(let r=0;r<3;r++){
      const ring=new THREE.Mesh(new THREE.CylinderGeometry(.29+r*.01,.29+r*.01,.06,8),barkM);
      ring.position.y=.4+r*(th*.28); g.add(ring);
    }
    const layers=5+Math.floor(Math.random()*3);
    for(let l=0;l<layers;l++){
      const pct=l/layers;
      const radius=(.22+(1-pct)*1.9)*(1+Math.random()*.15);
      const height=1.4+Math.random()*.4;
      const fCol=new THREE.Color().setHSL(.28+Math.random()*.05,.6,.12+Math.random()*.08);
      const fMat=new THREE.MeshLambertMaterial({color:fCol});
      const cone=new THREE.Mesh(new THREE.ConeGeometry(radius,height,8),fMat);
      cone.position.y=th*.45+pct*(th*.6);
      cone.rotation.y=Math.random()*Math.PI;
      cone.castShadow=true; g.add(cone);
      if(l<layers-1){
        for(let b=0;b<3;b++){
          const ang=b*(Math.PI*2/3)+Math.random()*.4;
          const br=new THREE.Mesh(new THREE.CylinderGeometry(.025,.04,.5,5),barkM);
          br.position.set(Math.sin(ang)*radius*.5, cone.position.y-.2, Math.cos(ang)*radius*.5);
          br.rotation.z=Math.PI/2-Math.random()*.3;
          br.rotation.y=ang; g.add(br);
        }
      }
    }
    const tip=new THREE.Mesh(new THREE.ConeGeometry(.08,.4,6),new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.3,.6,.15)}));
    tip.position.y=th*.45+(th*.6)+.3; g.add(tip);

  } else if(type<0.82){
    const th=3+Math.random()*2.5;
    const barkCol=new THREE.Color().setHSL(.07,.35,.15+Math.random()*.1);
    const barkM=new THREE.MeshLambertMaterial({color:barkCol});
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.14,.32,th,9),barkM);
    trunk.position.y=th/2; trunk.castShadow=true; g.add(trunk);
    for(let r=0;r<4;r++){
      const ang=r*Math.PI/2+Math.random()*.3;
      const root=new THREE.Mesh(new THREE.CylinderGeometry(.04,.12,.6,5),barkM);
      root.position.set(Math.sin(ang)*.28,0.2,Math.cos(ang)*.28);
      root.rotation.z=Math.sin(ang)*.5; root.rotation.x=Math.cos(ang)*.5;
      g.add(root);
    }
    const numBranches=3+Math.floor(Math.random()*3);
    for(let b=0;b<numBranches;b++){
      const ang=b*(Math.PI*2/numBranches)+Math.random()*.5;
      const bh=.5+Math.random()*.8;
      const branch=new THREE.Mesh(new THREE.CylinderGeometry(.04,.09,bh,5),barkM);
      branch.position.set(Math.sin(ang)*.3,th*.7+Math.random()*.4,Math.cos(ang)*.3);
      branch.rotation.z=Math.sin(ang)*.7; branch.rotation.x=Math.cos(ang)*.7;
      branch.castShadow=true; g.add(branch);
    }
    const fCol=new THREE.Color().setHSL(.3+Math.random()*.05,.55,.22+Math.random()*.12);
    const fMat=new THREE.MeshLambertMaterial({color:fCol});
    const fCol2=new THREE.Color().setHSL(.27+Math.random()*.04,.6,.18+Math.random()*.1);
    const fMat2=new THREE.MeshLambertMaterial({color:fCol2});
    const mainBlob=new THREE.Mesh(new THREE.SphereGeometry(1.6+Math.random()*.5,8,6),fMat);
    mainBlob.scale.y=0.75+Math.random()*.2;
    mainBlob.position.y=th*.85; mainBlob.castShadow=true; g.add(mainBlob);
    for(let c=0;c<5+Math.floor(Math.random()*4);c++){
      const ang=Math.random()*Math.PI*2, rad=.8+Math.random()*.8;
      const sz=.7+Math.random()*.7;
      const blob=new THREE.Mesh(new THREE.SphereGeometry(sz,7,5),Math.random()<.5?fMat:fMat2);
      blob.position.set(Math.sin(ang)*rad, th*.75+Math.random()*.8, Math.cos(ang)*rad);
      blob.scale.y=0.7+Math.random()*.4;
      blob.castShadow=true; g.add(blob);
    }

  } else {
    const th=4.5+Math.random()*2;
    const barkM=new THREE.MeshLambertMaterial({color:0xddd8cc});
    const darkM=new THREE.MeshLambertMaterial({color:0x888070});
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.1,.18,th,7),barkM);
    trunk.position.y=th/2; trunk.castShadow=true; g.add(trunk);
    for(let r=0;r<5;r++){
      const band=new THREE.Mesh(new THREE.CylinderGeometry(.185,.185,.05,7),darkM);
      band.position.y=.5+r*(th/5.5); g.add(band);
    }
    const fMat=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.32+Math.random()*.04,.5,.28+Math.random()*.1)});
    for(let c=0;c<8+Math.floor(Math.random()*5);c++){
      const ang=Math.random()*Math.PI*2, rad=.3+Math.random()*1.1, ht=th*.55+Math.random()*th*.4;
      const sz=.4+Math.random()*.7;
      const blob=new THREE.Mesh(new THREE.SphereGeometry(sz,6,5),fMat);
      blob.scale.set(1+Math.random()*.4,.6+Math.random()*.3,1+Math.random()*.4);
      blob.position.set(Math.sin(ang)*rad,ht,Math.cos(ang)*rad);
      blob.castShadow=true; g.add(blob);
    }
  }

  g.position.set(x,gh,z);
  g.rotation.y=Math.random()*Math.PI*2;
  g.rotation.z=(Math.random()-.5)*.04;
  scene.add(g);
}
for(let i=0;i<220;i++){
  let x,z; do{x=(Math.random()-.5)*240;z=(Math.random()-.5)*240;}while(Math.sqrt(x*x+z*z)<12);
  makeTree(x,z);
}
const skinM  = new THREE.MeshLambertMaterial({color:0xf0c8a0});
const robeM  = new THREE.MeshLambertMaterial({color:0x555555});
const robeAccM = new THREE.MeshLambertMaterial({color:0x444444});
const shoeM  = new THREE.MeshLambertMaterial({color:0x1a1212});
const hatM   = new THREE.MeshLambertMaterial({color:0x444444});
const hatBrimM = new THREE.MeshLambertMaterial({color:0x333333});
const staffWoodM = new THREE.MeshLambertMaterial({color:0x3d2b1f});
const crystalM = new THREE.MeshLambertMaterial({color:0xff66cc,emissive:0x881166,emissiveIntensity:0.8});
const beardM = new THREE.MeshLambertMaterial({color:0xeeeeee});

function bx(w,h,d,m){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.castShadow=true;return o;}
function cy(r,h,m,s=8){const o=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),m);o.castShadow=true;return o;}
function cone(rb,rt,h,m,s=8){const o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);o.castShadow=true;return o;}
const char = new THREE.Group(); scene.add(char);
const torso = cone(.28, .36, .65, robeM); torso.position.y=1.1; char.add(torso);
const hips  = cone(.55, .28, .8, robeM); hips.position.y=.7; char.add(hips);
const head  = bx(.3,.3,.28,skinM); head.position.y=1.54; char.add(head);
const neck  = cy(.072,.12,skinM); neck.position.y=1.38; char.add(neck);
const beard = cone(.16, .02, .75, beardM, 6); beard.position.set(0, 1.25, .12); beard.rotation.x = -0.15; char.add(beard);
const hatGroup = new THREE.Group(); hatGroup.position.y=1.54; char.add(hatGroup);
const brim = new THREE.Mesh(new THREE.CylinderGeometry(.38,.38,.04,16),hatBrimM); brim.position.y=.17; hatGroup.add(brim);
const hatCone = cone(.26,.04,0.85,hatM,12); hatCone.position.set(0, 0.6, -0.05); hatCone.rotation.x = -0.1; hatGroup.add(hatCone);
const tipOrb = new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),crystalM); tipOrb.position.set(0, 1.05, -0.1); hatGroup.add(tipOrb);

const lShoulder=new THREE.Group(); lShoulder.position.set(-.29,1.23,0); char.add(lShoulder);
const lUA=cone(.16, .13, .31, robeM); lUA.position.set(0,-.155,0); lShoulder.add(lUA);
const lElbow=new THREE.Group(); lElbow.position.y=-.31; lShoulder.add(lElbow);
const lLA=bx(.11,.29,.11,skinM); lLA.position.set(0,-.145,0); lElbow.add(lLA);

const rShoulder=new THREE.Group(); rShoulder.position.set(.29,1.23,0); char.add(rShoulder);
const rUA=cone(.16, .13, .31, robeM); rUA.position.set(0,-.155,0); rShoulder.add(rUA);
const rElbow=new THREE.Group(); rElbow.position.y=-.31; rShoulder.add(rElbow);
const rLA=bx(.11,.29,.11,skinM); rLA.position.set(0,-.145,0); rElbow.add(rLA);
const lHip=new THREE.Group(); lHip.position.set(-.12,.65,0); char.add(lHip);
const lThigh=bx(.15,.34,.15,robeM); lThigh.position.set(0,-.17,0); lHip.add(lThigh);
const lKnee=new THREE.Group(); lKnee.position.y=-.34; lHip.add(lKnee);
const lShin=bx(.12,.34,.12,robeM); lShin.position.set(0,-.17,0); lKnee.add(lShin);
const lFoot=bx(.13,.08,.24,shoeM); lFoot.position.set(0,-.38,.05); lKnee.add(lFoot);

const rHip=new THREE.Group(); rHip.position.set(.12,.65,0); char.add(rHip);
const rThigh=bx(.15,.34,.15,robeM); rThigh.position.set(0,-.17,0); rHip.add(rThigh);
const rKnee=new THREE.Group(); rKnee.position.y=-.34; rHip.add(rKnee);
const rShin=bx(.12,.34,.12,robeM); rShin.position.set(0,-.17,0); rKnee.add(rShin);
const rFoot=bx(.13,.08,.24,shoeM); rFoot.position.set(0,-.38,.05); rKnee.add(rFoot);
const staffGroup = new THREE.Group();
const shaft = cy(.045,1.8,staffWoodM,7); shaft.position.y=.9; staffGroup.add(shaft);
const crystalTop = new THREE.Mesh(new THREE.OctahedronGeometry(.12,0),crystalM);
crystalTop.position.y=1.85; staffGroup.add(crystalTop);
const glowOrb = new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),new THREE.MeshLambertMaterial({color:0xffaaff,emissive:0xaa33ff,emissiveIntensity:1.2}));
glowOrb.position.y=1.85; staffGroup.add(glowOrb);
const staffLight = new THREE.PointLight(0xcc55ff, 0, 10);
staffGroup.add(staffLight); staffLight.position.y=1.85;
const staffPivot = new THREE.Group();
staffPivot.position.set(0,-.62,0);
rElbow.add(staffPivot);
staffPivot.add(staffGroup);
staffGroup.position.set(.12,-.3,.0);
staffGroup.rotation.set(0,0,0);
let staffDrawn = false;
function detachStaff(){
  if(staffGroup.parent) staffGroup.parent.remove(staffGroup);
}
function setStaffSheathed(){
  detachStaff();
  char.add(staffGroup);
  staffGroup.position.set(-.3, .6, -.14);
  staffGroup.rotation.set(0, .4, .9);
  staffLight.intensity = 0.2;
}
function setStaffDrawn(){
  detachStaff();
  staffPivot.add(staffGroup);
  staffGroup.position.set(.1,-.28,.0);
  staffGroup.rotation.set(0,0,0);
  staffLight.intensity = 1.2;
}
setStaffSheathed();
const lightningBolts = [];
function makeLightningGeometry(start, end, forks=4, spread=0.7){
  const points=[];
  function segment(a,b,depth){
    if(depth<=0){ points.push(a,b); return; }
    const mid=new THREE.Vector3().lerpVectors(a,b,.5);
    mid.x+=(Math.random()-.5)*spread;
    mid.y+=(Math.random()-.5)*spread;
    mid.z+=(Math.random()-.5)*spread;
    segment(a,mid,depth-1);
    segment(mid,b,depth-1);
    if(depth===2&&Math.random()<.5){
      const forkEnd=mid.clone().add(new THREE.Vector3((Math.random()-.5)*spread*2,-(Math.random()*spread),(Math.random()-.5)*spread*2));
      segment(mid,forkEnd,depth-2);
    }
  }
  segment(start,end,forks);
  return points;
}
function spawnLightning(from, to, range){
  const spread = range ? 1.5 : 0.5;
  const pts = makeLightningGeometry(from.clone(), to.clone(), range?5:3, spread);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0xee88ff, linewidth:3, transparent:true, opacity:1.0});
  const bolt = new THREE.LineSegments(geo, mat);
  scene.add(bolt);
  const corePts = [from.clone(), to.clone()];
  const coreGeo = new THREE.BufferGeometry().setFromPoints(corePts);
  const coreMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.9});
  const core = new THREE.Line(coreGeo, coreMat);
  scene.add(core);
  const flash = new THREE.PointLight(0xcc88ff, 6, range ? 25 : 10);
  flash.position.copy(to);
  scene.add(flash);
  const impactMesh = new THREE.Mesh(
    new THREE.SphereGeometry(range ? .6 : .25, 8, 8),
    new THREE.MeshBasicMaterial({color:0xcc88ff, transparent:true, opacity:0.8})
  );
  impactMesh.position.copy(to); scene.add(impactMesh);

  lightningBolts.push({ bolt, core, flash, impactMesh, age:0, maxAge: range ? 0.45 : 0.25 });
}
function updateLightning(dt){
  for(let i=lightningBolts.length-1;i>=0;i--){
    const b=lightningBolts[i];
    b.age+=dt;
    const t=1-b.age/b.maxAge;
    b.bolt.material.opacity=t*0.9;
    b.core.material.opacity=t;
    b.flash.intensity=t*4;
    b.impactMesh.material.opacity=t*0.7;
    b.impactMesh.scale.setScalar(1+b.age*3);
    if(b.age>=b.maxAge){
      scene.remove(b.bolt,b.core,b.flash,b.impactMesh);
      lightningBolts.splice(i,1);
    }
  }
}
const particles = [];
function spawnSplash(pos, color=0x880000, count=8){
  const geo = new THREE.BoxGeometry(0.08,0.08,0.08);
  const mat = new THREE.MeshBasicMaterial({color});
  for(let i=0; i<count; i++){
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const vel = new THREE.Vector3((Math.random()-.5)*6, Math.random()*6, (Math.random()-.5)*6);
    particles.push({mesh:p, vel, life:1.0});
    scene.add(p);
  }
}
function updateParticles(dt){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.life -= dt * 1.5;
    p.vel.y -= 15 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.scale.setScalar(p.life);
    if(p.life <= 0){ scene.remove(p.mesh); particles.splice(i,1); }
  }
}

// ── Lightning cast ─────────────────────────────────────────────────────────────
function triggerLightning(holdTime){
  const range = holdTime > 0.8;
  // Staff tip world position
  const tipWorld = new THREE.Vector3();
  crystalTop.getWorldPosition(tipWorld);

  // Raycast from camera center through crosshair
  const raycaster = new THREE.Raycaster();
  // Traditional RPG targeting: always fire toward the screen center (crosshair)
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const ray = raycaster.ray;

  let targetPos;
  if(range){
    // Long range: travel far along ray
    const dist = 40 + holdTime * 15;
    targetPos = ray.origin.clone().addScaledVector(ray.direction, dist);
    targetPos.y = Math.max(targetPos.y, getH(targetPos.x, targetPos.z) + .3);
    hintEl.textContent='⚡ LIGHTNING STRIKE ⚡';
    camShake = 0.6;
  } else {
    // Short range: 8 units along ray
    targetPos = ray.origin.clone().addScaledVector(ray.direction, 8);
    hintEl.textContent='⚡ bolt ⚡';
  }
  setTimeout(()=>{ hintEl.textContent='staff drawn — click: swing | hold+release: lightning'; },800);

  // Face character toward target
  const dx=targetPos.x-playerPos.x, dz=targetPos.z-playerPos.z;
  facingYaw=Math.atan2(dx,dz);

  // Raise casting arm
  swinging=false;
  rShoulder.rotation.x=-1.2;
  rElbow.rotation.x=0.3;
  setTimeout(()=>{ rShoulder.rotation.x=0; rElbow.rotation.x=0; },400);

  spawnLightning(tipWorld, targetPos, range);
  
  // FIX: Actually deal damage to enemies in the impact radius!
  checkLightningHitsGoblins(targetPos, range ? 4.5 : 2.0, range ? 35 : 15);

  // Secondary bolt for long range
  if(range){
    const scatter = targetPos.clone().add(new THREE.Vector3((Math.random()-.5)*4,0,(Math.random()-.5)*4));
    scatter.y = Math.max(scatter.y, getH(scatter.x,scatter.z)+.2);
    setTimeout(()=>spawnLightning(tipWorld, scatter, true), 80);
  }
}

// Health bar canvas
function makeHealthBar(){
  const canvas = document.createElement('canvas');
  canvas.width=128; canvas.height=20;
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.4,.22,1);
  return {sprite, canvas, tex, ctx:canvas.getContext('2d')};
}
function updateHealthBar(hb, hp, maxHp){
  const {ctx,canvas,tex}=hb;
  ctx.clearRect(0,0,128,20);
  ctx.fillStyle='rgba(26,0,0,0.8)'; ctx.fillRect(1,1,126,18);
  const pct=Math.max(0,hp/maxHp);
  const col=pct>.5?`rgb(${Math.round((1-pct)*2*255)},200,0)`:`rgb(255,${Math.round(pct*2*200)},0)`;
  ctx.fillStyle=col; ctx.fillRect(2,2,Math.round(124*pct),16);
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(1,1,126,18);
  tex.needsUpdate=true;
}

// Goblin states
const GOBLIN_IDLE=0, GOBLIN_PATROL=1, GOBLIN_CHASE=2, GOBLIN_ATTACK=3, GOBLIN_HIT=4, GOBLIN_DEAD=5;

function spawnGoblin(x,z){

    animT:0,

function applyGoblinWalk(m, t, spd){
  const s=Math.min(spd/3,1);
  m.lLeg.rotation.x=Math.sin(t)*.7*s;
  m.rLeg.rotation.x=-Math.sin(t)*.7*s;
  m.lKnee.rotation.x=Math.max(0,Math.sin(t))*.8*s;
  m.rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.8*s;
  m.lArm.rotation.x=-Math.sin(t)*.6*s;
  m.rArm.rotation.x=Math.sin(t)*.6*s;
}
function applyGoblinAttack(m, t){
  const arc=Math.sin(t*Math.PI)*1.8;
  m.rArm.rotation.x=-arc;
  m.rFArm.rotation.x=Math.max(0,arc)*.5;
}
function damageGoblin(goblin, dmg){
  if(goblin.dead) return;
  goblin.hp=Math.max(0,goblin.hp-dmg);
  updateHealthBar(goblin.hb, goblin.hp, goblin.maxHp);
  spawnSplash(goblin.pos.clone().setY(goblin.pos.y+0.8), 0x770000, 10);
  goblin.state=GOBLIN_HIT;
  goblin.hitTimer=0.25;
  goblin.mesh.group.traverse(c=>{
    if(c.isMesh) { c._origMat=c._origMat||c.material; c.material=new THREE.MeshLambertMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1}); }
  });
  setTimeout(()=>{
    goblin.mesh.group.traverse(c=>{ if(c.isMesh&&c._origMat){ c.material=c._origMat; } });
  },150);
  if(goblin.hp<=0) killGoblin(goblin);
}
function killGoblin(goblin){
  goblin.dead=true;
  goblin.exploded=false;
  goblin.state=GOBLIN_DEAD;
  goblin.deathTimer=0;
  goblin.hb.sprite.visible=false;
  goblin.mesh.group.traverse(c=>{
    if(c.isMesh) c.material=new THREE.MeshLambertMaterial({color:0x3a4a2a});
  });
  goblin.deathVel = new THREE.Vector3((Math.random()-0.5)*15, 25 + Math.random()*25, (Math.random()-0.5)*15);
  goblin.deathRot = new THREE.Vector3(Math.random()*12, Math.random()*12, Math.random()*12);
}
function checkLightningHitsGoblins(impactPos, radius, dmg){
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const dist=gb.pos.distanceTo(impactPos);
    if(dist<radius) damageGoblin(gb,dmg);
  });
}
function checkSwingHitsGoblins(){
  if (!staffDrawn) return;
  // Baseball swing hit detection: broad frontal arc
  const forward = new THREE.Vector3(0,0,1).applyQuaternion(char.quaternion);
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const toGob = gb.pos.clone().sub(playerPos);
    const dist = toGob.length();
    if(dist < 3.8){ // Increased reach for the swing sweep
      toGob.normalize();
      const dot = forward.dot(toGob);
      if(dot > 0.2) damageGoblin(gb, 20); // Hits anything in a ~150 degree arc
    }
  });
}

function updateGoblins(dt, playerPos){
  goblins.forEach(gb=>{
    if(gb.dead){
      if(gb.exploded) return;
      gb.deathTimer+=dt;
      gb.deathVel.y -= 6 * dt; // Lower gravity for a floatier launch
      gb.pos.addScaledVector(gb.deathVel, dt);
      gb.mesh.group.position.copy(gb.pos);
      gb.mesh.group.rotation.x += gb.deathRot.x * dt;
      gb.mesh.group.rotation.y += gb.deathRot.y * dt;
      gb.mesh.group.rotation.z += gb.deathRot.z * dt;

      if(gb.pos.y > 80){
        gb.exploded = true;
        spawnSplash(gb.pos, 0xee88ff, 40);
        const f = new THREE.PointLight(0xcc88ff, 15, 40);
        f.position.copy(gb.pos);
        scene.add(f);
        setTimeout(()=>scene.remove(f), 150);
        scene.remove(gb.mesh.group);
        scene.remove(gb.hb.sprite);
      }

      if(gb.deathTimer>6){
        scene.remove(gb.mesh.group);
        scene.remove(gb.hb.sprite);
      }
      return;
    }
    gb.stateTimer+=dt;
    gb.attackCooldown=Math.max(0,gb.attackCooldown-dt);
    if(gb.hitTimer>0){ gb.hitTimer-=dt; return; }
    const distToPlayer=gb.pos.distanceTo(playerPos);
    const DETECT_RANGE=22, CHASE_RANGE=30, ATTACK_RANGE=1.8;
    if(gb.state!==GOBLIN_ATTACK){
      if(distToPlayer<ATTACK_RANGE && gb.attackCooldown<=0){
        gb.state=GOBLIN_ATTACK; gb.animT=0; gb.stateTimer=0;
      } else if(distToPlayer<DETECT_RANGE){
        gb.state=GOBLIN_CHASE;
      } else if(distToPlayer>CHASE_RANGE && gb.state===GOBLIN_CHASE){
        gb.state=GOBLIN_PATROL; gb.stateTimer=0;
      }
    }
    let speed=0;
    if(gb.state===GOBLIN_PATROL){
      if(gb.stateTimer>4||gb.pos.distanceTo(gb.patrolTarget)<1.5){
        gb.patrolTarget.set(gb.pos.x+(Math.random()-.5)*18,0,gb.pos.z+(Math.random()-.5)*18);
        gb.stateTimer=0;
      }
      const dx=gb.patrolTarget.x-gb.pos.x, dz=gb.patrolTarget.z-gb.pos.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>0.5){
        const tx=dx/dist, tz=dz/dist;
        gb.vel.x=tx*1.8; gb.vel.z=tz*1.8;
        gb.facingYaw=Math.atan2(tx,tz);
        speed=1.8;
      } else { gb.vel.x*=.8; gb.vel.z*=.8; }
    } else if(gb.state===GOBLIN_CHASE){
      const dx=playerPos.x-gb.pos.x, dz=playerPos.z-gb.pos.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>0.1){
        const tx=dx/dist, tz=dz/dist;
        const spd=4.5;
        gb.vel.x=tx*spd; gb.vel.z=tz*spd;
        gb.facingYaw=Math.atan2(tx,tz);
        speed=spd;
      }
    } else if(gb.state===GOBLIN_ATTACK){
      gb.vel.x*=.7; gb.vel.z*=.7;
      gb.animT+=dt*5;
      applyGoblinAttack(gb.mesh,gb.animT);
      const dx=playerPos.x-gb.pos.x, dz=playerPos.z-gb.pos.z;
      gb.facingYaw=Math.atan2(dx,dz);
      if(gb.animT>0.5 && gb.animT<0.6 && gb.attackCooldown<=0){
        if(distToPlayer<ATTACK_RANGE+.3){ damagePlayer(8); }
        gb.attackCooldown=2.2;
      }
      if(gb.animT>=1){
        gb.state=GOBLIN_CHASE; gb.animT=0;
        gb.mesh.rArm.rotation.x=0; gb.mesh.rFArm.rotation.x=0;
      }
    }

    // Move
    gb.pos.x+=gb.vel.x*dt; gb.pos.z+=gb.vel.z*dt;
    gb.pos.x=Math.max(-140,Math.min(140,gb.pos.x));
    gb.pos.z=Math.max(-140,Math.min(140,gb.pos.z));
    gb.pos.y=getH(gb.pos.x,gb.pos.z);

    gb.mesh.group.position.copy(gb.pos);
    gb.mesh.group.rotation.y+=(gb.facingYaw-gb.mesh.group.rotation.y)*.2;

    // Walk anim
    if(gb.state!==GOBLIN_ATTACK){
      gb.animT+=dt*(speed>2?8:5);
      applyGoblinWalk(gb.mesh,gb.animT,speed);
    }

    // Health bar floats above head
    gb.hb.sprite.position.set(gb.pos.x, gb.pos.y+1.6, gb.pos.z);
    // Only show health bar when damaged or nearby
    gb.hb.sprite.visible = (gb.hp<gb.maxHp || distToPlayer<12);
  });
}

// ── Player state ──────────────────────────────────────────────────────────────
const cameraTarget = new THREE.Vector3();
const cameraLerpSpeed = 0.12;
camera.position.set(0, 10, 10); // Starting offset

const playerPos=new THREE.Vector3();
const velocity=new THREE.Vector3();
let facingYaw=0, animT=0, moving=false;
const clock=new THREE.Clock();

// ── Walk animation ─────────────────────────────────────────────────────────────
function applyWalk(t,spd){
  if(swinging) return;
  const s=Math.min(spd/3.5,1);
  lHip.rotation.x=Math.sin(t)*.65*s;
  rHip.rotation.x=-Math.sin(t)*.65*s;
  lKnee.rotation.x=Math.max(0,Math.sin(t))*.9*s;
  rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.9*s;
  if(!swinging){
    lShoulder.rotation.x=-Math.sin(t)*.5*s;
    rShoulder.rotation.x=Math.sin(t)*.5*s;
  }
  torso.rotation.z=Math.sin(t)*.04*s;
}
function resetWalk(){
  [lHip,rHip,lKnee,rKnee].forEach(p=>{p.rotation.x*=.85;});
  if(!swinging){ 
    lShoulder.rotation.x*=.85; rShoulder.rotation.x*=.85; 
    rShoulder.rotation.y*=.85; 
    rElbow.rotation.z*=.85;
    torso.rotation.y*=.85;
  }
  torso.rotation.z*=.85;
}
const hintElSpeed = document.getElementById('speed-indicator');
const speedEl = document.createElement('div');
speedEl.style.cssText='position:fixed;bottom:48px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8)';
document.body.appendChild(speedEl);
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  if(playerHp <= 0) {
    renderer.render(scene, camera);
    return;
  }
  if(isCharging && staffDrawn){
    const held=(performance.now()-chargeStart)/1000;
    const pct=Math.min(held/.8,1);
    const r=Math.round(120+pct*80),g=Math.round(80-pct*40),b=255;
    chargeRing.style.borderColor=`rgba(${r},${g},${b},${0.4+pct*.6})`;
    chargeRing.style.boxShadow=`0 0 ${8+pct*20}px ${pct*8}px rgba(${r},${g},${b},${0.3+pct*.5})`;
    chargeRing.style.width=`${40+pct*20}px`;
    chargeRing.style.height=`${40+pct*20}px`;
  }
  const pulse=.8+Math.sin(clock.elapsedTime*3)*.2;
  crystalM.emissiveIntensity=pulse*.7;
  staffLight.intensity=(staffDrawn ? 1.0 : 0.6) + Math.sin(clock.elapsedTime*3)*.4;
  crystalTop.rotation.y+=dt*1.5;

  const running=keys['ShiftLeft']||keys['ShiftRight'];
  const speed=running?8.5:3.8;
  moving=false;
  const dir=new THREE.Vector3();
  if(keys['KeyW']){dir.z-=1;moving=true;}
  if(keys['KeyS']){dir.z+=1;moving=true;}
  if(keys['KeyA']){dir.x-=1;moving=true;}
  if(keys['KeyD']){dir.x+=1;moving=true;}
  if(dir.length()>0){
    dir.normalize().applyEuler(new THREE.Euler(0,camYaw,0));
    velocity.x=dir.x*speed; velocity.z=dir.z*speed;
    facingYaw=Math.atan2(dir.x,dir.z);
  } else { velocity.x*=.82; velocity.z*=.82; }
  playerPos.x+=velocity.x*dt; playerPos.z+=velocity.z*dt;
  if(Math.sqrt(playerPos.x**2+playerPos.z**2)>140){playerPos.x*=.985;playerPos.z*=.985;}
  playerPos.y=getH(playerPos.x,playerPos.z);
  char.rotation.y+=(facingYaw-char.rotation.y)*.18;
  char.position.copy(playerPos);
  const spd=Math.sqrt(velocity.x**2+velocity.z**2);
  if(moving&&spd>.3){animT+=dt*(running?10:6);applyWalk(animT,spd);}
  else resetWalk();
  updateSwingAnim(dt);
  updateLightning(dt);
  updateGoblins(dt, playerPos);
  updateEnvironment(dt);

  speedEl.textContent=spd<.4?'standing':spd<5.5?'walking':'running';
  const cx=playerPos.x+Math.sin(camYaw)*Math.cos(camPitch)*camDist;
  const cy=playerPos.y+1.0+Math.sin(camPitch)*camDist;
  const cz=playerPos.z+Math.cos(camYaw)*Math.cos(camPitch)*camDist;
  camera.position.set(cx,Math.max(getH(cx,cz)+.4,cy),cz);
  camera.lookAt(playerPos.x,playerPos.y+1.0,playerPos.z);
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

animate();
</script>
