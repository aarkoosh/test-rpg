<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chronicles of Ash</title>
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #010204;
      --color-accent: #3b82f6;
      --font-serif: "Georgia", serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-serif);
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 20px;
      box-sizing: border-box;
      z-index: 10;
      pointer-events: none;
    }

    .title-group {
      text-align: center;
      pointer-events: auto;
    }

    .start-title {
      font-family: 'Metal Mania', system-ui;
      font-size: 90px;
      color: #ffffff;
      letter-spacing: 4px;
      margin: 0;
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.8), 0 0 30px rgba(37, 99, 235, 0.4);
      animation: titleBob 4s ease-in-out infinite;
    }

    @keyframes titleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .start-subtitle {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 4px;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .button-group {
      pointer-events: auto;
      margin-bottom: 40px;
    }

    #begin-adventure-button {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #334155;
      color: #cbd5e1;
      padding: 14px 40px;
      font-family: 'Metal Mania', system-ui;
      font-size: 24px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
    }

    #begin-adventure-button:hover {
      background: #1e293b;
      border-color: #3b82f6;
      color: #ffffff;
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
      transform: scale(1.05);
    }

    #begin-adventure-button:active {
      transform: scale(0.98);
    }

    #fade-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: black;
      z-index: 1000;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
    }

    #fade-overlay.fade-out {
      opacity: 0;
    }

    #loading-text {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #475569;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .start-title {
        font-size: 50px;
      }
      #begin-adventure-button {
        font-size: 18px;
        padding: 10px 30px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="ui-container">
    <div class="title-group">
      <h1 class="start-title">Chronicles of Ash</h1>
      <div class="start-subtitle">A Dark Fantasy Adventure</div>
    </div>
    
    <div class="button-group">
      <button id="begin-adventure-button">Begin Adventure</button>
    </div>
    
    <div id="loading-text">Loading 3D Engine...</div>
  </div>

  <div id="fade-overlay"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a15);
    
    // Camera setup
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 15);
    
    // Renderer setup
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);
    
    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    
    // Warm key light
    const keyLight = new THREE.DirectionalLight(0xffdfb0, 2.0);
    keyLight.position.set(5, 5, 5);
    keyLight.castShadow = true;
    scene.add(keyLight);
    
    // Cool fill light
    const fillLight = new THREE.DirectionalLight(0x88ccff, 1.2);
    fillLight.position.set(-5, -3, 3);
    scene.add(fillLight);
    
    // Rim light for edge highlights
    const rimLight = new THREE.DirectionalLight(0x3b82f6, 1.5);
    rimLight.position.set(0, 5, -5);
    scene.add(rimLight);

    // Create DVD Case
    const dvdGroup = new THREE.Group();
    scene.add(dvdGroup);
    
    // Case dimensions
    const width = 5.0;
    const height = 7.0;
    const depth = 0.4;
    
    // Load cover texture
    const textureLoader = new THREE.TextureLoader();
    const coverMaterial = new THREE.MeshStandardMaterial({
      roughness: 0.2,
      metalness: 0.1,
      color: 0xffffff
    });
    
    // Fallback if texture fails to load
    coverMaterial.color.setHex(0x1a2233);
    
    textureLoader.load(
      'Assets/14796d0c-e01c-4da3-916a-7b75ab0b0953.png',
      function(texture) {
        texture.minFilter = THREE.LinearFilter;
        coverMaterial.map = texture;
        coverMaterial.needsUpdate = true;
        document.getElementById('loading-text').style.display = 'none';
      },
      undefined,
      function(err) {
        console.error('Error loading texture:', err);
        // Keep the fallback color
        document.getElementById('loading-text').style.display = 'none';
      }
    );
    
    // Other materials for the case
    const plasticMaterial = new THREE.MeshStandardMaterial({
      color: 0x0a0a0d,
      roughness: 0.5,
      metalness: 0.2
    });
    
    const spineMaterial = new THREE.MeshStandardMaterial({
      color: 0x08080a,
      roughness: 0.4,
      metalness: 0.1
    });
    
    const paperEdgeMaterial = new THREE.MeshStandardMaterial({
      color: 0xdddddd,
      roughness: 0.8,
      metalness: 0.0
    });
    
    // Array of materials for each face of the box
    // Order: Right, Left, Top, Bottom, Front, Back
    const materials = [
      spineMaterial,       // Right (spine)
      paperEdgeMaterial,   // Left (opening edge)
      plasticMaterial,     // Top
      plasticMaterial,     // Bottom
      coverMaterial,       // Front (cover)
      plasticMaterial      // Back
    ];
    
    const geometry = new THREE.BoxGeometry(width, height, depth);
    const dvdCase = new THREE.Mesh(geometry, materials);
    dvdCase.castShadow = true;
    dvdCase.receiveShadow = true;
    dvdGroup.add(dvdCase);
    
    // Add a subtle inner glow or particle effect around the case for dark fantasy vibe
    const particleCount = 100;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 12;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 12;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 12;
    }
    
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      color: 0x3b82f6,
      size: 0.05,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
    
    // Animation variables
    let mouseX = 0;
    let mouseY = 0;
    let targetX = 0;
    let targetY = 0;
    
    window.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
      mouseY = (event.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
    });
    
    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Fade overlay fade-in on load
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('fade-overlay');
      setTimeout(() => {
        overlay.classList.add('fade-out');
      }, 100);
    });
    
    // Begin Adventure Button Action
    const beginButton = document.getElementById('begin-adventure-button');
    let isTransitioning = false;
    
    beginButton.addEventListener('click', () => {
      if (isTransitioning) return;
      isTransitioning = true;
      
      // Fade out UI
      document.getElementById('ui-container').style.transition = 'opacity 0.8s ease';
      document.getElementById('ui-container').style.opacity = '0';
      
      // Fade to black overlay
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.remove('fade-out');
      
      // Speed up spin and fly towards camera
      const startTime = performance.now();
      function animateTransition() {
        const elapsed = (performance.now() - startTime) / 1000;
        const progress = Math.min(elapsed / 1.5, 1); // 1.5s transition
        
        // Spin faster
        dvdGroup.rotation.y += 0.01 + progress * 0.15;
        // Fly towards camera
        dvdGroup.position.z = progress * 12;
        
        if (progress < 1) {
          requestAnimationFrame(animateTransition);
        } else {
          // Redirect to overworld
          window.location.href = 'overworld.html';
        }
      }
      animateTransition();
    });
    
    // Render loop
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();
      
      if (!isTransitioning) {
        // Continuous elegant spinning
        dvdGroup.rotation.y = time * 0.5;
        
        // Subtle bobbings
        dvdGroup.position.y = Math.sin(time * 1.5) * 0.15;
        
        // Mouse influence
        targetX = mouseX * 0.3;
        targetY = mouseY * 0.3;
        
        dvdGroup.rotation.x = THREE.MathUtils.lerp(dvdGroup.rotation.x, targetY, 0.05);
        dvdGroup.rotation.z = THREE.MathUtils.lerp(dvdGroup.rotation.z, -targetX * 0.5, 0.05);
      }
      
      // Animate particles
      particles.rotation.y = time * 0.05;
      particles.rotation.x = time * 0.02;
      
      // Subtle color shifting for particles
      particleMaterial.color.setHSL((0.6 + Math.sin(time * 0.1) * 0.1) % 1.0, 0.8, 0.5);
      
      renderer.render(scene, camera);
    }
    
    animate();
  </script>
</body>
</html>
