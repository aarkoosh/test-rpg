function createSoftTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(canvas);
}
const softTex = createSoftTexture();

function updateEnvironment(dt) {
  gameTime = (gameTime + dt / 60) % 24;
  const dayAngle = ((gameTime - 6) / 24) * Math.PI * 2;
  const sunUp = Math.sin(dayAngle);
  const dusk = Math.max(0, 1 - Math.abs(sunUp) * 5);
  
  const sunDist = 15000;
  sun.position.set(Math.cos(dayAngle)*sunDist, Math.sin(dayAngle)*sunDist, 0);
  sunVisual.position.copy(sun.position);
  moon.position.set(Math.cos(dayAngle + Math.PI)*sunDist, Math.sin(dayAngle + Math.PI)*sunDist, 0);

  sun.intensity = Math.max(0, sunUp) * 2.2;
  moon.intensity = Math.max(0, -sunUp) * 0.5;
  ambient.intensity = 0.4 + Math.max(0, sunUp) * 0.5;
  hemiLight.intensity = 0.4 + Math.max(0, sunUp) * 0.5;
  stars.material.opacity = Math.max(0, -sunUp);

  const skyCol = new THREE.Color(0x151520).lerp(new THREE.Color(0xc0a080), Math.max(0, sunUp));
  if(Math.abs(sunUp) < 0.2) skyCol.lerp(new THREE.Color(0x4a3a2a), 1 - Math.abs(sunUp)*5);
  scene.background = skyCol;
  stars.rotation.y += dt * 0.005;
}

function getRandomDir() {
  const v = new THREE.Vector3(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
  if (v.lengthSq() < 0.001) return getRandomDir();
  return v.normalize();
}

const terrainOffset = new THREE.Vector3(Math.random() * 1e5, 0, Math.random() * 1e5);
function getH(pos) {
  const tx = pos.x + terrainOffset.x, tz = pos.z + terrainOffset.z;
  
  let h = (Math.sin(tx * 0.01) * Math.cos(tz * 0.01) * 8 + Math.sin(tz * 0.02) * 6);
  
  let mNoise = Math.sin(tx * 0.012) * Math.sin(tz * 0.012);
  mNoise += (Math.sin(tx * 0.05) * Math.sin(tz * 0.05)) * 0.12;
  if (mNoise > 0.15) h += Math.pow((mNoise - 0.15) * 1.5, 1.8) * 100;
  
  const rNoise = Math.sin(tx * 0.008 + tz * 0.008) * Math.cos(tz * 0.008);
  if (Math.abs(rNoise) < 0.04) h -= (0.04 - Math.abs(rNoise)) * 550;

  const bDist = Math.max(Math.abs(pos.x), Math.abs(pos.z));
  if (bDist > 1400) h += Math.pow((bDist - 1400) / 600, 2) * 600;

  const sDistSq = pos.x * pos.x + pos.z * pos.z;
  if (sDistSq < 10000) {
    const sFactor = 1.0 - Math.sqrt(sDistSq) / 100;
    h = Math.max(h, 1.0 + sFactor * 12);
  }

  return h;
}

const ruins = [];
function checkRuinCollision(pos, radius) {
  for (const r of ruins) {
    const distToCenter = pos.distanceTo(r.pos);
    if (distToCenter < 25) {
      for (const p of r.parts) {
        const d = pos.distanceTo(p.world);
        const minDist = p.rad + radius;
        if (d < minDist) {
          const push = new THREE.Vector3().subVectors(pos, p.world).setY(0);
          const up = new THREE.Vector3(0, 1, 0);
          push.projectOnPlane(up).normalize();
          pos.addScaledVector(push, minDist - d);
        }
      }
    }
  }
}
function makeCastleRuin(spawnPos) {
  const h = getH(spawnPos);
  const stoneM = new THREE.MeshLambertMaterial({color:0x555555});
  const ruinCenter = new THREE.Vector3(spawnPos.x, h, spawnPos.z);
  const radius = 14, walls = 22, rData = { pos: ruinCenter.clone(), parts: [] };

  function place(lx, lz, geo, rotY, collRad=0){
    const itemX = ruinCenter.x + lx, itemZ = ruinCenter.z + lz;
    const ph = getH({x: itemX, z: itemZ});
    const itemSurface = new THREE.Vector3(itemX, ph, itemZ);
    const mesh = new THREE.Mesh(geo, stoneM);
    mesh.castShadow = true;
    mesh.position.copy(itemSurface).y += geo.parameters.height / 2;
    mesh.rotation.y = rotY;
    mesh.rotateY(rotY);
    scene.add(mesh);
    staticObjects.push(mesh);
    if(collRad > 0) rData.parts.push({ world: itemSurface.clone(), rad: collRad });
    return mesh;
  }
  
  for(let i=0; i<walls; i++){
    const ang = (i/walls) * Math.PI * 2;
    const lx = Math.sin(ang)*radius, lz = Math.cos(ang)*radius;
    if(Math.random() > 0.3){
      const wh = 2 + Math.random() * 7;
      place(lx, lz, new THREE.BoxGeometry(5, wh, 2), ang, 2.8);
      if(Math.random() > 0.6){
        const dx = Math.sin(ang)*(radius+4), dz = Math.cos(ang)*(radius+4);
        const m = place(dx, dz, new THREE.BoxGeometry(0.8, 0.8, 0.8), 0, 0);
        m.rotation.set(Math.random(), Math.random(), Math.random());
      }
    }
  }
  
  for(let i=0; i<4; i++){
    const ang = i * (Math.PI/2);
    const lx = Math.sin(ang)*radius, lz = Math.cos(ang)*radius, th = 9 + Math.random() * 6;
    place(lx, lz, new THREE.CylinderGeometry(2.5, 3, th, 8), 0, 3.5);
  }

  const kh = 14 + Math.random() * 8;
  place(0, 0, new THREE.BoxGeometry(7, kh, 7), 0, 5.5);
  ruins.push(rData);
}
const treeTemplate = (() => {
  const g = new THREE.Group();
  const th = 13;
  const barkM = new THREE.MeshLambertMaterial({color: new THREE.Color().setHSL(.07, .4, .1)});
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.25, .55, th, 8), barkM);
  trunk.position.y = th / 2; trunk.castShadow = true; g.add(trunk);
  for(let r=0;r<3;r++){
    const ring=new THREE.Mesh(new THREE.CylinderGeometry(.7+r*.02,.7+r*.02,.12,8),barkM);
    ring.position.y=.4+r*(th*.25); g.add(ring);
  }
  const layers = 6;
  for(let l=0;l<layers;l++){
    const pct=l/layers;
    const radius=(.5+(1-pct)*4)*1.1;
    const height=3.5;
    const fMat=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.28, .6, .15)});
    const cone=new THREE.Mesh(new THREE.ConeGeometry(radius,height,8),fMat);
    cone.position.y=th*.45+pct*(th*.6);
    cone.castShadow=true; g.add(cone);
    if(l<layers-1){
      for(let b=0;b<3;b++){
        const ang=b*(Math.PI*2/3);
        const br=new THREE.Mesh(new THREE.CylinderGeometry(.025,.04,.5,5),barkM);
        br.position.set(Math.sin(ang)*radius*.5, cone.position.y-.5, Math.cos(ang)*radius*.5);
        br.rotation.z=Math.PI/2-0.2;
        br.rotation.y=ang; g.add(br);
      }
    }
  }
  const tip=new THREE.Mesh(new THREE.ConeGeometry(.18,.9,6),new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.3, .6, .15)}));
  tip.position.y=th*.45+(th*.6)+.2; g.add(tip);
  g.updateMatrixWorld(true);
  return g;
})();

const TREE_COUNT = 15000;
const treeMatrices = [];
const _tObj = new THREE.Object3D();
const _tMat = new THREE.Matrix4();

for (let i = 0; i < TREE_COUNT; i++) {
  let tx, tz, th;
  do {
    tx = (Math.random() - 0.5) * MAP_SIZE;
    tz = (Math.random() - 0.5) * MAP_SIZE;
    th = getH({ x: tx, z: tz });
  } while (Math.abs(tx) < 40 && Math.abs(tz) < 40 || th < 2 || th > 25);

  _tObj.position.set(tx, th, tz);
  _tObj.quaternion.set(0, 0, 0, 1);
  _tObj.rotateY(Math.random() * Math.PI * 2);
  _tObj.updateMatrix();
  treeMatrices.push(_tObj.matrix.clone());
}

treeTemplate.traverse(child => {
  if (child.isMesh) {
    const inst = new THREE.InstancedMesh(child.geometry, child.material, TREE_COUNT);
    inst.castShadow = true;
    inst.receiveShadow = true;
    for (let i = 0; i < TREE_COUNT; i++) {
      inst.setMatrixAt(i, _tMat.copy(treeMatrices[i]).multiply(child.matrix));
    }
    scene.add(inst);
  }
});

for (let i = 0; i < 60; i++) {
  let cx, cz, ch, slope;
  do {
    cx = (Math.random() - 0.5) * MAP_SIZE;
    cz = (Math.random() - 0.5) * MAP_SIZE;
    ch = getH({ x: cx, z: cz });
    const d = 4;
    const s1 = Math.abs(getH({ x: cx + d, z: cz }) - getH({ x: cx - d, z: cz })) / (d * 2);
    const s2 = Math.abs(getH({ x: cx, z: cz + d }) - getH({ x: cx, z: cz - d })) / (d * 2);
    slope = Math.max(s1, s2);
  } while (Math.abs(cx) < 60 && Math.abs(cz) < 60 || ruins.some(r => r.pos.distanceTo(new THREE.Vector3(cx, 0, cz)) < 55) || ch < 5 || slope > 0.15);
  makeCastleRuin({ x: cx, z: cz });
}

function makeTavern(pos) {
  const h = getH(pos);
  const woodM = new THREE.MeshLambertMaterial({color: 0x4a2e19});
  const stoneM = new THREE.MeshLambertMaterial({color: 0x666666});
  const group = new THREE.Group();
  group.position.set(pos.x, h, pos.z);
  scene.add(group);

  // Foundation/Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(16, 0.6, 16), stoneM);
  floor.position.y = 0.3; floor.receiveShadow = true; group.add(floor);
  staticObjects.push(floor);

  // Walls
  const wallH = 7;
  const wall = (x, z, w, d) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, d), woodM);
    m.position.set(x, wallH/2 + 0.6, z); m.castShadow = true; group.add(m);
    staticObjects.push(m);
  };
  wall(0, -7.7, 16, 0.6); // Back
  wall(-7.7, 0, 0.6, 16); // Left
  wall(7.7, 0, 0.6, 16);  // Right
  wall(-5, 7.7, 6, 0.6);  // Front Left
  wall(5, 7.7, 6, 0.6);   // Front Right (Doorway in middle)

  // Roof
  const roofL = new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 18), stoneM);
  roofL.position.set(-4.5, wallH + 2.5, 0); roofL.rotation.z = 0.6; group.add(roofL);
  const roofR = new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 18), stoneM);
  roofR.position.set(4.5, wallH + 2.5, 0); roofR.rotation.z = -0.6; group.add(roofR);
  staticObjects.push(roofL, roofR);

  // Cozy interior light
  const tLight = new THREE.PointLight(0xffaa44, 2.5, 20);
  tLight.position.set(0, 5, 0); group.add(tLight);

  // Add wall collisions
  const rData = { pos: group.position.clone(), parts: [] };
  for(let t = -8; t <= 8; t += 2) {
    rData.parts.push({ world: new THREE.Vector3(pos.x - 7.7, h, pos.z + t), rad: 1 });
    rData.parts.push({ world: new THREE.Vector3(pos.x + 7.7, h, pos.z + t), rad: 1 });
    rData.parts.push({ world: new THREE.Vector3(pos.x + t, h, pos.z - 7.7), rad: 1 });
    if (Math.abs(t) > 2.5) rData.parts.push({ world: new THREE.Vector3(pos.x + t, h, pos.z + 7.7), rad: 1 });
  }
  ruins.push(rData);
}

const lightningBolts = [];
function makeLightningGeometry(start, end, forks=4, spread=0.7){
  const points=[];
  function segment(a,b,depth){
    if(depth<=0){ points.push(a,b); return; }
    const mid=new THREE.Vector3().lerpVectors(a,b,.5);
    mid.x+=(Math.random()-.5)*spread;
    mid.y+=(Math.random()-.5)*spread;
    mid.z+=(Math.random()-.5)*spread;
    segment(a,mid,depth-1);
    segment(mid,b,depth-1);
    if(depth===2&&Math.random()<.5){
      const forkEnd=mid.clone().add(new THREE.Vector3((Math.random()-.5)*spread*2,-(Math.random()*spread),(Math.random()-.5)*spread*2));
      segment(mid,forkEnd,depth-2);
    }
  }
  segment(start,end,forks);
  return points;
}
function spawnLightning(from, to, range){
  const spread = range ? 1.5 : 0.5;
  const pts = makeLightningGeometry(from.clone(), to.clone(), range?5:3, spread);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0x88ffff, linewidth:3, transparent:true, opacity:1.0});
  const bolt = new THREE.LineSegments(geo, mat);
  scene.add(bolt);
  const corePts = [from.clone(), to.clone()];
  const coreGeo = new THREE.BufferGeometry().setFromPoints(corePts);
  const coreMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.9});
  const core = new THREE.Line(coreGeo, coreMat);
  scene.add(core);
  const flash = new THREE.PointLight(0x88ccff, 6, range ? 25 : 10);
  flash.position.copy(to);
  scene.add(flash);

  lightningBolts.push({ bolt, core, flash, age:0, maxAge: range ? 0.45 : 0.25 });
}
function updateLightning(dt){
  for(let i=lightningBolts.length-1;i>=0;i--){
    const b=lightningBolts[i];
    b.age+=dt;
    const t=1-b.age/b.maxAge;
    b.bolt.material.opacity=t*0.9;
    b.core.material.opacity=t;
    b.flash.intensity=t*4;
    if(b.age>=b.maxAge){
      scene.remove(b.bolt,b.core,b.flash);
      lightningBolts.splice(i,1);
    }
  }
}
let camYaw=0.3, camPitch=0.38, camDist=15;
let camShake=0;
const CAM_MIN=1.5, CAM_MAX=60;
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

let isDragging=false, lastMX=0, lastMY=0;
let mouseX=innerWidth/2, mouseY=innerHeight/2;
let chargeStart=0, isCharging=false;
window.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  if(isDragging){
    camYaw  +=(e.clientX-lastMX)*0.005;
    camPitch-=(e.clientY-lastMY)*0.005;
    camPitch=Math.max(.05,Math.min(1.3,camPitch));

  }
});

renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button===0){

  }
});

window.addEventListener('mouseup',e=>{
  if(e.button===0 && isCharging){

    if(held < 0.3){

    } else {
      triggerLightning(held);
    }

let swingT=0, swinging=false;

function triggerSlam(){
  if(swinging) return;
  swinging=true; swingT=0;
  setTimeout(()=>{
    checkSlamHitsGoblins();
  }, 250);
}

function updateSlamAnim(dt){
  if(!swinging) return;
  swingT+=dt*4.0;
  if(swingT < 0.4){
    const p = swingT / 0.4;
    rShoulder.rotation.x = -p * 1.5;
    rElbow.rotation.x = p * 0.5;
  } else if(swingT < 0.6){
    const p = (swingT - 0.4) / 0.2;
    rShoulder.rotation.x = -1.5 + p * 2.3;
  } else {
    const p = (swingT - 0.6) / 0.4;
    rShoulder.rotation.x = 0.8 * (1 - p);
    rElbow.rotation.x = 0.5 * (1 - p);
  }
  if(swingT>=1){ swinging=false; rShoulder.rotation.x=0; rElbow.rotation.x=0; }
}

function triggerLightning(holdTime){
  const range = holdTime > 0.8;
  const raycaster = new THREE.Raycaster();
  const mouseNDC = new THREE.Vector2(
    (mouseX / window.innerWidth) * 2 - 1,
    -(mouseY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouseNDC, camera);

  const intersects = raycaster.intersectObject(terrain);
  let targetPos;
  if(intersects.length > 0){
    targetPos = intersects[0].point;
  } else {
    const dist = range ? (40 + holdTime * 15) : 8;
    targetPos = raycaster.ray.origin.clone().addScaledVector(raycaster.ray.direction, dist);
  }
  targetPos.y = Math.max(getH(targetPos), 0);
  if(range) camShake = 0.6;
  
  const localDir = targetPos.clone().sub(playerPos).normalize();
  facingYaw = Math.atan2(localDir.x, localDir.z);

  swinging=false;
  rShoulder.rotation.x=-1.2;
  rElbow.rotation.x=0.3;
  setTimeout(()=>{ rShoulder.rotation.x=0; rElbow.rotation.x=0; },400);
  
  const skyOrigin = targetPos.clone().setY(200);
  spawnLightning(skyOrigin, targetPos, range);
  
  checkLightningHitsGoblins(targetPos, range ? 4.5 : 2.0, range ? 35 : 15);

  if(range){
    const scatter = targetPos.clone().add(new THREE.Vector3((Math.random()-.5)*8, 0, (Math.random()-.5)*8));
    scatter.y = Math.max(getH(scatter), 0);
    const skyOrigin2 = scatter.clone().setY(200);
    setTimeout(()=>spawnLightning(skyOrigin2, scatter, true), 80);
  }
}

const goblinSkinM  = new THREE.MeshLambertMaterial({color:0x5a8a3a});
const goblinClothM = new THREE.MeshLambertMaterial({color:0x6b4a20});
const goblinEyeM   = new THREE.MeshLambertMaterial({color:0xff2200,emissive:0x880000,emissiveIntensity:0.8});
const goblinTeethM = new THREE.MeshLambertMaterial({color:0xffffcc});
const goblinWeapM  = new THREE.MeshLambertMaterial({color:0x888888});
const goblinDynM   = new THREE.MeshLambertMaterial({color:0xcc0000});
const goblinWickM  = new THREE.MeshLambertMaterial({color:0x222222});

function makeGoblinMesh(){
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(.34,.4,.22), goblinClothM); body.position.y=.52; body.castShadow=true; g.add(body);
  const head = new THREE.Mesh(new THREE.BoxGeometry(.32,.28,.28), goblinSkinM); head.position.y=.88; head.castShadow=true; g.add(head);
  [-1,1].forEach(s=>{
    const ear = new THREE.Mesh(new THREE.ConeGeometry(.08,.18,5), goblinSkinM);
    ear.position.set(s*.2,.96,0); ear.rotation.z=s*Math.PI/2.5; ear.castShadow=true; g.add(ear);
  });
  [-1,1].forEach(s=>{
    const eye = new THREE.Mesh(new THREE.SphereGeometry(.055,6,6), goblinEyeM);
    eye.position.set(s*.08,.9,.13); g.add(eye);
  });
  const nose = new THREE.Mesh(new THREE.SphereGeometry(.055,5,4), goblinSkinM); nose.position.set(0,.84,.15); g.add(nose);
  [-1,1].forEach(s=>{
    const tooth = new THREE.Mesh(new THREE.BoxGeometry(.04,.07,.04), goblinTeethM);
    tooth.position.set(s*.06,.76,.13); g.add(tooth);
  });
  const hips = new THREE.Mesh(new THREE.BoxGeometry(.36,.18,.2), goblinClothM); hips.position.y=.3; hips.castShadow=true; g.add(hips);

  const lArm = new THREE.Group(); lArm.position.set(-.22,.64,0); g.add(lArm);
  const lUArm = new THREE.Mesh(new THREE.BoxGeometry(.1,.28,.1),goblinSkinM); lUArm.position.y=-.14; lUArm.castShadow=true; lArm.add(lUArm);
  const lFArm = new THREE.Group(); lFArm.position.y=-.28; lArm.add(lFArm);
  const lLArm = new THREE.Mesh(new THREE.BoxGeometry(.09,.26,.09),goblinSkinM); lLArm.position.y=-.13; lLArm.castShadow=true; lFArm.add(lLArm);

  const rArm = new THREE.Group(); rArm.position.set(.22,.64,0); g.add(rArm);
  const rUArm = new THREE.Mesh(new THREE.BoxGeometry(.1,.28,.1),goblinSkinM); rUArm.position.y=-.14; rUArm.castShadow=true; rArm.add(rUArm);
  const rFArm = new THREE.Group(); rFArm.position.y=-.28; rArm.add(rFArm);
  const rLArm = new THREE.Mesh(new THREE.BoxGeometry(.09,.26,.09),goblinSkinM); rLArm.position.y=-.13; rLArm.castShadow=true; rFArm.add(rLArm);

  const dynamite = new THREE.Group(); dynamite.position.set(0,-.48,0); lFArm.add(dynamite);
  const dynBody = new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,.22,8), goblinDynM); dynBody.rotation.x=Math.PI/2; dynamite.add(dynBody);
  const wick = new THREE.Mesh(new THREE.CylinderGeometry(.006,.006,.08,4), goblinWickM); wick.position.set(0,.12,0); wick.rotation.z=0.2; dynamite.add(wick);

  const lLeg = new THREE.Group(); lLeg.position.set(-.1,.28,0); g.add(lLeg);
  const lThigh = new THREE.Mesh(new THREE.BoxGeometry(.12,.24,.12),goblinSkinM); lThigh.position.y=-.12; lThigh.castShadow=true; lLeg.add(lThigh);
  const lKnee = new THREE.Group(); lKnee.position.y=-.24; lLeg.add(lKnee);
  const lShin = new THREE.Mesh(new THREE.BoxGeometry(.1,.22,.1),goblinSkinM); lShin.position.y=-.11; lShin.castShadow=true; lKnee.add(lShin);
  const lFoot = new THREE.Mesh(new THREE.BoxGeometry(.11,.07,.18),goblinClothM); lFoot.position.set(0,-.26,.04); lKnee.add(lFoot);

  const rLeg = new THREE.Group(); rLeg.position.set(.1,.28,0); g.add(rLeg);
  const rThigh = new THREE.Mesh(new THREE.BoxGeometry(.12,.24,.12),goblinSkinM); rThigh.position.y=-.12; rThigh.castShadow=true; rLeg.add(rThigh);
  const rKnee = new THREE.Group(); rKnee.position.y=-.24; rLeg.add(rKnee);
  const rShin = new THREE.Mesh(new THREE.BoxGeometry(.1,.22,.1),goblinSkinM); rShin.position.y=-.11; rShin.castShadow=true; rKnee.add(rShin);
  const rFoot = new THREE.Mesh(new THREE.BoxGeometry(.11,.07,.18),goblinClothM); rFoot.position.set(0,-.26,.04); rKnee.add(rFoot);

  const club = new THREE.Group(); club.position.set(0,-.52,0); rFArm.add(club);
  const clubHandle = new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.5,5), goblinWeapM); clubHandle.position.y=-.25; club.add(clubHandle);
  const clubHead = new THREE.Mesh(new THREE.SphereGeometry(.1,6,5), goblinWeapM); clubHead.position.y=-.52; club.add(clubHead);

  return { group:g, lArm, rArm, lLeg, rLeg, lKnee, rKnee, lFArm, rFArm, club };
}

const GOBLIN_IDLE=0, GOBLIN_PATROL=1, GOBLIN_CHASE=2, GOBLIN_ATTACK=3, GOBLIN_HIT=4, GOBLIN_DEAD=5;
const goblins=[];

function spawnGoblin() {
  const gx = (Math.random() - 0.5) * MAP_SIZE;
  const gz = (Math.random() - 0.5) * MAP_SIZE;
  if (Math.abs(gx) < 30 && Math.abs(gz) < 30) return;
  const gh = Math.max(getH({ x: gx, z: gz }), 0);
  const mesh=makeGoblinMesh();
  const finalPos = new THREE.Vector3(gx, gh, gz);
  mesh.group.position.copy(finalPos);
  scene.add(mesh.group);

  const patrolTarget = finalPos.clone().add(new THREE.Vector3((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20));

  goblins.push({
    mesh,
    pos: finalPos,
    vel: new THREE.Vector3(0,0,0),
    hp:30, maxHp:30,
    state: GOBLIN_PATROL,
    animT:0,
    stateTimer:0,
    attackCooldown:Math.random()*2,
    hitTimer:0,
    patrolTarget,
    facingYaw:Math.random()*Math.PI*2,
    dead:false,
    deathTimer:0,
  });
}

for(let i=0;i<800;i++){
  spawnGoblin();
}
function applyGoblinWalk(m, t, spd){
  const s=Math.min(spd/3,1);
  m.lLeg.rotation.x=Math.sin(t)*.7*s;
  m.rLeg.rotation.x=-Math.sin(t)*.7*s;
  m.lKnee.rotation.x=Math.max(0,Math.sin(t))*.8*s;
  m.rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.8*s;
  m.lArm.rotation.x=-Math.sin(t)*.6*s;
  m.rArm.rotation.x=Math.sin(t)*.6*s;
}
function applyGoblinAttack(m, t){
  const arc=Math.sin(t*Math.PI)*1.8;
  m.rArm.rotation.x=-arc;
  m.rFArm.rotation.x=Math.max(0,arc)*.5;
}
function damageGoblin(goblin, dmg){
  if(goblin.dead) return;
  goblin.hp=Math.max(0,goblin.hp-dmg);
  goblin.state=GOBLIN_HIT;
  goblin.hitTimer=0.25;
  goblin.mesh.group.traverse(c=>{
    if(c.isMesh) { c._origMat=c._origMat||c.material; c.material=new THREE.MeshLambertMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1}); }
  });
  setTimeout(()=>{
    goblin.mesh.group.traverse(c=>{ if(c.isMesh&&c._origMat){ c.material=c._origMat; } });
  },150);
  if(goblin.hp<=0) killGoblin(goblin);
}
function killGoblin(goblin){
  goblin.dead=true;
  goblin.exploded=false;
  goblin.state=GOBLIN_DEAD;
  goblin.deathTimer=0;
  goblin.mesh.group.traverse(c=>{
    if(c.isMesh) c.material=new THREE.MeshLambertMaterial({color:0x3a4a2a});
  });
  const push = goblin.pos.clone().sub(playerPos).normalize();
  goblin.deathVel = push.setY(0).normalize().multiplyScalar(25 + Math.random()*15);
  goblin.deathVel.y = 10 + Math.random() * 10;
  goblin.deathRot = new THREE.Vector3(Math.random()*12, Math.random()*12, Math.random()*12);
}
function checkLightningHitsGoblins(impactPos, radius, dmg){
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const dist=gb.pos.distanceTo(impactPos);
    if(dist<radius) damageGoblin(gb,dmg);
  });
}
function checkSlamHitsGoblins(){
  goblins.forEach(gb=>{
    if(gb.dead) return;
    const dist = gb.pos.distanceTo(playerPos);
    if(dist < 5.5){
      damageGoblin(gb, 25);
      if(!gb.dead && Math.random() < 0.4) killGoblin(gb);
    }
  });
}
let playerHp=100, playerMaxHp=100;
function damagePlayer(dmg){
  // Player is invincible to ensure the game never ends
}
function updateGoblins(dt, playerPos){
  goblins.forEach(gb=>{
    if(gb.dead){
      if(gb.exploded) return;
      gb.deathTimer+=dt;
      gb.pos.addScaledVector(gb.deathVel, dt);
      gb.mesh.group.position.copy(gb.pos); 
      gb.mesh.group.rotation.x += gb.deathRot.x * dt;
      gb.mesh.group.rotation.y += gb.deathRot.y * dt;
      gb.mesh.group.rotation.z += gb.deathRot.z * dt;

      if(gb.pos.y < -50 || gb.pos.y > 500){
        gb.exploded = true;
        scene.remove(gb.mesh.group);
      }

      if(gb.deathTimer>6){
        scene.remove(gb.mesh.group);
      }
      return;
    }
    gb.stateTimer+=dt;
    gb.attackCooldown=Math.max(0,gb.attackCooldown-dt);
    if(gb.hitTimer>0){ gb.hitTimer-=dt; return; }

    const distToPlayer=gb.pos.distanceTo(playerPos);
    const DETECT_RANGE=22, CHASE_RANGE=30, ATTACK_RANGE=1.8;
    if(gb.state!==GOBLIN_ATTACK){
      if(distToPlayer<ATTACK_RANGE && gb.attackCooldown<=0){
        gb.state=GOBLIN_ATTACK; gb.animT=0; gb.stateTimer=0;
      } else if(distToPlayer<DETECT_RANGE){
        gb.state=GOBLIN_CHASE;
      } else if(distToPlayer>CHASE_RANGE && gb.state===GOBLIN_CHASE){
        gb.state=GOBLIN_PATROL; gb.stateTimer=0;
      }
    }
    let speed=0;
    if(gb.state===GOBLIN_PATROL){
      if(gb.stateTimer>4||gb.pos.distanceTo(gb.patrolTarget)<1.5){
        gb.patrolTarget.set(gb.pos.x + (Math.random()-0.5)*30, 0, gb.pos.z + (Math.random()-0.5)*30);
        gb.stateTimer=0;
      }
      const dist = gb.pos.distanceTo(gb.patrolTarget); 
      if(dist>0.5){
        gb.vel.subVectors(gb.patrolTarget, gb.pos).normalize().multiplyScalar(1.8);
        speed = 1.8;
      } else { gb.vel.multiplyScalar(0.8); }
    } else if(gb.state===GOBLIN_CHASE){
      const dist = gb.pos.distanceTo(playerPos);
      if(dist>0.1){
        gb.vel.subVectors(playerPos, gb.pos).normalize().multiplyScalar(4.5);
        speed=4.5;
      }
    } else if(gb.state===GOBLIN_ATTACK){
      gb.vel.multiplyScalar(0.7);
      gb.animT+=dt*5;
      applyGoblinAttack(gb.mesh,gb.animT);
      const toPlayer = playerPos.clone().sub(gb.pos);
      gb.facingYaw = Math.atan2(toPlayer.x, toPlayer.z);

      if(gb.animT>0.5 && gb.animT<0.6 && gb.attackCooldown<=0){
        if(distToPlayer<ATTACK_RANGE+.3){ damagePlayer(8); }
        gb.attackCooldown=2.2;
      }
      if(gb.animT>=1){
        gb.state=GOBLIN_CHASE; gb.animT=0;
        gb.mesh.rArm.rotation.x=0; gb.mesh.rFArm.rotation.x=0;
      }
    }

    gb.pos.addScaledVector(gb.vel, dt); 
    checkRuinCollision(gb.pos, 0.5);
    gb.pos.y = Math.max(getH(gb.pos), 0);

    gb.mesh.group.position.copy(gb.pos);
    gb.mesh.group.rotation.set(0, 0, 0);

    if (speed > 0.1) {
      gb.facingYaw = Math.atan2(gb.vel.x, gb.vel.z);
    }
    gb.mesh.group.rotation.y = gb.facingYaw;

    if(gb.state!==GOBLIN_ATTACK){
      gb.animT+=dt*(speed>2?8:5);
      applyGoblinWalk(gb.mesh,gb.animT,speed);
    }
  });
}

const cameraTarget = new THREE.Vector3();
const cameraLerpSpeed = 0.12;
camera.position.set(0, 10, 10);

const playerPos = new THREE.Vector3(0, 0, 0);
playerPos.y = Math.max(getH(playerPos), 0) + 1.2;
const velocity=new THREE.Vector3();
let verticalVel = 0;
let facingYaw=0, animT=0, moving=false, isGrounded=true;
const clock=new THREE.Clock();

function applyWalk(t,spd){
  if(swinging) return;
  const s=Math.min(spd/3.5,1);
  lHip.rotation.x=Math.sin(t)*.65*s;
  rHip.rotation.x=-Math.sin(t)*.65*s;
  lKnee.rotation.x=Math.max(0,Math.sin(t))*.9*s;
  rKnee.rotation.x=-Math.max(0,Math.sin(t+Math.PI))*.9*s;
  if(!swinging){
    lShoulder.rotation.x=-Math.sin(t)*.5*s;
    rShoulder.rotation.x=Math.sin(t)*.5*s;
  }
  torso.rotation.z=Math.sin(t)*.04*s;
}
function resetWalk(){
  [lHip,rHip,lKnee,rKnee].forEach(p=>{p.rotation.x*=.85;});
  if(!swinging){ 
    lShoulder.rotation.x*=.85; rShoulder.rotation.x*=.85; 
    rShoulder.rotation.y*=.85; 
    rElbow.rotation.z*=.85;
    torso.rotation.y*=.85;
  }
  torso.rotation.z*=.85;
}
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);

  const running=keys['ShiftLeft']||keys['ShiftRight'];
  const speed=running?25:3.8;
  moving=false;
  const dir=new THREE.Vector3();
  if(keys['KeyW']){dir.z-=1;moving=true;}
  if(keys['KeyS']){dir.z+=1;moving=true;}
  if(keys['KeyA']){dir.x-=1;moving=true;}
  if(keys['KeyD']){dir.x+=1;moving=true;}
  if (dir.length() > 0) {
    const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).setY(0).normalize();
    const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).setY(0).normalize();
    
    const moveVec = camDir.multiplyScalar(-dir.z).add(camRight.multiplyScalar(dir.x)).normalize();
    velocity.copy(moveVec).multiplyScalar(speed);
    facingYaw = Math.atan2(velocity.x, velocity.z);
  } else { velocity.set(0, 0, 0); }

  if(keys['Space'] && isGrounded){
    verticalVel = 16;
    isGrounded = false;
  }

  playerPos.addScaledVector(velocity, dt);
  checkRuinCollision(playerPos, 0.8);

  verticalVel -= 45 * dt;
  playerPos.y += verticalVel * dt;
  const groundH = Math.max(getH(playerPos), 0);
  if (playerPos.y <= groundH) {
    playerPos.y = groundH;
    verticalVel = Math.max(0, verticalVel);
    isGrounded = true;
  } else isGrounded = false;

  char.position.copy(playerPos);
  char.rotation.set(0, facingYaw, 0);
  const spd=Math.sqrt(velocity.x**2+velocity.z**2);
  if(moving&&spd>.3&&isGrounded){animT+=dt*(running?10:6);applyWalk(animT,spd);}
  else resetWalk();
  updateSlamAnim(dt);
  updateLightning(dt);
  updateGoblins(dt, playerPos);
  updateEnvironment(dt);

  const camOffset = new THREE.Vector3(Math.sin(camYaw)*Math.cos(camPitch)*camDist, Math.sin(camPitch)*camDist, Math.cos(camYaw)*Math.cos(camPitch)*camDist);
  const targetCamPos = playerPos.clone().add(camOffset);
  const lookAtPos = new THREE.Vector3(playerPos.x, playerPos.y + 1.2, playerPos.z);
  const camRayDir = new THREE.Vector3().subVectors(targetCamPos, lookAtPos).normalize();
  camRaycaster.set(lookAtPos, camRayDir);
  camRaycaster.far = camDist;
  const camHits = camRaycaster.intersectObjects(staticObjects, true);
  if (camHits.length > 0) {
    camera.position.copy(camHits[0].point).addScaledVector(camRayDir, -0.2);
  } else {
    camera.position.copy(targetCamPos);
  }
  camera.up.set(0, 1, 0);
  camera.lookAt(lookAtPos);
  renderer.render(scene, camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

animate();
