<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #010204;
      --color-accent: #3b82f6;
      --font-serif: "Georgia", serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-serif);
      user-select: none;
      -webkit-user-select: none;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 20px;
      box-sizing: border-box;
      z-index: 10;
      pointer-events: none;
    }

    .title-group {
      text-align: center;
      pointer-events: auto;
    }

    .start-title {
      font-family: 'Metal Mania', system-ui;
      font-size: 90px;
      color: #ffffff;
      letter-spacing: 4px;
      margin: 0;
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.8), 0 0 30px rgba(37, 99, 235, 0.4);
      animation: titleBob 4s ease-in-out infinite;
    }

    @keyframes titleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .start-subtitle {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 4px;
      margin-top: 10px;
      text-transform: uppercase;
    }

    #fade-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: black;
      z-index: 1000;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
    }

    #fade-overlay.fade-out {
      opacity: 0;
    }

    #title-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      pointer-events: none;
    }

    #title-screen .screen-title,
    #title-screen .prompt-text {
      pointer-events: auto;
    }

    #title-screen .screen-title {
      font-family: 'Metal Mania', system-ui;
      font-size: 90px;
      color: #ffffff;
      letter-spacing: 4px;
      margin: 0 0 40px 0;
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.8), 0 0 30px rgba(37, 99, 235, 0.4);
      animation: titleBob 3s ease-in-out infinite;
    }

    .prompt-text {
      font-family: 'Metal Mania', system-ui;
      font-size: 18px;
      color: #94a3b8;
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: auto;
      animation: promptPulse 2s ease-in-out infinite;
    }

    @keyframes promptPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #loading-text {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #475569;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .start-title {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="ui-container">
    <div class="title-group">
      <div style="height: 100px;"></div>
    </div>
    
    
    <div id="loading-text">Loading 3D Engine...</div>
  </div>

  <div id="fade-overlay"></div>

  <div id="title-screen" style="display:none;">
    <h1 class="screen-title">Conscripts</h1>
    <div class="prompt-text">Press Any Button to Begin</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 512;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const bgGradient = bgCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
    bgGradient.addColorStop(0, '#0a1428');
    bgGradient.addColorStop(0.3, '#080e20');
    bgGradient.addColorStop(0.7, '#03060d');
    bgGradient.addColorStop(1, '#000000');
    bgCtx.fillStyle = bgGradient;
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    scene.background = new THREE.CanvasTexture(bgCanvas);
    
    // Camera setup
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 15);
    
    // Renderer setup
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);
    
    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    
    // Warm key light
    const keyLight = new THREE.DirectionalLight(0xffdfb0, 2.0);
    keyLight.position.set(5, 5, 5);
    keyLight.castShadow = true;
    scene.add(keyLight);
    
    // Cool fill light
    const fillLight = new THREE.DirectionalLight(0x88ccff, 1.2);
    fillLight.position.set(-5, -3, 3);
    scene.add(fillLight);
    
    // Rim light for edge highlights
    const rimLight = new THREE.DirectionalLight(0x3b82f6, 1.5);
    rimLight.position.set(0, 5, -5);
    scene.add(rimLight);

    // Create DVD Case
    const dvdGroup = new THREE.Group();
    scene.add(dvdGroup);
    
    // Case dimensions
    const width = 5.0;
    const height = 7.0;
    const depth = 0.4;
    
    // Load cover texture
    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin('anonymous');
    const coverMaterial = new THREE.MeshStandardMaterial({
      roughness: 0.15,
      metalness: 0.05,
      color: 0xffffff
    });
    
    // Back cover material
    const backCoverMaterial = new THREE.MeshStandardMaterial({
      roughness: 0.15,
      metalness: 0.05,
      color: 0xffffff
    });

    // Try both path casings for cross-platform compatibility
    const frontTexturePaths = [
      'Assets/14796d0c-e01c-4da3-916a-7b75ab0b0953.png',
      'assets/14796d0c-e01c-4da3-916a-7b75ab0b0953.png'
    ];

    const backTexturePaths = [
      'Assets/34831e6a-7a46-4ce3-ad1d-c14b09a02060.png',
      'assets/34831e6a-7a46-4ce3-ad1d-c14b09a02060.png'
    ];

    function loadTexture(paths, material, label) {
      let pathIndex = 0;
      function tryNext() {
        if (pathIndex >= paths.length) {
          console.error('All ' + label + ' texture paths failed');
          document.getElementById('loading-text').style.display = 'none';
          return;
        }
        textureLoader.load(
          paths[pathIndex],
          function(texture) {
            console.log(label + ' texture loaded from', paths[pathIndex], ':', texture.image.width, 'x', texture.image.height);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.colorSpace = THREE.SRGBColorSpace;
            material.map = texture;
            material.needsUpdate = true;
            document.getElementById('loading-text').style.display = 'none';
          },
          function(xhr) {
            console.log(label + ' texture progress from', paths[pathIndex], ':', (xhr.loaded / xhr.total * 100) + '%');
          },
          function(err) {
            console.error('Error loading ' + label + ' texture from', paths[pathIndex], ':', err);
            pathIndex++;
            tryNext();
          }
        );
      }
      tryNext();
    }

    loadTexture(frontTexturePaths, coverMaterial, 'Front');
    loadTexture(backTexturePaths, backCoverMaterial, 'Back');
    
    // Other materials for the case
    const plasticMaterial = new THREE.MeshStandardMaterial({
      color: 0x0a0a0d,
      roughness: 0.5,
      metalness: 0.2
    });
    
    const spineMaterial = new THREE.MeshStandardMaterial({
      color: 0x08080a,
      roughness: 0.4,
      metalness: 0.1
    });
    
    const paperEdgeMaterial = new THREE.MeshStandardMaterial({
      color: 0xdddddd,
      roughness: 0.8,
      metalness: 0.0
    });
    
    // Array of materials for each face of the box
    // Order: Right, Left, Top, Bottom, Front, Back
    const materials = [
      spineMaterial,       // Right (spine)
      paperEdgeMaterial,   // Left (opening edge)
      plasticMaterial,     // Top
      plasticMaterial,     // Bottom
      coverMaterial,       // Front (cover)
      backCoverMaterial    // Back
    ];
    
    const geometry = new THREE.BoxGeometry(width, height, depth);
    
    const dvdCase = new THREE.Mesh(geometry, materials);
    dvdCase.castShadow = true;
    dvdCase.receiveShadow = true;
    dvdGroup.add(dvdCase);
    
    // Add a subtle inner glow or particle effect around the case for dark fantasy vibe
    const particleCount = 100;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 12;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 12;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 12;
    }
    
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      color: 0x3b82f6,
      size: 0.05,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
    
    // Interaction variables
    let isDragging = false;
    let cameraZoom = 15;

    // Mouse wheel zoom
    window.addEventListener('wheel', (event) => {
      cameraZoom = Math.max(8, Math.min(20, cameraZoom + event.deltaY * 0.01));
    }, { passive: true });
    let previousMouseX = 0;
    let previousMouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;
    let currentRotationX = 0;
    let currentRotationY = 0;
    let velocityX = 0;
    let velocityY = 0;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isHovering = false;
    
    // Cursor styles
    const canvas = renderer.domElement;
    canvas.style.cursor = 'default';
    
    // Raycasting for hover detection
    function checkHover(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(dvdCase, true);
      
      isHovering = intersects.length > 0;
      canvas.style.cursor = isHovering ? (isDragging ? 'grabbing' : 'grab') : 'default';
    }
    
    window.addEventListener('mousemove', (event) => {
      checkHover(event);
      
      if (isDragging) {
        const deltaX = event.clientX - previousMouseX;
        const deltaY = event.clientY - previousMouseY;
        
        velocityX = deltaX * 0.005;
        velocityY = deltaY * 0.005;
        
        targetRotationY += velocityX;
        targetRotationX += velocityY;
        
        previousMouseX = event.clientX;
        previousMouseY = event.clientY;
      }
    });
    
    window.addEventListener('mousedown', (event) => {
      if (isHovering) {
        isDragging = true;
        previousMouseX = event.clientX;
        previousMouseY = event.clientY;
        canvas.style.cursor = 'grabbing';
      }
    });
    
    window.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = isHovering ? 'grab' : 'default';
    });
    
    window.addEventListener('mouseleave', () => {
      isDragging = false;
      canvas.style.cursor = 'default';
    });
    
    // Start game from title screen
    function startGame() {
      sessionStorage.setItem('app_nav','1'); window.location.href = 'overworld.html';
    }

    // Any key to advance
    window.addEventListener('keydown', (event) => {
      const ts = document.getElementById('title-screen');
      if (ts && ts.style.display !== 'none' && ts.style.display !== '') {
        event.preventDefault();
        startGame();
      } else if (!isTransitioning) {
        event.preventDefault();
        startTransition();
      }
    });

    // Any click on title screen starts game
    document.addEventListener('click', () => {
      const ts = document.getElementById('title-screen');
      if (ts && ts.style.display !== 'none' && ts.style.display !== '') {
        startGame();
      }
    });

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Fade overlay fade-in on load
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('fade-overlay');
      setTimeout(() => {
        overlay.classList.add('fade-out');
      }, 100);
    });
    
    // Transition action
    let isTransitioning = false;
    
    function startTransition() {
      if (isTransitioning) return;
      isTransitioning = true;
      
      // Fade out UI
      document.getElementById('ui-container').style.transition = 'opacity 0.8s ease';
      document.getElementById('ui-container').style.opacity = '0';
      
      // Fade to black overlay
      const overlay = document.getElementById('fade-overlay');
      overlay.classList.remove('fade-out');
      
      // Speed up spin and fly towards camera
      const startTime = performance.now();
      function animateTransition() {
        const elapsed = (performance.now() - startTime) / 1000;
        const progress = Math.min(elapsed / 1.5, 1); // 1.5s transition
        
        // Spin faster
        dvdGroup.rotation.y += 0.01 + progress * 0.15;
        // Fly towards camera
        dvdGroup.position.z = progress * 12;
        
        if (progress < 1) {
          requestAnimationFrame(animateTransition);
        } else {
          // Show title screen with particles
          dvdGroup.visible = false;
          document.getElementById('ui-container').style.display = 'none';
          document.getElementById('fade-overlay').style.display = 'none';
          document.getElementById('title-screen').style.display = 'flex';
        }
      }
      animateTransition();
    }
    
    // Render loop
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();
      
      if (!isTransitioning) {
        // Subtle bobbing only
        dvdGroup.position.y = Math.sin(time * 1.5) * 0.15;
        
        // Apply rotation with inertia/damping
        currentRotationX += (targetRotationX - currentRotationX) * 0.1;
        currentRotationY += (targetRotationY - currentRotationY) * 0.1;
        
        // Apply velocity for inertia when dragging stops
        targetRotationX += velocityY;
        targetRotationY += velocityX;
        velocityX *= 0.99;
        velocityY *= 0.99;
        
        dvdGroup.rotation.x = currentRotationX;
        dvdGroup.rotation.y = currentRotationY;

        // Smooth zoom
        camera.position.z += (cameraZoom - camera.position.z) * 0.1;
      }
      
      // Animate particles
      particles.rotation.y = time * 0.05;
      particles.rotation.x = time * 0.02;
      
      // Subtle color shifting for particles
      particleMaterial.color.setHSL((0.6 + Math.sin(time * 0.1) * 0.1) % 1.0, 0.8, 0.5);
      
      renderer.render(scene, camera);
    }
    
    animate();


  </script>
</body>
</html>
