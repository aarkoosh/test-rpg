<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <script>if(sessionStorage.getItem('app_nav')!=='1'){window.location.replace('index.html');}else{sessionStorage.removeItem('app_nav');}</script>
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
  <link rel="modulepreload" crossorigin="anonymous" integrity="sha384-AGb1dmc6iKzaUdiKzoPrjurf+KS2wBFi+pjOpaJcgaw+7KKLb6xukClmpc64hKhg" href="https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js">
  <style>
    :root {
      --color-bg: #090d16;
      --color-panel: rgba(19, 25, 36, 0.9);
      --color-border: #2e3e59;
      --color-accent: #dc2626;
      --color-gold: #fbbf24;
      --color-green: #10b981;
      --color-purple: #a855f7;
      --color-ap: #3b82f6;
      --font-serif: "Georgia", serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-serif);
      letter-spacing: 0.5px;
      user-select: none;
      -webkit-user-select: none;
    }

    #ui-stack {
      position: absolute;
      left: 16px;
      top: 16px;
      bottom: 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      background: rgba(0, 0, 0, 0.85);
      color: #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.65), inset 0 0 15px rgba(255,255,255,0.03);
      border: 1px solid var(--color-border);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    h3 { 
      margin: 0;
      color: #f87171;
      font-size: 22px;
      letter-spacing: 2px; 
      font-weight: normal;
      font-family: 'Metal Mania', system-ui;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .audio-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      color: #94a3b8;
      border-radius: 4px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .audio-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .subtitle { 
      font-size: 9px;
      color: #94a3b8;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(220, 38, 38, 0.4); 
      padding-bottom: 4px;
      letter-spacing: 1.5px;
    }

    .stats-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-row { 
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      border-bottom: 1px dashed rgba(255,255,255,0.05); 
      padding-bottom: 3px;
    }

    .stat-val {
      font-weight: bold;
      color: #ffffff;
      font-family: var(--font-serif);
      font-size: 13px;
    }

    .action-bar {
      margin-top: 4px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .action-btn {
      background: #1e293b;
      border: 1px solid var(--color-border);
      color: #cbd5e1;
      font-family: var(--font-serif);
      font-size: 10px;
      padding: 8px 2px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .action-btn:hover {
      background: #334155;
      color: #fff;
      border-color: #475569;
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    .action-btn.active {
      border-color: var(--color-accent);
      background: rgba(220, 38, 38, 0.15);
      color: #fca5a5;
    }

    .action-btn.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .action-btn .lock-icon {
      display: none;
      font-size: 10px;
    }
    .action-btn.locked .lock-icon {
      display: inline;
    }

    .action-btn .cost {
      font-size: 9px;
      font-weight: bold;
      color: #93c5fd;
    }

    .action-btn .hotkey {
      font-size: 8px;
      color: #64748b;
      font-family: var(--font-serif);
    }

    .action-btn-end {
      background: #27272a;
      border-color: #3f3f46;
      color: #f4f4f5;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .action-btn-end:hover {
      background: #dc2626;
      border-color: #ef4444;
    }

    #btn-explore-area {
      background: #1e293b;
      border-color: var(--color-gold);
      color: var(--color-gold);
      font-weight: bold;
      letter-spacing: 1px;
    }
    #btn-explore-area:hover {
      background: var(--color-gold);
      border-color: #fef08a;
      color: #0f172a;
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
    }

    #chronicle-ui {
      flex: 1;
      min-height: 0;
    }
    #log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-size: 11px;
      display: flex;
      flex-direction: column-reverse;
      line-height: 1.5;
      color: #94a3b8;
    }
    #panel-resize-handle {
      height: 8px;
      margin-top: auto;
      cursor: ns-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.2s;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #panel-resize-handle:hover { background: rgba(255,255,255,0.08); }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    .log-entry {
      margin-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      padding-bottom: 2px;
    }

    #inv {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
      min-height: 160px;
      max-height: 172px;
      overflow-y: auto;
      padding-right: 4px;
    }
    #inv::-webkit-scrollbar { width: 4px; }
    #inv::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    .inv-slot {
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      padding: 4px;
      font-size: 8.5px;
      padding: 3px;
      text-align: center;
      line-height: 1.1;
      color: #c084fc;
      box-sizing: border-box;
      word-break: break-word;
      overflow: hidden;
    }

    
    #start-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at center, #050a15 0%, #010204 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      color: #e2e8f0;
      text-align: center;
      transition: opacity 0.6s ease;
    }
    #start-screen * {
      opacity: 0;
      pointer-events: none;
    }
    #start-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .start-title {
      font-family: 'Metal Mania', system-ui;
      font-size: 120px;
      color: #000;
      letter-spacing: 4px;
      margin: 0 0 80px 0;
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.8), 0 0 30px rgba(37, 99, 235, 0.4);
      animation: titleBob 4s ease-in-out infinite;
    }
    @keyframes titleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .start-subtitle {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 3px;
      margin-bottom: 50px;
    }
    #start-game-btn {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #334155;
      color: #64748b;
      padding: 10px 30px;
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    #start-game-btn:hover {
      background: #1e293b;
      border-color: #3b82f6;
      color: #fff;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
    }

    #death-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(10, 0, 0, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      color: #ef4444;
      text-align: center;
    }
    .death-title {
      font-size: 64px;
      color: #ef4444;
      letter-spacing: 12px;
      margin: 0;
      text-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
      margin-bottom: 40px;
    }
    #return-menu-btn {
      background: #1e293b;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 14px 40px;
      font-family: var(--font-serif);
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    #return-menu-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    #travel-popup {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
    }
    #travel-popup .travel-content {
      background: rgba(19, 25, 36, 0.95);
      border: 2px solid var(--color-gold);
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
      box-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
    }
    #travel-popup .travel-title {
      font-family: 'Metal Mania', system-ui;
      font-size: 28px;
      color: var(--color-gold);
      margin: 0 0 8px 0;
      letter-spacing: 2px;
    }
    #travel-popup .travel-desc {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    #travel-popup .travel-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    #travel-popup .travel-btn {
      padding: 10px 32px;
      font-family: var(--font-serif);
      font-size: 16px;
      letter-spacing: 2px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s ease;
    }
    #travel-popup .travel-btn-yes {
      background: #1e293b;
      border-color: var(--color-gold);
      color: var(--color-gold);
    }
    #travel-popup .travel-btn-yes:hover {
      background: var(--color-gold);
      color: #0f172a;
    }
    #travel-popup .travel-btn-no {
      background: #27272a;
      border-color: #3f3f46;
      color: #f4f4f5;
    }
    #travel-popup .travel-btn-no:hover {
      background: #dc2626;
      border-color: #ef4444;
    }

    .highlight { color: #f87171; font-weight: normal; font-style: normal;}

    .dmg-popup {
      position: absolute;
      font-family: var(--font-serif);
      font-weight: bold;
      font-size: 26px;
      pointer-events: none;
      text-shadow: 0 2px 8px #000, 0 0 12px rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: all 0.85s cubic-bezier(0.25, 1, 0.5, 1);
      opacity: 1;
      z-index: 100;
    }

    .settings-section-title {
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 1.5px;
      color: #fca5a5;
      border-bottom: 1px dashed rgba(255,255,255,0.15);
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    .settings-select {
      background: #0f172a;
      border: 1px solid var(--color-border);
      color: #f8fafc;
      font-family: var(--font-serif);
      padding: 4px 8px;
      border-radius: 4px;
      outline: none;
      font-size: 11px;
    }

    .settings-select option {
      background: #0f172a;
      color: #f8fafc;
    }

    .tab-bar {
      display: flex;
      gap: 3px;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(220, 38, 38, 0.4);
      padding-bottom: 6px;
    }

    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      color: #64748b;
      font-family: var(--font-serif);
      font-size: 16px;
      width: 36px;
      height: 32px;
      padding: 0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #e2e8f0;
      border-color: #475569;
    }

    .tab-btn.active {
      background: rgba(220,38,38,0.15);
      border-color: var(--color-accent);
      color: #fca5a5;
    }

    .tab-content.hidden {
      display: none;
    }

    @media (max-width: 640px) {
      #ui-stack {
        left: 8px;
        top: auto;
        bottom: 8px;
        width: calc(100vw - 16px);
        max-height: 55vh;
        gap: 2px;
      }
      .panel { padding: 12px; }
      #log {
        flex: 1;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div id="start-screen">
      <div style="height: 60px;"></div>
      <button id="start-game-btn">Begin Journey</button>
  </div>
  <div id="death-screen">
    <h1 class="death-title">You Died</h1>
    <button id="return-menu-btn">Return to Main Menu</button>
  </div>
  <div id="travel-popup">
    <div class="travel-content">
      <h2 class="travel-title">Travel Beyond?</h2>
      <div class="travel-desc">You stand at the edge of <span id="travel-map-name" style="color:#fbbf24;">the unknown</span>.<br>Venture forth into the next area?</div>
      <div class="travel-btns">
        <button id="travel-btn-yes" class="travel-btn travel-btn-yes">Yes</button>
        <button id="travel-btn-no" class="travel-btn travel-btn-no">No</button>
      </div>
    </div>
  </div>
  <div id="ui-stack">
    <div id="hero-ui" class="panel">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="character">&#9822;</button>
        <button class="tab-btn" data-tab="inventory">&#9921;</button>
        <button class="tab-btn" data-tab="skills">&#9889;</button>
        <button class="tab-btn" data-tab="codex">&#128214;</button>
        <button class="tab-btn" data-tab="settings">&#9881;</button>
      </div>

      <div class="tab-content" id="tab-character">
        <div class="stats-container">
          <div class="settings-section-title" style="gap:6px;"><span id="char-name-display">The Black Knight</span></div>
          <div class="stat-row"><span>Infamy:</span><span class="stat-val"><span id="xp">0</span></span></div>
          <div class="stat-row"><span>Actions:</span><span class="stat-val" style="color:#60a5fa;"><span id="ap">4</span> / <span id="map">4</span></span></div>
          <div class="stat-row"><span>Satiation:</span><span class="stat-val" style="color:#fbbf24;"><span id="satiation">10</span> / 10</span></div>
          <div class="stat-row"><span>Health:</span><span class="stat-val" style="color:#10b981;"><span id="hp">100</span> / <span id="mhp">100</span></span></div>
          <div class="stat-row"><span>Armor:</span><span class="stat-val" style="color:#94a3b8;"><span id="armor">0</span></span></div>
          <div class="stat-row"><span>Strength:</span><span class="stat-val" style="color:#dc2626;"><span id="str">7</span></span></div>
          <div class="stat-row"><span>Wisdom:</span><span class="stat-val" style="color:#a78bfa;"><span id="wis">5</span></span></div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-inventory">
        <div id="inv"></div>
      </div>

      <div class="tab-content hidden" id="tab-skills">
        <div class="action-bar" style="margin-top: 0px;">
          <button class="action-btn" id="btn-swing" data-spell="melee swing">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#fb923c; font-weight:bold;">Melee Swing</span>
            <span class="cost">1 AP</span>
            <span class="hotkey">[1]</span>
          </button>
          <button class="action-btn" id="btn-strike" data-spell="weapon strike">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#cbd5e1; font-weight:bold;">Weapon Strike</span>
            <span class="cost">1 AP</span>
            <span class="hotkey">[2]</span>
          </button>
          <button class="action-btn" id="btn-fireball" data-spell="fireball">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#f97316; font-weight:bold;">Fireball</span>
            <span class="cost">1 AP</span>
            <span class="hotkey">[3]</span>
          </button>
          <button class="action-btn" id="btn-mend" data-spell="flesh mend">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#34d399; font-weight:bold;">Flesh Mend</span>
            <span class="cost">2 AP</span>
            <span class="hotkey">[4]</span>
          </button>
          <button class="action-btn" id="btn-souldrain" data-spell="soul drain">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#c084fc; font-weight:bold;">Soul Drain</span>
            <span class="cost">2 AP</span>
            <span class="hotkey">[5]</span>
          </button>
          <button class="action-btn" id="btn-lightning" data-spell="lightning bolt">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#fbbf24; font-weight:bold;">Lightning Bolt</span>
            <span class="cost">2 AP</span>
            <span class="hotkey">[6]</span>
          </button>
          <button class="action-btn" id="btn-teleport" data-spell="teleport">
            <span class="lock-icon"></span>
            <span class="skill-name" style="color:#818cf8; font-weight:bold;">Teleport</span>
            <span class="cost">2 AP</span>
            <span class="hotkey">[7]</span>
          </button>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-codex">
        <div class="subtitle-container" style="margin-top: 0px;">
          <select id="codex-select" class="settings-select" style="width:100%; border-color: rgba(220,38,38,0.6); background:#0f172a; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#f8fafc;">
            <option value="">— Select Entry —</option>
            <optgroup label="— Characters —" style="color:#94a3b8;">
              <option value="The Black Knight">The Black Knight</option>
              <option value="Wretch">Wretch</option>
              <option value="Husk">Husk</option>
              <option value="Abomination">Abomination</option>
              <option value="Gelatinous Cube">Gelatinous Cube</option>
              <option value="Knight">Knight</option>
              <option value="Priest">Priest</option>
              <option value="Guard">Guard</option>
              <option value="Ranger">Ranger</option>
              <option value="TownFolk">TownFolk</option>
              <option value="Catapult">Catapult</option>
              <option value="Zombie">Zombie</option>
              <option value="The Undying Tyrant">The Undying Tyrant</option>
            </optgroup>
            <optgroup label="— Structures —" style="color:#94a3b8;">
              <option value="House">House</option>
              <option value="Barn">Barn</option>
              <option value="Church">Church</option>
              <option value="Prison Cart">Prison Cart</option>
              <option value="Ruined Enclave">Ruined Enclave</option>
              <option value="Tree">Tree</option>
              <option value="Crop">Crop</option>
            </optgroup>
          </select>
          <div id="codex-preview" style="width:100%; height:170px; margin-top:6px; border:1px solid var(--color-border); border-radius:4px; overflow:hidden; background:#fff;"></div>
          <div id="codex-info" style="margin-top:6px; font-size:13px; color:#94a3b8; text-align:center; letter-spacing:1px; font-family:var(--font-serif);"></div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-settings">
        <div class="subtitle-container" style="margin-top: 0px;">
          <div style="display:flex; gap:4px; margin-bottom:6px;">
            <input type="text" id="name-input" maxlength="24" style="flex:1; background:#1e293b; border:1px solid var(--color-border); border-radius:4px; color:#cbd5e1; font-family:var(--font-serif); font-size:11px; padding:6px 8px; outline:none;">
            <button id="name-save-btn" class="action-btn" style="padding:6px 10px; font-size:10px; cursor:pointer;">Save</button>
          </div>
          <select id="chapter-select" class="settings-select" style="width: 100%; border-color: rgba(220, 38, 38, 0.6); background: #0f172a; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #f8fafc;">
            <option value="1">I: Iron & Gloom</option>
            <option value="2">II: Obsidian Tides</option>
            <option value="3">III: The Gilded Blight</option>
            <option value="4">IV: Echoes of Aether</option>
            <option value="5">V: The Crimson Citadel</option>

const SoundSystem = {
  ctx: null, enabled: true, volume: 0.5, waveform: 'triangle', noiseBuffer: null,
  init() { 
    if (this.ctx) {
      if (this.ctx.state === 'suspended') this.ctx.resume();
      return;
    }
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Pre-generate noise buffer for performance
    const bufferSize = this.ctx.sampleRate * 0.2;
    this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = this.noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  },
  toggle(forceState = null) {
    this.enabled = (forceState !== null) ? forceState : !this.enabled;
    if (this.enabled && this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  playSlash() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const noise = this.ctx.createBufferSource();
    noise.buffer = this.noiseBuffer;
    const noiseFilter = this.ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.setValueAtTime(1000, now);
    noiseFilter.frequency.exponentialRampToValueAtTime(150, now + 0.15);
    const gainNode = this.ctx.createGain();
    gainNode.gain.setValueAtTime(0.3 * this.volume, now);
    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.15);
    noise.connect(noiseFilter); noiseFilter.connect(gainNode); gainNode.connect(this.ctx.destination);
    noise.start(now);
  },
  playSpellCast() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = this.waveform;
    osc.frequency.setValueAtTime(80, now);
    osc.frequency.exponentialRampToValueAtTime(850, now + 0.4);
    osc2.type = this.waveform;
    osc2.frequency.setValueAtTime(40, now);
    osc2.frequency.exponentialRampToValueAtTime(425, now + 0.4);
    gain.gain.setValueAtTime(0.15 * this.volume, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.connect(gain); osc2.connect(gain); gain.connect(this.ctx.destination);
    osc.start(now); osc2.start(now); osc.stop(now + 0.5); osc2.stop(now + 0.5);
  },
  playHeal() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const notes = [261.63, 329.63, 392.00, 523.25];
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = this.waveform;
      osc.frequency.setValueAtTime(freq, now + index * 0.08);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.12 * this.volume, now + index * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.3);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(now + index * 0.08); osc.stop(now + index * 0.08 + 0.35);
    });
  },
  playDamage() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = this.waveform;
    osc.frequency.setValueAtTime(160, now);
    osc.frequency.linearRampToValueAtTime(50, now + 0.25);
    gain.gain.setValueAtTime(0.2 * this.volume, now);
    gain.gain.linearRampToValueAtTime(0.001, now + 0.25);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(now); osc.stop(now + 0.3);
  },
  playLevelUp() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const notes = [293.66, 349.23, 440.00, 587.33];
    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = this.waveform;
      osc.frequency.setValueAtTime(freq, now + index * 0.12);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15 * this.volume, now + index * 0.12 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.12 + 0.6);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(now + index * 0.12); osc.stop(now + index * 0.12 + 0.75);
    });
  },
  playBuzzer() {
    if (!this.enabled) return;
    this.init();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';

    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(now); osc.stop(now + 0.18);
  }
};

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
}

class MapSnapshot {
  constructor(key, chapter, mx, my, biome) {
    this.key = key;

    this.rubbles = [];
    this.playerQ = 0;
    this.playerR = 0;
    this.turn = 1;
    this.connectedMaps = {};
    for (const [dx, dy] of MAP_HEX_DIRS) {
      this.connectedMaps[`${dx},${dy}`] = null;
    }
    this.lastAccessed = Date.now();
  }

  connectTo(dirX, dirY, targetKey) {
    this.connectedMaps[`${dirX},${dirY}`] = targetKey;
  }

  getConnected(dirX, dirY) {
    return this.connectedMaps[`${dirX},${dirY}`] || null;
  }
}

function cacheMap(key, snapshot) {
  snapshot.lastAccessed = Date.now();
  mapCache.set(key, snapshot);
  if (mapCache.size > MAX_CACHED_MAPS) {
    let oldestKey = null;
    let oldestTime = Infinity;
    for (const [k, snap] of mapCache) {
      if (snap.lastAccessed < oldestTime) {
        oldestTime = snap.lastAccessed;
        oldestKey = k;
      }
    }
    if (oldestKey) mapCache.delete(oldestKey);
  }
}

  } else if (ch === 4) {

    return "CRAG";
  } else {

  }
}

function hashSeedString(seedVal) {
  let hash = 0;
  for (let i = 0; i < seedVal.length; i++) {
    hash = Math.imul(31, hash) + seedVal.charCodeAt(i) | 0;
  }
  return hash;
}

  }
  // Use coordinate-specific seed for deterministic terrain generation
  const coordSeed = hashSeedString(`${mapSeed}_${chapter || 1}_${mapX || 0}_${mapY || 0}`);
  seededRandom = mulberry32(coordSeed);
}

// --- BIOME-SPECIFIC WEATHER SYSTEM ---
class WeatherSystem {
  constructor() {
    this.particleCount = 3000;
    this.geometry = new THREE.BufferGeometry();
    this.positions = new Float32Array(this.particleCount * 3);
    this.velocities = [];
    this.colors = new Float32Array(this.particleCount * 3);
    
    // Initialize positions and velocities
    for (let i = 0; i < this.particleCount; i++) {
      this.resetParticle(i);
    }
    
    this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
    this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
    
    this.material = new THREE.PointsMaterial({
      size: 0.3,
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    
    this.points = new THREE.Points(this.geometry, this.material);
    scene.add(this.points);
    
    this.currentChapter = 1;
  }
  
  resetParticle(i, initY = false) {
    const range = 180;
    const hp = hero ? hero.position : new THREE.Vector3(0, 0, 0);
    
    this.positions[i * 3] = hp.x + (Math.random() - 0.5) * range;
    this.positions[i * 3 + 1] = initY ? hp.y + 45 + Math.random() * 25 : hp.y + Math.random() * 70 - 10;
    this.positions[i * 3 + 2] = hp.z + (Math.random() - 0.5) * range;
    
    const ch = this.currentChapter;
    let vx = 0, vy = 0, vz = 0;
    let r = 1, g = 1, b = 1;
    
    if (ch === 1) { // Fog
      vx = (Math.random() - 0.5) * 0.05;
      vy = (Math.random() - 0.5) * 0.01;
      vz = (Math.random() - 0.5) * 0.05;
      r = 0.6; g = 0.65; b = 0.7;
    } else if (ch === 2) { // Ash & Embers
      vx = (Math.random() - 0.5) * 0.08;
      vy = -0.05 - Math.random() * 0.05;
      vz = (Math.random() - 0.5) * 0.08;
      if (Math.random() < 0.3) { // Ember
        r = 1.0; g = 0.45; b = 0.1;
      } else { // Ash
        r = 0.3; g = 0.3; b = 0.3;
      }
    } else if (ch === 3) { // Sandstorm
      vx = -0.2 - Math.random() * 0.2;
      vy = -0.02 - Math.random() * 0.02;
      vz = (Math.random() - 0.5) * 0.1;
      r = 0.9; g = 0.75; b = 0.3;
    } else if (ch === 4) { // Aether Sparkles
      vx = (Math.random() - 0.5) * 0.04;
      vy = 0.03 + Math.random() * 0.04;
      vz = (Math.random() - 0.5) * 0.04;
      if (Math.random() < 0.5) {
        r = 0.65; g = 0.3; b = 0.95; // Purple
      } else {
        r = 0.1; g = 0.7; b = 0.85; // Cyan
      }
    } else if (ch === 5) { // Crimson Fog / Blood Rain
      vx = (Math.random() - 0.5) * 0.02;
      vy = -0.2 - Math.random() * 0.15; // Fast falling rain
      vz = (Math.random() - 0.5) * 0.02;
      r = 0.8; g = 0.1; b = 0.1;
    } else if (ch === 6) { // Fire Embers
      vx = (Math.random() - 0.5) * 0.1;
      vy = 0.05 + Math.random() * 0.08;
      vz = (Math.random() - 0.5) * 0.1;
      r = 1.0; g = 0.3 + Math.random() * 0.2; b = 0.0;
    }
    
    this.velocities[i] = { x: vx, y: vy, z: vz };
    this.colors[i * 3] = r;
    this.colors[i * 3 + 1] = g;
    this.colors[i * 3 + 2] = b;
  }
  
  setChapter(chapter) {
    this.currentChapter = parseInt(chapter);
    
    const ch = this.currentChapter;
    if (ch === 1) {
      this.material.size = 1.5;
      this.material.opacity = 0.25;
    } else if (ch === 2) {
      this.material.size = 0.4;
      this.material.opacity = 0.6;
    } else if (ch === 3) {
      this.material.size = 0.3;
      this.material.opacity = 0.5;
    } else if (ch === 4) {
      this.material.size = 0.5;
      this.material.opacity = 0.7;
    } else if (ch === 5) {
      this.material.size = 0.25;
      this.material.opacity = 0.65;
    } else if (ch === 6) {
      this.material.size = 0.5;
      this.material.opacity = 0.75;
    }
    this.material.needsUpdate = true;
    
    for (let i = 0; i < this.particleCount; i++) {
      this.resetParticle(i);
    }
    this.geometry.attributes.position.needsUpdate = true;
    this.geometry.attributes.color.needsUpdate = true;
  }
  
  update(frameAdjust) {
    const hp = hero ? hero.position : new THREE.Vector3(0, 0, 0);
    const range = 180;
    
    const posAttr = this.geometry.attributes.position;
    
    for (let i = 0; i < this.particleCount; i++) {
      const idx = i * 3;
      const vel = this.velocities[i];
      
      this.positions[idx] += vel.x * frameAdjust;
      this.positions[idx + 1] += vel.y * frameAdjust;
      this.positions[idx + 2] += vel.z * frameAdjust;
      
      const dx = this.positions[idx] - hp.x;
      const dy = this.positions[idx + 1] - hp.y;
      const dz = this.positions[idx + 2] - hp.z;
      
      if (Math.abs(dx) > range / 2 || dy < -10 || dy > 65 || Math.abs(dz) > range / 2) {
        this.resetParticle(i, true);
      }
    }
    
    posAttr.needsUpdate = true;
  }
  
  dispose() {
    scene.remove(this.points);
    this.geometry.dispose();
    this.material.dispose();
  }
}

function generateWorld(chapter, mapX, mapY) {
  if (mapX === undefined) mapX = 0;
  if (mapY === undefined) mapY = 0;
  const ch = parseInt(chapter);
  currentMapCoords = { chapter: ch, x: mapX, y: mapY };
  currentMapKey = mapKey(chapter, mapX, mapY);
  currentBiome = getBiomeForMap(chapter, mapX, mapY);
  updateMapCoordsDisplay();
  initMapRandom(chapter, mapX, mapY);
  availableTravelDirs = [];

  // Initialize or update the weather system
  if (!weatherSystem) {
    weatherSystem = new WeatherSystem();
  }
  weatherSystem.setChapter(chapter);

  // Properly dispose of resources to prevent memory leaks during chapter transitions
  tileLookup.clear();

  // Clear active FX and their meshes
  activeFx.forEach(fx => {
    scene.remove(fx.mesh);
    if (fx.mesh.geometry) fx.mesh.geometry.dispose();
    if (fx.mesh.material) fx.mesh.material.dispose();
  });
  activeFx.length = 0;

  worldContainer.traverse(node => {
    if (node.isMesh) {
      // Only dispose if it's NOT a pooled geometry or material
      const isPooledGeo = Object.values(Geoms).includes(node.geometry) || node.geometry === geo || node.geometry === baseGeo;
      if (node.geometry && !isPooledGeo) node.geometry.dispose();

      const isPooledMat = Object.values(biomeMaterials).includes(node.material) || 
                          Object.values(activeColors).includes(node.material) ||
                          [unifiedBaseMat, foliageMat, woodMat, royalCrimsonMat, keepStoneMat, barnBodyMat, barnRoofMat, barnDoorTrimMat, cropMat].includes(node.material);
      if (node.material && !isPooledMat) {
        if (Array.isArray(node.material)) node.material.forEach(m => m.dispose());
        else node.material.dispose(); 
      }
    }
  });
  while(worldContainer.children.length > 0) worldContainer.remove(worldContainer.children[0]);
  tiles = []; enclaves = []; enemies = []; allies = []; headstones = []; corpses = []; portals = []; churches = []; prisons = []; rubbles = []; boss = null;

  // Randomize noise parameters for much more dramatic and large-scale coastlines
  const borderFreq = 0.12 + seededRandom() * 0.1;
  const borderOffsetQ = seededRandom() * Math.PI * 2;
  const borderOffsetR = seededRandom() * Math.PI * 2;
  const borderAmp = 5.5 + seededRandom() * 3.5;

  const getShoreNoise = (qq, rr) => {
    return (Math.sin(qq * borderFreq + borderOffsetQ) + Math.cos(rr * borderFreq + borderOffsetR)) * borderAmp +
           (Math.sin(qq * borderFreq * 2.3 + borderOffsetR) + Math.cos(qq * borderFreq * 2.3 + borderOffsetQ)) * (borderAmp * 0.45);
  };

  // River type: 0 = no river, 1 = A-to-B river, 2 = Y-shaped river
  const riverType = Math.floor(seededRandom() * 3);
  const rivWidth = HEX * 1.5;
  let rivCos, rivSin, rivFreq, rivAmp, rivOff;
  let riv2Cos, riv2Sin, riv2Freq, riv2Amp, riv2Off;
  if (riverType === 0) {
    rivCos = 0; rivSin = 0; rivFreq = 0; rivAmp = 0; rivOff = 0;
    riv2Cos = 0; riv2Sin = 0; riv2Freq = 0; riv2Amp = 0; riv2Off = 0;
  } else {
    const rivAngle = seededRandom() * Math.PI * 2;
    rivCos = Math.cos(rivAngle);
    rivSin = Math.sin(rivAngle);
    rivFreq = 0.03 + seededRandom() * 0.03;
    rivAmp = 12 + seededRandom() * 8;
    rivOff = seededRandom() * 100;
    if (riverType === 2) {
      const riv2Angle = rivAngle + 0.4 + seededRandom() * 0.6;
      riv2Cos = Math.cos(riv2Angle);
      riv2Sin = Math.sin(riv2Angle);
      riv2Freq = 0.03 + seededRandom() * 0.03;
      riv2Amp = 10 + seededRandom() * 8;
      riv2Off = seededRandom() * 100;
    }
  }

  // Terrain type: 0 = plains, 1 = hills, 2 = mountain, 3 = canyon
  const terrainType = Math.floor(seededRandom() * 4);
  const tParams = [
    { amp: 0.5, freq: 0.18, octaves: 2, base: 0.4 },
    { amp: 1.4, freq: 0.22, octaves: 3, base: 0.6 },
    { amp: 3.0, freq: 0.14, octaves: 4, base: 0.8 },
    { amp: 1.6, freq: 0.26, octaves: 3, base: 0.6 }
  ];
  const tp = tParams[terrainType];
  let canyonCos, canyonSin, canyonFreq, canyonOff;
  if (terrainType === 3) {
    const canyonAngle = seededRandom() * Math.PI * 2;
    canyonCos = Math.cos(canyonAngle);
    canyonSin = Math.sin(canyonAngle);
    canyonFreq = 0.015 + seededRandom() * 0.01;
    canyonOff = seededRandom() * 100;
  }

  // Procedurally determine building locations
  const encPos = [], churchPos = [], prisonPos = [];
  const isValidLand = (q, r) => {
    if (!HexUtils.isValid(q, r)) return false;
    const d = (Math.abs(q) + Math.abs(r) + Math.abs(-q - r)) / 2;
    const noise = getShoreNoise(q, r);
    return ch === 4 || (d + noise) <= R - 4.5;
  };
  const hexNeighbors = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
  const findLandPos = (targetArr, count, minDist, { clumpChance = 0.68, minClusterSep = 13 } = {}) => {
    let attempts = 0;
    while (targetArr.length < count && attempts < 1000) {
      attempts++;
      let q, r;
      const occupied = encPos.concat(churchPos);
      const growCluster = targetArr.length > 0 && seededRandom() < clumpChance;

      if (growCluster) {
        const parent = targetArr[Math.floor(seededRandom() * targetArr.length)];
        const dirs = hexNeighbors.slice().sort(() => seededRandom() - 0.5);
        let foundNeighbor = false;
        for (const [dq, dr] of dirs) {
          const nq = parent[0] + dq, nr = parent[1] + dr;
          if (!isValidLand(nq, nr) || occupied.some(p => p[0] === nq && p[1] === nr)) continue;
          q = nq; r = nr; foundNeighbor = true; break;
        }
        if (!foundNeighbor) {
          let tries = 0;
          do {
            q = Math.floor(seededRandom() * (R * 2)) - R;
            r = Math.floor(seededRandom() * (R * 2)) - R;
            tries++;
          } while (tries < 80 && (!HexUtils.isValid(q, r) || !isValidLand(q, r) || !targetArr.every(p => HexUtils.dist(q, r, p[0], p[1]) >= minClusterSep)));
          if (tries >= 80) continue;
        }
      } else {
        let tries = 0;
        do {
          q = Math.floor(seededRandom() * (R * 2)) - R;
          r = Math.floor(seededRandom() * (R * 2)) - R;
          tries++;
        } while (tries < 80 && (
          !HexUtils.isValid(q, r) ||
          !isValidLand(q, r) ||
          (targetArr.length > 0 && !targetArr.every(p => HexUtils.dist(q, r, p[0], p[1]) >= minClusterSep))
        ));
        if (tries >= 80) continue;
      }

      if (!HexUtils.isValid(q, r) || HexUtils.dist(0, 0, q, r) < minDist) continue;
      if (occupied.some(p => p[0] === q && p[1] === r)) continue;
      if (!isValidLand(q, r)) continue;
      targetArr.push([q, r]);
    }
  };
  findLandPos(encPos, 12, 6, { clumpChance: 0.72, minClusterSep: 14 });

  const clusterEnclaves = (positions) => {
    const clusters = [];
    const assigned = new Set();
    for (const pos of positions) {
      const key = `${pos[0]},${pos[1]}`;
      if (assigned.has(key)) continue;
      const cluster = [];
      const queue = [pos];
      assigned.add(key);
      while (queue.length) {
        const [cq, cr] = queue.shift();
        cluster.push([cq, cr]);
        for (const [dq, dr] of hexNeighbors) {
          const nq = cq + dq, nr = cr + dr;
          const nkey = `${nq},${nr}`;
          if (assigned.has(nkey)) continue;
          if (positions.some(p => p[0] === nq && p[1] === nr)) {
            assigned.add(nkey);
            queue.push([nq, nr]);
          }
        }
      }
      clusters.push(cluster);
    }
    return clusters;
  };

  const cityClusters = clusterEnclaves(encPos);
  for (const city of cityClusters) {
    if (seededRandom() < 0.5) continue;
    const occupied = encPos.concat(churchPos);
    const candidates = [];
    for (const [eq, er] of city) {
      for (const [dq, dr] of hexNeighbors) {
        const nq = eq + dq, nr = er + dr;
        if (!isValidLand(nq, nr)) continue;
        if (occupied.some(p => p[0] === nq && p[1] === nr)) continue;
        if (candidates.some(c => c[0] === nq && c[1] === nr)) continue;
        candidates.push([nq, nr]);
      }
    }
    if (candidates.length === 0) continue;
    churchPos.push(candidates[Math.floor(seededRandom() * candidates.length)]);
  }

  // Seed exactly one lake per map to ensure connectivity and no outliers
  let lq = null, lr = null;
  for (let lAttempts = 0; lAttempts < 200; lAttempts++) {
    const tq = Math.floor(seededRandom() * (R * 1.4)) - (R * 0.7);
    const tr = Math.floor(seededRandom() * (R * 1.4)) - (R * 0.7);
    if (HexUtils.isValid(tq, tr) && HexUtils.dist(0, 0, tq, tr) > 10) { lq = tq; lr = tr; break; }
  }
  const lakeSeed = lq !== null ? [lq, lr] : null;
  const lakeRadius = 2 + Math.floor(seededRandom() * 2);

  // Procedurally seed rural areas far from the clumped town centers
  const farmSeeds = [];
  let farmAttempts = 0;
  const townBuildings = encPos.concat(churchPos);

  // 1-2 prison carts total for the whole map
  const prisonTarget = 1 + Math.floor(seededRandom() * 2);
  let pAttempts = 0;
  while (prisonPos.length < prisonTarget && pAttempts < 1000) {
    pAttempts++;
    let pq = Math.floor(seededRandom() * (R * 2)) - R;
    let pr = Math.floor(seededRandom() * (R * 2)) - R;
    if (!HexUtils.isValid(pq, pr)) continue;
    const distFromTown = townBuildings.reduce((min, p) => Math.min(min, HexUtils.dist(pq, pr, p[0], p[1])), 999);
    if (distFromTown <= 10) continue;
    if (prisonPos.some(p => HexUtils.dist(pq, pr, p[0], p[1]) < 8)) continue;
    const dDist = (Math.abs(pq) + Math.abs(pr) + Math.abs(-pq - pr)) / 2;
    const eNoise = getShoreNoise(pq, pr);
    if (ch === 4 || (dDist + eNoise) <= R - 4.5) prisonPos.push([pq, pr]);
  }

  while (farmSeeds.length < 3 && farmAttempts < 500) {
    farmAttempts++;
    let fq = Math.floor(seededRandom() * (R * 2)) - R;
    let fr = Math.floor(seededRandom() * (R * 2)) - R;
    if (!HexUtils.isValid(fq, fr)) continue;
    const distFromTown = townBuildings.reduce((min, p) => Math.min(min, HexUtils.dist(fq, fr, p[0], p[1])), 999);
    const dDist = (Math.abs(fq) + Math.abs(fr) + Math.abs(-fq-fr)) / 2;
    const eNoise = getShoreNoise(fq, fr);
    if (distFromTown > 9 && (dDist + eNoise) <= R - 6) farmSeeds.push([fq, fr]);
  }

  // 1-2 taverns per map, placed away from towns and other buildings
  const tavernPos = [];
  const tavernTarget = 1 + Math.floor(seededRandom() * 2);
  const occupiedBuildings = encPos.concat(churchPos, prisonPos);
  let tavernAttempts = 0;
  while (tavernPos.length < tavernTarget && tavernAttempts < 500) {
    tavernAttempts++;
    let tq = Math.floor(seededRandom() * (R * 2)) - R;
    let tr = Math.floor(seededRandom() * (R * 2)) - R;
    if (!HexUtils.isValid(tq, tr)) continue;
    const distFromTown = townBuildings.reduce((min, p) => Math.min(min, HexUtils.dist(tq, tr, p[0], p[1])), 999);
    if (distFromTown <= 10) continue;
    if (tavernPos.some(p => HexUtils.dist(tq, tr, p[0], p[1]) < 8)) continue;
    if (occupiedBuildings.some(p => p[0] === tq && p[1] === tr)) continue;
    const dDist = (Math.abs(tq) + Math.abs(tr) + Math.abs(-tq-tr)) / 2;
    const eNoise = getShoreNoise(tq, tr);
    if (ch === 4 || (dDist + eNoise) <= R - 4.5) tavernPos.push([tq, tr]);
  }

  for(let q=-R; q<=R; q++){
    for(let r=-R; r<=R; r++){
      if(Math.abs(-q-r)>R) continue;
      const dist = (Math.abs(q) + Math.abs(r) + Math.abs(-q-r)) / 2;
      
      // Apply randomized offsets and frequency to the shoreline noise
      // This results in unique "seeds" for the map's organic border
      const edgeNoise = getShoreNoise(q, r);
      const effectiveDist = dist + edgeNoise;

      const isEnclavePos = encPos.some(p => p[0] === q && p[1] === r);
      const isChurchPos = churchPos.some(p => p[0] === q && p[1] === r);
      const isPrisonPos = prisonPos.some(p => p[0] === q && p[1] === r);
      const isTavernPos = tavernPos.some(p => p[0] === q && p[1] === r);
      const isSettlementPos = isEnclavePos || isChurchPos;
      const isBuildingPos = isSettlementPos || isPrisonPos;
      const roll = seededRandom();
      let biomeKey = "DEAD_SCRUB";

      // Procedural river calculation using world coordinates for guaranteed connectivity
      let isRiver = false;
      if (riverType !== 0) {
        const worldP = HexUtils.toWorld(q, r);
        const proj = worldP.x * rivCos + worldP.z * rivSin;
        const perp = -worldP.x * rivSin + worldP.z * rivCos;
        const riverVal = perp + Math.sin(proj * rivFreq + rivOff) * rivAmp;
        isRiver = Math.abs(riverVal) < rivWidth;
        if (!isRiver && riverType === 2) {
          const proj2 = worldP.x * riv2Cos + worldP.z * riv2Sin;
          const perp2 = -worldP.x * riv2Sin + worldP.z * riv2Cos;
          const riverVal2 = perp2 + Math.sin(proj2 * riv2Freq + riv2Off) * riv2Amp;
          isRiver = Math.abs(riverVal2) < rivWidth;
        }
      }

      // Global Edge/Shoreline logic (Land -> Silt -> Water)
      // Exclude Chapter 4 (Void) to maintain its floating island aesthetic
      if (ch !== 4 && effectiveDist > R - 1.5) biomeKey = "DEEP_WATER";
      else if (ch !== 4 && effectiveDist > R - 4.5) biomeKey = "SILT";
      else if (ch === 1) { // Iron & Gloom (Standard)
        if (isRiver) biomeKey = "RIVER";
        else if (roll < 0.05) biomeKey = "CRAG";
        else if (roll < 0.35) biomeKey = "DIRT";
        else if (roll < 0.55) biomeKey = "BUSH_TWIST";
      } else if (ch === 2) { // Obsidian Tides (Volcanic/Dark)
        if (isRiver || roll < 0.1) biomeKey = "RIVER";
        else if (roll < 0.4) biomeKey = "SILT";
      } else if (ch === 3) { // Gilded Blight (Desert/Gold)
        isRiver = false; // Dry lands
        if (roll < 0.6) biomeKey = "SILT";
        else if (roll < 0.8) biomeKey = "CRAG";
        else if (roll < 0.85) biomeKey = "FOREST_HAVEN"; // Oases
      } else if (ch === 4) { // Echoes of Aether (Floating/Void)
        isRiver = false;
        if (roll < 0.45) biomeKey = "DEEP_WATER"; // The Void
        else if (roll < 0.8) biomeKey = "FOREST_HAVEN"; 
        else biomeKey = "CRAG";
      } else if (ch === 5) { // Crimson Citadel (Gore/War)
        if (isRiver) biomeKey = "RIVER";
        else if (roll < 0.3) biomeKey = "DEAD_SCRUB";
        else if (roll < 0.5) biomeKey = "CRAG";
      } else if (ch === 6) { // Final Ember (Scorched Earth)
        if (dist < 5) biomeKey = "CRAG";
        else if (isRiver) biomeKey = "RIVER"; // Lava
        else if (roll < 0.7) biomeKey = "SILT"; // Ash
      }

      // Towns and churches sit on grey building hexes; prison carts keep the underlying terrain color
      if (isSettlementPos && !isWaterBiome(biomeKey)) biomeKey = "HOUSE";

      // Biasing HOUSE tiles to appear only near main town centers (Enclaves/Churches)
      const distToTown = townBuildings.length > 0 ? townBuildings.reduce((min, p) => Math.min(min, HexUtils.dist(q, r, p[0], p[1])), 999) : 999;
      const houseChance = distToTown <= 4.5 ? 1.0 : 0; 
      
      // Apply Farm and Field logic based on distance from Rural Seeds
      const distToFarmSeed = farmSeeds.length > 0 ? farmSeeds.reduce((min, p) => Math.min(min, HexUtils.dist(q, r, p[0], p[1])), 999) : 999;
      if (!isBuildingPos && !isWaterBiome(biomeKey) && distToFarmSeed === 0) biomeKey = "FARM";
      else if (!isBuildingPos && !isWaterBiome(biomeKey) && distToFarmSeed > 0 && distToFarmSeed <= 4 && roll < 0.8) biomeKey = "FIELD";
      
      // Tavern hex overrides all non-water biomes
      if (isTavernPos && !isWaterBiome(biomeKey)) biomeKey = "TAVERN";

      // Single contiguous lake logic (No outliers)
      if (lakeSeed && !isBuildingPos && biomeKey !== "DEEP_WATER" && biomeKey !== "TAVERN" && HexUtils.dist(q, r, lakeSeed[0], lakeSeed[1]) <= lakeRadius) biomeKey = "LAKE";

      if (!isBuildingPos && biomeKey !== "TAVERN" && roll < houseChance && !isWaterBiome(biomeKey)) biomeKey = "HOUSE";

      const tile = new THREE.Mesh(geo, biomeMaterials[biomeKey]);
      const p = HexUtils.toWorld(q,r);
      
      // Procedural height calculation independent of the biome pieces
      let tileY = 0;
      if (isWaterBiome(biomeKey)) {
        // Maintain depth tiers for water biomes to keep the shoreline logic intact
        if (biomeKey === "DEEP_WATER") tileY = -1.2;
        else if (biomeKey === "SHALLOW_WATER") tileY = -0.6;
        else tileY = -0.8; // Rivers and Havens
      } else {
        // Terrain height driven by multi-octave noise with per-map type variation
        let noiseVal = 0;
        for (let o = 0; o < tp.octaves; o++) {
          const f = tp.freq * Math.pow(1.7, o);
          const a = tp.amp * Math.pow(0.55, o);
          noiseVal += (Math.sin(q * f + borderOffsetQ * (o + 1) * 0.5) + Math.cos(r * f + borderOffsetR * (o + 1) * 0.5)) * a;
        }
        if (terrainType === 3) {
          const worldP = HexUtils.toWorld(q, r);
          const proj = worldP.x * canyonCos + worldP.z * canyonSin;
          const perp = -worldP.x * canyonSin + worldP.z * canyonCos;
          const canyonVal = Math.abs(perp + Math.sin(proj * canyonFreq + canyonOff) * 14);
          const carve = Math.max(0, 4.0 - canyonVal);
          noiseVal -= carve * 2.5;
        }
        tileY = Math.max(0.1, noiseVal + tp.base);
      }

      tile.position.set(p.x, tileY, p.z);
      // Stretch hexes down to plane at Y=-5.0. 
      // Since the normalized geo height is 1.12, we divide by 1.12 to get exact world units.
      tile.scale.y = (tileY + 5.0) / 1.12; 
      tile.userData = { q, r, biomeKey };
      tile.updateMatrix();
      tile.updateMatrixWorld();
      tileLookup.set(`${q},${r}`, tile);
      tiles.push(tile);
    }
  }

  // Post-processing to ensure DEEP_WATER is bordered by SHALLOW_WATER
  const shallowWaterCandidates = new Set();

  for (const tile of tiles) {
    if (tile.userData.biomeKey === "DEEP_WATER") {
      const q = tile.userData.q;
      const r = tile.userData.r;
      const neighbors = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]]; // Hexagonal neighbors
      for (const [dq, dr] of neighbors) {
        const nq = q + dq;
        const nr = r + dr;
        const neighborTile = tileLookup.get(`${nq},${nr}`);
        if (neighborTile) {
          const neighborBiome = neighborTile.userData.biomeKey;
          // If the neighbor is land (not water) or silt, it should become shallow water
          // We don't change existing RIVER, LAKE, FOREST_HAVEN, or SHALLOW_WATER
          if (!isWaterBiome(neighborBiome) || neighborBiome === "SILT") {
            shallowWaterCandidates.add(`${nq},${nr}`);
          }
        }
      }
    }
  }

  // Apply the changes to candidate tiles
  for (const qrString of shallowWaterCandidates) {
    const tile = tileLookup.get(qrString);
    if (tile) {
      tile.userData.biomeKey = "SHALLOW_WATER";
      tile.material = biomeMaterials.SHALLOW_WATER; // Update material
      const targetY = -0.6; // Standard height for SHALLOW_WATER
      tile.position.y = targetY;
      tile.scale.y = (targetY + 5.0) / 1.12; // Recalculate scale
      tile.updateMatrix();
      tile.updateMatrixWorld();
    }
  }

  // Validate map connectivity and carve paths if needed
  const reachableTiles = validateAndCarveConnectivity(encPos, churchPos, prisonPos);

  // Create InstancedMesh for each biome
  const biomeCounts = {};
  for (const tile of tiles) {
    const bKey = tile.userData.biomeKey;
    biomeCounts[bKey] = (biomeCounts[bKey] || 0) + 1;
  }

  const biomeInstancedMeshes = {};
  for (const bKey of Object.keys(biomeMaterials)) {
    const count = biomeCounts[bKey] || 0;
    if (count > 0) {
      const instMesh = new THREE.InstancedMesh(geo, biomeMaterials[bKey], count);
      instMesh.castShadow = true;
      instMesh.receiveShadow = true;
      worldContainer.add(instMesh);
      biomeInstancedMeshes[bKey] = {
        mesh: instMesh,
        index: 0
      };
    }
  }

  for (const tile of tiles) {
    const bKey = tile.userData.biomeKey;
    const instData = biomeInstancedMeshes[bKey];
    if (instData) {
      instData.mesh.setMatrixAt(instData.index, tile.matrix);
      instData.index++;
    }
  }

  for (const bKey of Object.keys(biomeInstancedMeshes)) {
    biomeInstancedMeshes[bKey].mesh.instanceMatrix.needsUpdate = true;
  }

  // --- FOREST CLUMPS ---
  // Generate concentrated dense forest patches atop existing biomes
  const forestClumps = new Set();
  const clumpCount = 2 + Math.floor(seededRandom() * 4);
  for (let c = 0; c < clumpCount; c++) {
    const candidates = tiles.filter(t => {
      const { q, r, biomeKey } = t.userData;
      if (isWaterBiome(biomeKey)) return false;
      if (biomeKey === "HOUSE" || biomeKey === "FARM" || biomeKey === "FIELD" || biomeKey === "TAVERN") return false;
      if (churchPos.some(p => p[0] === q && p[1] === r)) return false;
      if (encPos.some(p => p[0] === q && p[1] === r)) return false;
      if (prisonPos.some(p => p[0] === q && p[1] === r)) return false;
      return true;
    });
    if (candidates.length === 0) continue;
    const seed = candidates[Math.floor(seededRandom() * candidates.length)];
    const sq = seed.userData.q, sr = seed.userData.r;
    const radius = 3 + Math.floor(seededRandom() * 3);
    for (let dq = -radius; dq <= radius; dq++) {
      for (let dr = -radius; dr <= radius; dr++) {
        if (Math.abs(-dq-dr) > radius) continue;
        const hDist = HexUtils.dist(0, 0, dq, dr);
        const chance = 0.55 + (1 - hDist / radius) * 0.4;
        if (seededRandom() > chance) continue;
        const tile = tileLookup.get(`${sq + dq},${sr + dr}`);
        if (tile && !isWaterBiome(tile.userData.biomeKey) && tile.userData.biomeKey !== "HOUSE" && tile.userData.biomeKey !== "FARM" && tile.userData.biomeKey !== "FIELD" && tile.userData.biomeKey !== "TAVERN") {
          const { q: tq, r: tr } = tile.userData;
          if (churchPos.some(p => p[0] === tq && p[1] === tr)) continue;
          if (encPos.some(p => p[0] === tq && p[1] === tr)) continue;
          if (prisonPos.some(p => p[0] === tq && p[1] === tr)) continue;
          forestClumps.add(`${tq},${tr}`);
        }
      }
    }
  }

  // Post-prop placement after all biome adjustments are final
  const propMatrices = {
    unifiedBase: [],
    coneTree: [],
    boxHouse: [],
    coneRoof: [],
    towerBody: [],
    towerRoof: [],
    barnBody: [],
    barnRoof: [],
    barnDoorTrim: [],
    crop: [],
    tavernBody: [],
    tavernRoof: [],
    stableBody: [],
    stableRoof: []
  };

  for (const tile of tiles) {
    const { q, r, biomeKey } = tile.userData;
    const p = tile.position;
    const isSettlementPos = encPos.some(pos => pos[0] === q && pos[1] === r) ||
                            churchPos.some(pos => pos[0] === q && pos[1] === r);
    const isPrisonHex = prisonPos.some(pos => pos[0] === q && pos[1] === r);
    if (isPrisonHex) continue;

    if (biomeKey === "CRAG") {
      for (let i = 0; i < 3; i++) {
        const bAng = (i / 3) * Math.PI * 2 + 0.5; const bRad = 0.9;
        const gx = p.x + Math.cos(bAng) * bRad;
        const gy = tile.position.y;
        const gz = p.z + Math.sin(bAng) * bRad;

        const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
        propMatrices.unifiedBase.push(baseM);

        for (let j = 0; j < 3; j++) {
          const ang = (j / 3) * Math.PI * 2;
          const lx = Math.cos(ang) * 0.35;
          const ly = 0.15 + 0.55;
          const lz = Math.sin(ang) * 0.35;

          const treeM = new THREE.Matrix4().makeTranslation(gx + lx, gy + ly, gz + lz);
          propMatrices.coneTree.push(treeM);
        }
      }
    } else if (biomeKey === "HOUSE" && !isSettlementPos) {
      const numBases = Math.floor(seededRandom() * 3) + 1;
      for (let i = 0; i < numBases; i++) {
        const ang = (i / numBases) * Math.PI * 2 + 0.5; const rad = numBases > 1 ? 0.9 : 0;
        const gx = p.x + Math.cos(ang) * rad;
        const gy = tile.position.y;
        const gz = p.z + Math.sin(ang) * rad;

        const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
        propMatrices.unifiedBase.push(baseM);

        const isHouse = seededRandom() < 0.65;
        if (isHouse) {
          const bodyM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 0.325, gz);
          propMatrices.boxHouse.push(bodyM);

          const roofM = new THREE.Matrix4().compose(
            new THREE.Vector3(gx, gy + 0.15 + 0.65 + 0.25, gz),
            new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 4),
            new THREE.Vector3(1, 1, 1)
          );
          propMatrices.coneRoof.push(roofM);
        } else {
          const keepM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 0.55, gz);
          propMatrices.towerBody.push(keepM);

          const roofM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 1.1 + 0.25, gz);
          propMatrices.towerRoof.push(roofM);
        }
      }
    } else if (biomeKey === "FARM") {
      const gx = p.x;
      const gy = tile.position.y;
      const gz = p.z;

      const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
      propMatrices.unifiedBase.push(baseM);

      const barnM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 0.4, gz);
      propMatrices.barnBody.push(barnM);

      const roofM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 1.025, gz);
      propMatrices.barnRoof.push(roofM);

      const dtM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 0.375, gz + 0.6 + 0.015);
      propMatrices.barnDoorTrim.push(dtM);
    } else if (biomeKey === "FIELD") {
      const numBases = 3;
      for (let i = 0; i < numBases; i++) {
        const bAng = (i / numBases) * Math.PI * 2 + 0.5; const bRad = 0.9;
        const gx = p.x + Math.cos(bAng) * bRad;
        const gy = tile.position.y;
        const gz = p.z + Math.sin(bAng) * bRad;

        const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
        propMatrices.unifiedBase.push(baseM);

        for (let j = 0; j < 6; j++) {
          const ang = (j / 6) * Math.PI * 2;
          const rad = 0.45;
          const lx = Math.cos(ang) * rad;
          const ly = 0.15 + 0.3;
          const lz = Math.sin(ang) * rad;

          const rotZ = (seededRandom() - 0.5) * 0.4;
          const cropM = new THREE.Matrix4().compose(
            new THREE.Vector3(gx + lx, gy + ly, gz + lz),
            new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), rotZ),
            new THREE.Vector3(1, 1, 1)
          );
          propMatrices.crop.push(cropM);
        }
      }
    } else if (biomeKey === "TAVERN") {
      const gx = p.x;
      const gy = tile.position.y;
      const gz = p.z;

      const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
      propMatrices.unifiedBase.push(baseM);

      const bodyM = new THREE.Matrix4().makeTranslation(gx, gy + 0.15 + 0.35, gz);
      propMatrices.tavernBody.push(bodyM);

      const roofM = new THREE.Matrix4().compose(
        new THREE.Vector3(gx, gy + 0.15 + 0.7 + 0.3, gz),
        new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 4),
        new THREE.Vector3(1, 1, 1)
      );
      propMatrices.tavernRoof.push(roofM);

      const numStables = 1 + Math.floor(seededRandom() * 2);
      for (let i = 0; i < numStables; i++) {
        const sAng = (i / numStables) * Math.PI * 2 + 0.5;
        const sRad = 0.5;
        const sx = gx + Math.cos(sAng) * sRad;
        const sz = gz + Math.sin(sAng) * sRad;

        const sbM = new THREE.Matrix4().makeTranslation(sx, gy + 0.075, sz);
        propMatrices.unifiedBase.push(sbM);

        const stBodyM = new THREE.Matrix4().makeTranslation(sx, gy + 0.15 + 0.2, sz);
        propMatrices.stableBody.push(stBodyM);

        const stRoofM = new THREE.Matrix4().compose(
          new THREE.Vector3(sx, gy + 0.15 + 0.4 + 0.175, sz),
          new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 4),
          new THREE.Vector3(1, 1, 1)
        );
        propMatrices.stableRoof.push(stRoofM);
      }
    }
    if (forestClumps.has(`${q},${r}`)) {
      for (let i = 0; i < 3; i++) {
        const bAng = (i / 3) * Math.PI * 2 + 0.5; const bRad = 0.9;
        const gx = p.x + Math.cos(bAng) * bRad;
        const gy = tile.position.y;
        const gz = p.z + Math.sin(bAng) * bRad;
        const baseM = new THREE.Matrix4().makeTranslation(gx, gy + 0.075, gz);
        propMatrices.unifiedBase.push(baseM);
        for (let j = 0; j < 3; j++) {
          const ang = (j / 3) * Math.PI * 2;
          const lx = Math.cos(ang) * 0.35;
          const ly = 0.15 + 0.55;
          const lz = Math.sin(ang) * 0.35;
          const treeM = new THREE.Matrix4().makeTranslation(gx + lx, gy + ly, gz + lz);
          propMatrices.coneTree.push(treeM);
        }
      }
    }
  }

  const createInstancedProps = (geo, mat, matrices) => {
    if (matrices.length === 0) return;
    const instMesh = new THREE.InstancedMesh(geo, mat, matrices.length);
    instMesh.castShadow = true;
    instMesh.receiveShadow = true;
    for (let i = 0; i < matrices.length; i++) {
      instMesh.setMatrixAt(i, matrices[i]);
    }
    instMesh.instanceMatrix.needsUpdate = true;
    worldContainer.add(instMesh);
  };

  createInstancedProps(baseGeo, unifiedBaseMat, propMatrices.unifiedBase);
  createInstancedProps(Geoms.coneTree, foliageMat, propMatrices.coneTree);
  createInstancedProps(Geoms.boxHouse, woodMat, propMatrices.boxHouse);
  createInstancedProps(Geoms.coneRoof, royalCrimsonMat, propMatrices.coneRoof);
  createInstancedProps(Geoms.towerBody, keepStoneMat, propMatrices.towerBody);
  createInstancedProps(Geoms.towerRoof, royalCrimsonMat, propMatrices.towerRoof);
  createInstancedProps(Geoms.barnBody, barnBodyMat, propMatrices.barnBody);
  createInstancedProps(Geoms.barnRoof, barnRoofMat, propMatrices.barnRoof);
  createInstancedProps(Geoms.barnDoorTrim, barnDoorTrimMat, propMatrices.barnDoorTrim);
  createInstancedProps(Geoms.crop, cropMat, propMatrices.crop);
  createInstancedProps(Geoms.tavernBody, tavernWallMat, propMatrices.tavernBody);
  createInstancedProps(Geoms.tavernRoof, tavernRoofMat, propMatrices.tavernRoof);
  createInstancedProps(Geoms.stableBody, woodMat, propMatrices.stableBody);
  createInstancedProps(Geoms.stableRoof, tavernRoofMat, propMatrices.stableRoof);

  churchPos.forEach(pos => {
    const tile = tileLookup.get(`${pos[0]},${pos[1]}`);
    const b = tile ? tile.userData.biomeKey : "";
    if (tile && !isWaterBiome(b)) {
      const m = createChurch(); worldContainer.add(m); place(m, pos[0], pos[1]);
      churches.push({ q: pos[0], r: pos[1], mesh: m, hp: 45 });
    }
  });
  
  encPos.forEach(pos => { 
    const tile = tileLookup.get(`${pos[0]},${pos[1]}`);
    const b = tile ? tile.userData.biomeKey : "";
    if (tile && !isWaterBiome(b)) {
      const m = createRuinedEnclave(); worldContainer.add(m); place(m, pos[0], pos[1]); 
      enclaves.push({ q: pos[0], r: pos[1], mesh: m });
    }
  });

  prisonPos.forEach(pos => {
    const tile = tileLookup.get(`${pos[0]},${pos[1]}`);
    if (tile && !isWaterBiome(tile.userData.biomeKey)) {
      const m = createPrison(); worldContainer.add(m); place(m, pos[0], pos[1]);
      prisons.push({ q: pos[0], r: pos[1], mesh: m, hp: 50, ap: 0 });
    }
  });

  // Map starts empty of enemies; reinforcements arrive turn-by-turn.
  initialEnemyCount = 15; 


  if (hero) {
    hero.userData.isMoving = false;
    hero.userData.isSpawning = false;
    hero.userData.moveT = 0;
    worldContainer.add(hero);
    if (state.hasWeaponStrike) equipBlacksteelGreatsword();
    state.q = 0; state.r = 0;
    place(hero, 0, 0);
    hero.userData.targetY = hero.position.y;
    hero.position.y += 25;
    hero.userData.isSpawning = true;
  }
  if (ch > 1) {
    const pMesh = createPortal();
    worldContainer.add(pMesh);
    place(pMesh, 0, 0);
    portals.push({ q: 0, r: 0, mesh: pMesh, targetChapter: null });
  }
}

function sampleSpawn(type, q, r) {
  const mesh = createMonster(type);
  worldContainer.add(mesh);
  place(mesh, q, r);
  const stats = {
    "Wretch": { hp: 18, atk: 5, range: 1 },
    "Husk": { hp: 25, atk: 8, range: 1 },
    "Abomination": { hp: 45, atk: 12, range: 1 },
    "Knight": { hp: 35, atk: 10, range: 1 },
    "Priest": { hp: 30, atk: 0, range: 1 },
    "Guard": { hp: 40, atk: 12, range: 1 },
    "Ranger": { hp: 25, atk: 10, range: 3 },
    "TownFolk": { hp: 12, atk: 4, range: 1 },
    "Catapult": { hp: 80, atk: 20, range: 4 },
    "Freed Prisoner": { hp: 15, atk: 6, range: 1, faction: 'neutral' },
    "Zombie": { hp: 20, atk: 7, range: 1 },
    "Gelatinous Cube": { hp: 30, atk: 9, range: 1 }
  }[type] || { hp: 20, atk: 5 };

  const humanFactions = ["Knight", "Priest", "Guard", "Ranger", "TownFolk", "Catapult"];
  const supernaturalFactions = ["Wretch", "Husk", "Abomination", "Gelatinous Cube"];
  const undeadFactions = ["Zombie"];
  const faction = humanFactions.includes(type) ? 'human' : (supernaturalFactions.includes(type) ? 'supernatural' : (undeadFactions.includes(type) ? 'undead' : 'neutral'));

  enemies.push({ type, q, r, ...stats, maxHp: stats.hp, mesh, faction, maxAp: type === "Catapult" ? 1 : 2, aggroRange: type === "Catapult" ? 12 : 6 });
}

function spawnAlly(type, q, r, homeQ, homeR) {
  const mesh = createMonster(type);
  // Use a different base color for allies to distinguish them
  const friendlyBaseMat = new THREE.MeshStandardMaterial({color: 0x3b82f6, roughness: 0.5});
  mesh.traverse(child => {
    if (child.isMesh && child.material === unifiedBaseMat) {
      child.material = friendlyBaseMat;
    }
  });
  worldContainer.add(mesh);
  place(mesh, q, r);
  const stats = { "Freed Prisoner": { hp: 15, atk: 6, range: 1 } }[type] || { hp: 10, atk: 5 };
  allies.push({ type, q, r, ...stats, maxHp: stats.hp, mesh, maxAp: 2, homeQ, homeR, leashRange: 8 });
}
function checkBossSpawn() {
  if (!boss && enemies.filter(e => !e.isBoss && e.hp <= 0).length >= initialEnemyCount) spawnBoss();
}

function createBlackKnight() {
  const group = new THREE.Group();
  const base = new THREE.Mesh(baseGeo, unifiedBaseMat);
  base.position.y = 0.075; base.castShadow = true; group.add(base);
  
  const lLeg = new THREE.Mesh(Geoms.unitLeg, voidSteelMat);
  lLeg.position.set(-0.18, 0.25, 0); group.add(lLeg);
  const rLeg = new THREE.Mesh(Geoms.unitLeg, voidSteelMat);
  rLeg.position.set(0.18, 0.25, 0); group.add(rLeg);
  
  const torso = new THREE.Mesh(Geoms.unitTorso, voidSteelMat);
  torso.position.y = 0.72; torso.castShadow = true; group.add(torso);

const isPassableBiome = (biome) => !["DEEP_WATER", "LAKE", "FOREST_HAVEN"].includes(biome);

// --- MAP CONNECTIVITY VALIDATION & PATH CARVING (BFS) ---
function validateAndCarveConnectivity(encPos, churchPos, prisonPos) {
  const startKey = "0,0";
  const hexNeighbors = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
  
  const getNeighbors = (q, r) => {
    const results = [];
    for (const [dq, dr] of hexNeighbors) {
      const nq = q + dq, nr = r + dr;
      if (HexUtils.isValid(nq, nr)) {
        results.push({ q: nq, r: nr, key: `${nq},${nr}` });
      }
    }
    return results;
  };

  const reachable = new Set();
  const queue = [{ q: 0, r: 0 }];
  reachable.add(startKey);

  while (queue.length > 0) {
    const curr = queue.shift();
    for (const neighbor of getNeighbors(curr.q, curr.r)) {
      if (!reachable.has(neighbor.key)) {
        const tile = tileLookup.get(neighbor.key);
        if (tile && isPassableBiome(tile.userData.biomeKey)) {
          reachable.add(neighbor.key);
          queue.push(neighbor);
        }
      }
    }
  }

  const criticalPositions = [];
  churchPos.forEach(p => criticalPositions.push({ q: p[0], r: p[1], type: "Church" }));
  encPos.forEach(p => criticalPositions.push({ q: p[0], r: p[1], type: "Enclave" }));
  prisonPos.forEach(p => criticalPositions.push({ q: p[0], r: p[1], type: "Prison" }));

  for (const crit of criticalPositions) {
    const critKey = `${crit.q},${crit.r}`;
    if (!reachable.has(critKey)) {
      const path = findShortestPathToReachable(crit.q, crit.r, reachable);
      if (path) {
        for (const node of path) {
          const tile = tileLookup.get(`${node.q},${node.r}`);
          if (tile && !isPassableBiome(tile.userData.biomeKey)) {
            tile.userData.biomeKey = "SILT";
            tile.material = biomeMaterials.SILT;
            const targetY = 0.1;
            tile.position.y = targetY;
            tile.scale.y = (targetY + 5.0) / 1.12;
            tile.updateMatrix();
            tile.updateMatrixWorld();
            reachable.add(`${node.q},${node.r}`);
          }
        }
      }
    }
  }
  return reachable;
}

function findShortestPathToReachable(sq, sr, reachableSet) {
  const hexNeighbors = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
  const queue = [{ q: sq, r: sr, path: [] }];
  const visited = new Set();
  visited.add(`${sq},${sr}`);

  while (queue.length > 0) {
    const curr = queue.shift();
    const currKey = `${curr.q},${curr.r}`;

    if (reachableSet.has(currKey)) {
      return curr.path;
    }

    for (const [dq, dr] of hexNeighbors) {
      const nq = curr.q + dq, nr = curr.r + dr;
      const nkey = `${nq},${nr}`;
      if (HexUtils.isValid(nq, nr) && !visited.has(nkey)) {
        visited.add(nkey);
        const tile = tileLookup.get(nkey);
        if (tile) {
          queue.push({
            q: nq,
            r: nr,
            path: curr.path.concat([{ q: nq, r: nr }])
          });
        }
      }
    }
  }
  return null;
}

function disposeMesh(mesh) {
  mesh.traverse(node => {
    if (node.isMesh) {
      const isPooledGeo = Object.values(Geoms).includes(node.geometry) || node.geometry === geo || node.geometry === baseGeo;
      if (node.geometry && !isPooledGeo) node.geometry.dispose();

      const isPooledMat = Object.values(biomeMaterials).includes(node.material) || 
                          Object.values(activeColors).includes(node.material) ||
                          [unifiedBaseMat, foliageMat, woodMat, royalCrimsonMat, keepStoneMat, barnBodyMat, barnRoofMat, barnDoorTrimMat, cropMat].includes(node.material);
      if (node.material && !isPooledMat) {
        if (Array.isArray(node.material)) node.material.forEach(m => m.dispose());
        else node.material.dispose();
      }
    }
  });
}

  if (enemy.faction === 'human' || enemy.type === "Freed Prisoner") {

    place(grave, enemy.q, enemy.r);
    headstones.push({ q: enemy.q, r: enemy.r, mesh: grave, looted: false });
  } else {
    const corpse = createCorpse(); worldContainer.add(corpse);
    place(corpse, enemy.q, enemy.r);
    corpses.push({ q: enemy.q, r: enemy.r, mesh: corpse, looted: false });
  }
  const g = enemy.isBoss ? 120 : (isMelee ? 35 : 18);
  const a = enemy.isBoss ? 5 : (isMelee ? 1 : 0);
  const s = enemy.isBoss ? 100 : (isMelee ? 25 : 20);
  state.shillings += g;
  if (a) state.army += a;
  gainScars(s);
  if (!enemy.isBoss) {
    if (isMelee) {
      log(`${enemy.type} slain. Looted +${g} shillings, +${a} conscript, & +${s} scars.`);
    } else {
      log(`${enemy.type} vanquished. Claimed +${g} shillings & +${s} scars.`);
    }
    tryLoot(0.3);
  }
  if (enemy.isBoss) {
    state.shillings += 80;
    state.inventory.push("Tyrant's Void Relic");
    tryLoot(1.0);
    log(`<span style="color:#d946ef;">The Undying Tyrant has been slain! Victory is yours. +200 shillings & Tyrant's Void Relic acquired!</span>`);
    SoundSystem.playLevelUp();
    if (currentMapCoords.chapter < 6) {
      const nextChapter = currentMapCoords.chapter + 1;
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
      for (const [dq, dr] of dirs) {
        const pq = enemy.q + dq, pr = enemy.r + dr;
        const occ = enemies.some(e => e.hp > 0 && e.q === pq && e.r === pr) || (state.q === pq && state.r === pr);
        const tile = tileLookup.get(`${pq},${pr}`);
        if (tile && !isWaterBiome(tile.userData.biomeKey) && !occ && HexUtils.isValid(pq, pr)) {
          const pMesh = createPortal();
          worldContainer.add(pMesh);
          place(pMesh, pq, pr);
          portals.push({ q: pq, r: pr, mesh: pMesh, targetChapter: nextChapter });
          log(`<span style="color:#a855f7;">A shimmering portal tears open! Step through to ${CHAPTER_NAMES[nextChapter]}.</span>`);
          break;
        }
      }
    }
  }
  checkBossSpawn();
}

function spawnBoss() {
  let bq = 0, br = -6;
  
  // Verify boss doesn't spawn in water; find nearest valid land tile if necessary
  let targetTile = tileLookup.get(`${bq},${br}`);
  if (!targetTile || isWaterBiome(targetTile.userData.biomeKey)) {
    const safeTile = tiles.find(t => !isWaterBiome(t.userData.biomeKey) && HexUtils.dist(0, 0, t.userData.q, t.userData.r) > 5);
    if (safeTile) { bq = safeTile.userData.q; br = safeTile.userData.r; }
  }

  const b = {
    type: "The Undying Tyrant", q: bq, r: br,
    hp: 120, maxHp: 120, atk: 14, ap: 3, isBoss: true,
    mesh: createBoss(), maxAp: 3, aggroRange: 12
  };
  place(b.mesh, bq, br);
  enemies.push(b);
  boss = b;
  worldContainer.add(b.mesh);
  const bossLight = new THREE.PointLight(0xd946ef, 6, 18);
  const bossWorldPos = HexUtils.toWorld(bq, br);
  bossLight.position.set(bossWorldPos.x, 3, bossWorldPos.z);
  worldContainer.add(bossLight);
  b._light = bossLight;
  log(`<span style="color:#d946ef;">The Undying Tyrant tears through the veil! An ancient horror descends upon the battlefield!</span>`);
  SoundSystem.playLevelUp();
  triggerCameraShake(1.2);
}

function castFleshMend() {
  if (processingTurn) return;
  if (state.ap < 2) { log("Not enough AP! Flesh Mend requires <span class='highlight'>2 AP</span>."); SoundSystem.playBuzzer(); return; }
  const lvl = state.spells["Flesh Mend Scroll"] || 1;
  const heal = (8 + state.wis * 2) * lvl;

let pendingTravelDir = null;

function checkEdgeNeighbors() {
  availableTravelDirs = [];
  const dirs = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
  for (const [dq, dr] of dirs) {
    const nq = state.q + dq;
    const nr = state.r + dr;
    const tileData = tileLookup.get(`${nq},${nr}`);
    if (tileData) {
      const ndist = HexUtils.dist(0, 0, nq, nr);
      const isEdge = ndist > R * 0.4 || Math.abs(nq) >= R - 2 || Math.abs(nr) >= R - 2 || Math.abs(-nq-nr) >= R - 2;
      if (!isPassableBiome(tileData.userData.biomeKey) && isEdge) {
        availableTravelDirs.push({ dq, dr });
      }
    } else {
      // Neighbor doesn't exist — this direction leads off the map
      availableTravelDirs.push({ dq, dr });
    }
  }
}

function travelTo(targetKey, dq, dr) {
  if (processingTurn || state.hp <= 0) return;
  
  // Save current map state and connect to target
  saveCurrentMapToCache();
  const curSnap = mapCache.get(currentMapKey);
  if (curSnap) curSnap.connectTo(dq, dr, targetKey);
  
  // Parse target key
  const match = targetKey.match(/^ch(\d+)_\[(-?\d+),(-?\d+)\]$/);
  if (!match) { log("Travel error: invalid map key."); return; }
  const tChapter = parseInt(match[1]);
  const tX = parseInt(match[2]);
  const tY = parseInt(match[3]);
  
  const prevKey = currentMapKey;
  
  // Check cache first
  const cachedSnap = loadMapFromCache(targetKey);
  
  // Generate (or regenerate) the target map
  generateWorld(tChapter, tX, tY);
  
  // Place hero at entrance edge — walk inward from map boundary to find the first passable tile
  let foundPos = null;
  for (let step = 0; step < R - 1; step++) {
    const eq = -dq * (R - 2 - step);
    const er = -dr * (R - 2 - step);
    const tile = tileLookup.get(`${eq},${er}`);
    if (tile && isPassableBiome(tile.userData.biomeKey)) {
      foundPos = { q: eq, r: er, tile };
      break;
    }
  }
  if (foundPos) {
    state.q = foundPos.q;
    state.r = foundPos.r;
    hero.position.x = foundPos.tile.position.x;
    hero.position.z = foundPos.tile.position.z;
    hero.position.y = foundPos.tile.position.y + 25;
    hero.userData.targetY = foundPos.tile.position.y;
    hero.userData.isSpawning = true;
    state.ap = state.maxAp;
  } else {
    state.q = 0; state.r = 0;
    const centerTile = tileLookup.get("0,0");
    if (centerTile) {
      hero.position.x = centerTile.position.x;
      hero.position.z = centerTile.position.z;
      hero.position.y = centerTile.position.y + 25;
      hero.userData.targetY = centerTile.position.y;
      hero.userData.isSpawning = true;
    }
  }
  
  // Create/update the target map snapshot with bidirectional connection
  saveCurrentMapToCache();
  const newSnap = mapCache.get(currentMapKey);
  if (newSnap) newSnap.connectTo(-dq, -dr, prevKey);
  
  // Restore cached state if this is a revisit
  if (cachedSnap) {
    state.turn = cachedSnap.turn;
    
    cachedSnap.enemies.forEach(ed => {
      const existing = enemies.find(e => e.type === ed.type && e.q === ed.q && e.r === ed.r);
      if (existing) {
        existing.hp = ed.hp;
        if (ed.hp <= 0) {
          existing.mesh.visible = false;
          worldContainer.remove(existing.mesh);
        }
      }
    });
    cachedSnap.allies.forEach(ad => {
      const existing = allies.find(a => a.type === ad.type && a.q === ad.q && a.r === ad.r);
      if (existing) {
        existing.hp = ad.hp;
        if (ad.hp <= 0) {
          existing.mesh.visible = false;
          worldContainer.remove(existing.mesh);
        }
      }
    });
    headstones.forEach(h => {
      if (!cachedSnap.headstones.some(hs => hs.q === h.q && hs.r === h.r)) {
        h.looted = true;
        h.mesh.visible = false;
      }
    });
    corpses.forEach(c => {
      if (!cachedSnap.corpses.some(cs => cs.q === c.q && cs.r === c.r)) {
        c.looted = true;
        c.mesh.visible = false;
      }
    });
    cachedSnap.portals.forEach(pd => {
      if (!portals.some(p => p.q === pd.q && p.r === pd.r)) {
        const pMesh = createPortal();
        worldContainer.add(pMesh);
        place(pMesh, pd.q, pd.r);
        portals.push({ q: pd.q, r: pd.r, mesh: pMesh, targetChapter: pd.targetChapter });
      }
    });
    cachedSnap.churches.forEach(cs => {
      const existing = churches.find(c => c.q === cs.q && c.r === cs.r);
      if (existing) existing.hp = cs.hp;
    });
    cachedSnap.prisons.forEach(ps => {
      const existing = prisons.find(p => p.q === ps.q && p.r === ps.r);
      if (existing) existing.hp = ps.hp;
    });
  }
  
  log(`<span style="color:#fbbf24;">You travel to ${CHAPTER_NAMES[tChapter]} [${tX},${tY}].</span>`);
  updateUI();
}
