async function processTurnAdvance() {
  if (state.hp <= 0 || processingTurn) return;
  processingTurn = true;

  const prevDay = Math.floor((state.turn - 1) / 2) + 1;
  state.turn++;
  state.ap = state.maxAp;
  const newDay = Math.floor((state.turn - 1) / 2) + 1;
  if (newDay !== prevDay) {
    log(`<div style='color:var(--color-gold); font-size:11px; margin-top:8px; font-family:var(--font-serif); letter-spacing:1px;'><b>Day ${newDay}</b></div>`);
  }
  log(`<b style="color:#fff; font-size:11px; margin-top:8px; display:block;">Turn ${state.turn}</b>`);
  log("<div style='color:#fb923c; margin-top:6px;'>[ Horrors re-orient themselves ]</div>");

  state.satiation--;
  if (state.rations > 0 && state.satiation < state.maxSatiation) {
    state.rations--;
    state.satiation++;
    log("<span style='color:#34d399;'>A ration was consumed. Satiation maintained.</span>");
  }

  if (state.satiation <= 0) {
    state.satiation = 0;
    state.hp -= 2;
    log("<span style='color:#ef4444;'>Satiation depleted! You lose 2 Health.</span>");
  } else if (state.rations <= 0) {
    log("<span style='color:#f87171;'>No rations! Satiation is dropping... (Counter: " + state.satiation + ")</span>");
  }
  
  // --- TURN-BASED SPAWNING (Source-based) ---

  // 1. Knights from Churches (30% chance per church)
  for (const church of churches) {
    if (church.hp <= 0) continue;
    if (getEnemyCount('common') < SPAWN_LIMITS.common && Math.random() < 0.3) {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].sort(() => Math.random() - 0.5);
      for (const d of dirs) {
        const nq = church.q + d[0], nr = church.r + d[1];
        const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr) || (state.q === nq && state.r === nr);
        const buildingOccupied = churches.some(c => c.q === nq && c.r === nr) || enclaves.some(e => e.q === nq && e.r === nr) || prisons.some(p => p.q === nq && p.r === nr);
        const tile = tileLookup.get(`${nq},${nr}`);
        if (!occupied && !buildingOccupied && tile && !isWaterBiome(tile.userData.biomeKey) && HexUtils.isValid(nq, nr)) {
          sampleSpawn("Knight", nq, nr);
          log("<span style='color:#fca5a5;'>A zealous Knight emerges from the Church!</span>");
          break;
        }
      }
    }
  }

  // 2. Guards from Prisons (30% chance per prison)
  for (const prison of prisons) {
    if (prison.hp <= 0) continue;
    if (getEnemyCount('common') < SPAWN_LIMITS.common && Math.random() < 0.3) {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].sort(() => Math.random() - 0.5);
      for (const d of dirs) {
        const nq = prison.q + d[0], nr = prison.r + d[1];
        const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr) || (state.q === nq && state.r === nr);
        const buildingOccupied = churches.some(c => c.q === nq && c.r === nr) || enclaves.some(e => e.q === nq && e.r === nr) || prisons.some(p => p.q === nq && p.r === nr);
        const tile = tileLookup.get(`${nq},${nr}`);
        if (!occupied && !buildingOccupied && tile && !isWaterBiome(tile.userData.biomeKey) && HexUtils.isValid(nq, nr)) {
          sampleSpawn("Guard", nq, nr);
          log("<span style='color:#cbd5e1;'>A Guard is dispatched from the prison cart!</span>");
          break;
        }
      }
    }
  }

  // 2. Monsters from Forests (40% chance for a monster to crawl out)
  // Renumbered to 3.
  // Renumbered to 3.
  if (getEnemyCount('common') + getEnemyCount('elite') < SPAWN_LIMITS.common + SPAWN_LIMITS.elite) {
    if (Math.random() < 0.4) {
      const crags = tiles.filter(t => t.userData.biomeKey === "CRAG").sort(() => Math.random() - 0.5);
      for (const forest of crags) {
        const fq = forest.userData.q, fr = forest.userData.r;
        const occupied = enemies.some(e => e.hp > 0 && e.q === fq && e.r === fr) || (state.q === fq && state.r === fr);
        if (!occupied) {
          let type = "Wretch";
          const roll = Math.random();
          if (roll > 0.9) type = "Catapult";
          else if (roll > 0.75) type = "Abomination";
          else if (roll > 0.6) type = "Gelatinous Cube";
          else if (roll > 0.55) type = "Ranger";
          else if (roll > 0.3) type = "Husk";

          sampleSpawn(type, fq, fr);
          log(`<span style='color:#10b981;'>A ${type} crawls out from the dark forest...</span>`);
          break;
        }
      }
    }
  }

  // 5. Zombies rising from corpses (5% chance per turn per corpse)
  for (let i = corpses.length - 1; i >= 0; i--) {
    const corpse = corpses[i];
    if (corpse.looted) continue;
    if (Math.random() < 0.05 && getEnemyCount('common') < SPAWN_LIMITS.common) {
      const nq = corpse.q, nr = corpse.r;
      const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr) || (state.q === nq && state.r === nr);
      if (!occupied && HexUtils.isValid(nq, nr)) {
        worldContainer.remove(corpse.mesh);
        disposeMesh(corpse.mesh);
        corpses.splice(i, 1);
        const zMesh = createZombie();
        worldContainer.add(zMesh);
        place(zMesh, nq, nr);
        enemies.push({
          type: "Zombie", q: nq, r: nr,
          hp: 20, maxHp: 20, atk: 7, range: 1,
          mesh: zMesh, faction: 'undead', maxAp: 2, aggroRange: 6
        });
        log(`<span style='color:#6b7280;'>A Zombie claws its way from a corpse!</span>`);
        break;
      }
    }
  }

  // Initialize Enemy AP for the new phase
  enemies.forEach(e => { if (e.hp > 0) e.ap = e.maxAp || 2; });
  prisons.forEach(p => { p.ap = 1; });
  allies.forEach(a => { if (a.hp > 0) a.ap = a.maxAp || 2; });

  // --- ALLY AI PHASE ---
  for (const ally of allies) {
    if (ally.hp <= 0 || ally.ap <= 0) continue;

    const potentialTargets = enemies.filter(e => e.hp > 0 && HexUtils.dist(ally.q, ally.r, e.q, e.r) <= ally.leashRange);
    if (potentialTargets.length === 0) {
      ally.ap = 0; // No targets in range, do nothing.
      continue;
    }

    potentialTargets.sort((a, b) => HexUtils.dist(ally.q, ally.r, a.q, a.r) - HexUtils.dist(ally.q, ally.r, b.q, b.r));
    const target = potentialTargets[0];
    const distToTarget = HexUtils.dist(ally.q, ally.r, target.q, target.r);

    if (distToTarget <= ally.range) { // Attack
      target.hp -= ally.atk;
      log(`An ally ${ally.type} attacks ${target.type} for <span style="color:#60a5fa;">${ally.atk} damage</span>.`);
      createDamagePopup(`-${ally.atk}`, target.mesh.position, "#60a5fa");
      SoundSystem.playSlash();
      ally.ap--;
      if (target.hp <= 0) {
        target.mesh.visible = false;
        worldContainer.remove(target.mesh);
        disposeMesh(target.mesh);
        if (target.faction === 'human' || target.type === "Freed Prisoner") {
          const grave = createHeadstone(); worldContainer.add(grave);
          place(grave, target.q, target.r);
          headstones.push({ q: target.q, r: target.r, mesh: grave, looted: false });
        } else {
          const corpse = createCorpse(); worldContainer.add(corpse);
          place(corpse, target.q, target.r);
          corpses.push({ q: target.q, r: target.r, mesh: corpse, looted: false });
        }
        log(`${target.type} was vanquished by an ally!`);
      }
    } else { // Move towards target
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
      dirs.sort((a,b) => HexUtils.dist(ally.q+a[0], ally.r+a[1], target.q, target.r) - HexUtils.dist(ally.q+b[0], ally.r+b[1], target.q, target.r));
      
      for (const d of dirs) {
        const nq = ally.q + d[0], nr = ally.r + d[1];
        const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr) ||
                         allies.some(a => a.hp > 0 && a.q === nq && a.r === nr) ||
                         (state.q === nq && state.r === nr);
        const tile = tileLookup.get(`${nq},${nr}`);
        if (!occupied && tile && isPassableBiome(tile.userData.biomeKey) && HexUtils.isValid(nq, nr)) {
          const m = ally.mesh; m.userData.startPos = m.position.clone();
          const pT = HexUtils.toWorld(nq, nr); m.userData.targetPos = new THREE.Vector3(pT.x, tile.position.y, pT.z);
          m.userData.moveT = 0; m.userData.isMoving = true;
          ally.q = nq; ally.r = nr; ally.ap--;
          break;
        }
      }
    }
  }

  // Wait for ally movement animations to finish before enemies act
  while (allies.some(a => a.hp > 0 && a.mesh && a.mesh.userData.isMoving)) await new Promise(res => requestAnimationFrame(res));

  let acting = true;
  while (acting && state.hp > 0) {
    acting = false;
    let movedAny = false;

    for (const enemy of enemies) {
      if (enemy.hp <= 0 || enemy.ap <= 0 || state.hp <= 0) continue;

      // Priest Special AI: Heal wounded allies
      if (enemy.type === "Priest" && enemy.ap > 0) {
        const woundedAlly = enemies.find(e => e.hp > 0 && e.hp < e.maxHp && HexUtils.dist(enemy.q, enemy.r, e.q, e.r) <= 1);
        if (woundedAlly) {
          woundedAlly.hp = Math.min(woundedAlly.maxHp, woundedAlly.hp + 10);
          spawnFleshMendFx(woundedAlly.mesh.position);
          createDamagePopup("+10", woundedAlly.mesh.position, "#34d399");
          log(`The Priest mends the wounds of ${woundedAlly.type}.`);
          enemy.ap--; acting = true;
          continue;
        }
      }

      // --- DYNAMIC FACTION TARGETING ---
      const potentialTargets = [
        {...state, type: "Player", mesh: hero, isPlayer: true}, // Always target player
        ...allies.filter(a => a.hp > 0), // Target active allies
        ...enemies.filter(e => e.hp > 0 && e.faction !== enemy.faction && e.faction !== 'neutral' && !(enemy.faction === 'undead' && e.faction === 'supernatural') && !(enemy.faction === 'supernatural' && e.faction === 'undead')) // Target opposing faction enemies (undead & supernatural are not hostile)
      ];

      let target = null;
      let closestDist = Infinity;

      for (const p of potentialTargets) {
        const d = HexUtils.dist(enemy.q, enemy.r, p.q, p.r);
        if (d < closestDist) {
          closestDist = d;
          target = p;
        }
      }
      if (!target) { enemy.ap = 0; continue; } // No valid targets found
      const distToTarget = HexUtils.dist(enemy.q, enemy.r, target.q, target.r);

      const isAggro = distToTarget <= (enemy.aggroRange || 6);
      const attackRange = enemy.range || 1;

      if (distToTarget <= attackRange && isAggro && enemy.atk > 0) {
        const armor = target.isPlayer ? state.armor : 0;
        const dmg = Math.max(1, enemy.atk - armor);
        if (target.isPlayer) {
          state.hp -= dmg; // Directly modify the global player state
        } else {
          target.hp -= dmg; // Modify the HP of the targeted NPC (ally or other enemy)
        }

        const targetName = target.isPlayer ? 'Player' : target.type;
        log(`The ${enemy.type} attacks ${targetName} for <span style="color:#f87171;">${dmg} damage</span>.`);
        if (enemy.type === "Ranger") spawnSoulDrainFx(enemy.mesh.position, target.mesh.position);
        
        triggerCameraShake(0.5); createDamagePopup(`-${dmg}`, target.mesh.position, "#f87171");
        SoundSystem.playDamage(); enemy.ap -= 1; acting = true;
        updateUI();
        await new Promise(r => setTimeout(r, 200)); // Brief pause between individual attacks

        if (target.isPlayer && checkDeath()) break;
        if (!target.isPlayer && target.hp <= 0) { 
          target.mesh.visible = false; 
          worldContainer.remove(target.mesh);
          disposeMesh(target.mesh);
          if (enemy.type === "Zombie" && (target.faction === 'human' || target.type === "Freed Prisoner")) {
            const zMesh = createZombie();
            worldContainer.add(zMesh);
            place(zMesh, target.q, target.r);
            enemies.push({
              type: "Zombie", q: target.q, r: target.r,
              hp: 20, maxHp: 20, atk: 7, range: 1,
              mesh: zMesh, faction: 'undead', maxAp: 2, aggroRange: 6
            });
            const msg = allies.includes(target) ? `An ally ${target.type} has fallen and risen as a Zombie!` : `${target.type} was slain and rises as a Zombie!`;
            log(msg);
          } else if (target.faction === 'human' || target.type === "Freed Prisoner") {
            const grave = createHeadstone(); worldContainer.add(grave);
            place(grave, target.q, target.r);
            headstones.push({ q: target.q, r: target.r, mesh: grave, looted: false });
            const message = allies.includes(target) ? `An ally ${target.type} has fallen!` : `${target.type} was slain by ${enemy.type}!`;
            log(message);
          } else {
            const corpse = createCorpse(); worldContainer.add(corpse);
            place(corpse, target.q, target.r);
            corpses.push({ q: target.q, r: target.r, mesh: corpse, looted: false });
            const message = allies.includes(target) ? `An ally ${target.type} has fallen!` : `${target.type} was slain by ${enemy.type}!`;
            log(message);
          }
        }
      } else {
        const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
        if (isAggro) dirs.sort((a,b) => HexUtils.dist(enemy.q+a[0], enemy.r+a[1], target.q, target.r) - HexUtils.dist(enemy.q+b[0], enemy.r+b[1], target.q, target.r));
        else { for (let i = dirs.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [dirs[i], dirs[j]] = [dirs[j], dirs[i]]; } }

        let pathFound = false;
        for (let i = 0; i < dirs.length; i++) {
          const nq = enemy.q + dirs[i][0], nr = enemy.r + dirs[i][1];
          const spotOccupied = enemies.some(other => other.hp > 0 && other.q === nq && other.r === nr) ||
                               allies.some(a => a.hp > 0 && a.q === nq && a.r === nr) ||
                               (state.q === nq && state.r === nr) ||
                               churches.some(c => c.hp > 0 && c.q === nq && c.r === nr);
          if (!HexUtils.isValid(nq, nr) || spotOccupied) continue;
          const targetTile = tileLookup.get(`${nq},${nr}`);
          if (targetTile && !isWaterBiome(targetTile.userData.biomeKey)) {
            const m = enemy.mesh; m.userData.startPos = m.position.clone();
            const pT = HexUtils.toWorld(nq, nr); m.userData.targetPos = new THREE.Vector3(pT.x, targetTile.position.y, pT.z);
            m.userData.moveT = 0; m.userData.isMoving = true;
            enemy.q = nq; enemy.r = nr; enemy.ap -= 1; pathFound = true; movedAny = true; acting = true; break;
          }
        }
        if (!pathFound) enemy.ap = 0;
      }
    }

    // Prison Cart Movement
    for (const cart of prisons.filter(p => p.hp > 0)) {
      if (cart.ap <= 0) continue;
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].sort(() => Math.random() - 0.5);
      for (const d of dirs) {
        const nq = cart.q + d[0], nr = cart.r + d[1];
        const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr) || (state.q === nq && state.r === nr) || 
                         prisons.some(p => p !== cart && p.q === nq && p.r === nr) ||
                         churches.some(c => c.q === nq && c.r === nr) || enclaves.some(e => e.q === nq && e.r === nr);
        const tile = tileLookup.get(`${nq},${nr}`);
        if (!occupied && tile && isPassableBiome(tile.userData.biomeKey) && !isWaterBiome(tile.userData.biomeKey) && HexUtils.isValid(nq, nr)) {
          const m = cart.mesh; m.userData.startPos = m.position.clone();
          const pT = HexUtils.toWorld(nq, nr); m.userData.targetPos = new THREE.Vector3(pT.x, tile.position.y, pT.z);
          m.userData.moveT = 0; m.userData.isMoving = true;
          cart.q = nq; cart.r = nr; cart.ap = 0; movedAny = true; acting = true;
          break;
        }
      }
    }

    if (movedAny) {
      // Wait for all units to finish their parallel movement animations
      while (enemies.some(e => e.hp > 0 && e.mesh && e.mesh.userData.isMoving) || prisons.some(p => p.hp > 0 && p.mesh && p.mesh.userData.isMoving) || allies.some(a => a.hp > 0 && a.mesh && a.mesh.userData.isMoving)) await new Promise(res => requestAnimationFrame(res));
      await new Promise(r => setTimeout(r, 100));
    }
  }
  checkDeath();
  updateUI();
  processingTurn = false;
}
function selectSpell(spellName) {
  if (processingTurn || state.hp <= 0) return;

  const spellMap = { "fireball": "Fireball Scroll", "flesh mend": "Flesh Mend Scroll", "soul drain": "Soul Drain Scroll", "lightning bolt": "Lightning Bolt Scroll", "teleport": "Teleport Scroll" };
  
  if (spellName === "weapon strike" && !state.hasWeaponStrike) return;
  if (spellName !== "weapon strike" && spellName !== "melee swing" && state.spells[spellMap[spellName]] <= 0) {
    return;
  }

  if(spellName === "flesh mend") {
    castFleshMend();
  }
  else {
    let cost = 1;
    if (spellName === "soul drain" || spellName === "lightning bolt" || spellName === "teleport") cost = 2;

    if (state.ap < cost) { log(`Not enough AP! ${spellName} requires <span class="highlight">${cost} AP</span>.`); SoundSystem.playBuzzer(); return; }
    spell = spellName; SoundSystem.playSpellCast(); updateUI();
  }
}

const codexPreview = document.getElementById("codex-preview");
const codexSelect = document.getElementById("codex-select");
const codexInfo = document.getElementById("codex-info");
let codexScene, codexCam, codexRenderer, codexModelGroup;
let codexAnimId = null;

function initCodexPreview() {
  if (codexRenderer) return;
  codexScene = new THREE.Scene();
  codexScene.background = new THREE.Color(0xffffff);
  codexCam = new THREE.PerspectiveCamera(35, codexPreview.clientWidth / codexPreview.clientHeight, 0.1, 100);
  codexCam.position.set(2.7, 2.27, 3.78);
  codexCam.lookAt(0, 0, 0);
  codexRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  codexRenderer.setSize(codexPreview.clientWidth, codexPreview.clientHeight);
  codexRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  codexPreview.appendChild(codexRenderer.domElement);

  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  codexScene.add(amb);
  const dir = new THREE.DirectionalLight(0xfffbeb, 1.8);
  dir.position.set(3, 6, 4);
  codexScene.add(dir);
}

function showCodexEnemy(type) {
  if (codexModelGroup) { codexScene.remove(codexModelGroup); codexModelGroup = null; }
  if (!type) { codexInfo.textContent = ""; if (codexRenderer) codexRenderer.clear(); return; }

  initCodexPreview();
  codexZoom = 1;
  codexBobPhase = 0;

  if (type === "The Black Knight") {
    codexModelGroup = createBlackKnight();
    if (state.hasWeaponStrike) {
      const sword = new THREE.Group();
      sword.name = "BlacksteelGreatsword";
      const blade = new THREE.Mesh(Geoms.swordBlade, deepKnightSteel);
      blade.position.y = 0.75; sword.add(blade);
      const guard = new THREE.Mesh(Geoms.swordGuard, voidSteelMat);
      guard.position.y = 0.02; sword.add(guard);
      const hilt = new THREE.Mesh(Geoms.swordHilt, royalCrimsonMat);
      hilt.position.y = -0.15; sword.add(hilt);
      sword.position.set(0.52, 0.8, 0.35); sword.rotation.set(-0.7, 0.1, -0.3);
      codexModelGroup.add(sword);
    }
  } else if (type === "Church") {
    codexModelGroup = createChurch();
  } else if (type === "Prison Cart") {
    codexModelGroup = createPrison();
  } else if (type === "Ruined Enclave") {
    const group = new THREE.Group();
    const base = new THREE.Mesh(baseGeo, unifiedBaseMat);
    base.position.y = 0.075; group.add(base);
    const towerBody = new THREE.Mesh(Geoms.towerBody, keepStoneMat);
    towerBody.position.y = 0.7; group.add(towerBody);
    const towerRoof = new THREE.Mesh(Geoms.towerRoof, royalCrimsonMat);
    towerRoof.position.y = 1.35; group.add(towerRoof);
    codexModelGroup = group;
  } else if (type === "Tree") {
    const group = new THREE.Group();
    const base = new THREE.Mesh(baseGeo, unifiedBaseMat);
    base.position.y = 0.075; group.add(base);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.4, 6), new THREE.MeshStandardMaterial({color: 0x78350f, roughness: 0.9}));
    trunk.position.y = 0.28; group.add(trunk);
    const foliage = new THREE.Mesh(Geoms.coneTree, foliageMat);
    foliage.position.y = 0.9; group.add(foliage);
    codexModelGroup = group;
  } else if (type === "Crop") {
    const group = new THREE.Group();
    for (let i = 0; i < 7; i++) {
      const stalk = new THREE.Mesh(Geoms.crop, cropMat);
      stalk.position.set((Math.random() - 0.5) * 0.5, 0.35, (Math.random() - 0.5) * 0.5);
      stalk.rotation.set(0, Math.random() * Math.PI * 2, 0);
      group.add(stalk);
    }
    codexModelGroup = group;
  } else if (type === "House") {
    const group = new THREE.Group();
    const base = new THREE.Mesh(baseGeo, unifiedBaseMat);
    base.position.y = 0.075; group.add(base);
    const walls = new THREE.Mesh(Geoms.boxHouse, woodMat);
    walls.position.y = 0.4; group.add(walls);
    const roof = new THREE.Mesh(Geoms.coneRoof, royalCrimsonMat);
    roof.position.y = 0.85; roof.rotation.y = Math.PI / 4; group.add(roof);
    codexModelGroup = group;
  } else if (type === "Barn") {
    const group = new THREE.Group();
    const base = new THREE.Mesh(baseGeo, unifiedBaseMat);
    base.position.y = 0.075; group.add(base);
    const body = new THREE.Mesh(Geoms.barnBody, barnBodyMat);
    body.position.y = 0.45; group.add(body);
    const roof = new THREE.Mesh(Geoms.barnRoof, barnRoofMat);
    roof.position.y = 0.9; roof.rotation.y = Math.PI / 2; group.add(roof);
    codexModelGroup = group;
  } else if (type === "Lightning Bolt") {
    codexModelGroup = createMonster(type);
  } else if (type === "The Undying Tyrant") {
    codexModelGroup = createBoss();
  } else {
    codexModelGroup = createMonster(type);
  }

  // Uniform scale so all models appear the same size
  const box = new THREE.Box3().setFromObject(codexModelGroup);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const targetSize = 1.6;
  const scale = targetSize / Math.max(maxDim, 0.01);
  codexModelGroup.scale.set(scale, scale, scale);
  codexModelGroup.position.sub(center);
  codexModelGroup.position.y += size.y * 0.15 * scale;
  codexBaseY = codexModelGroup.position.y;

  codexScene.add(codexModelGroup);

  const s = codexEnemyStats[type];
  if (s) codexInfo.innerHTML = `${type}<br><span style="font-size:11px; color:#64748b;">${s.faction} | HP: ${s.hp} | ATK: ${s.atk} | Range: ${s.range}</span>`;
  else codexInfo.textContent = type;

  if (codexAnimId) cancelAnimationFrame(codexAnimId);
  animateCodex();
}

let codexZoom = 1, codexBobPhase = 0, codexBaseY = 0;
let codexDragging = false, codexPrevX = 0, codexPrevY = 0, codexDragRotX = 0, codexDragRotY = 0;

function animateCodex() {
  if (codexModelGroup) {
    codexBobPhase += 0.025;
    codexModelGroup.position.y = codexBaseY + Math.sin(codexBobPhase) * 0.06;
  }
  if (codexRenderer && codexPreview.offsetParent !== null) {
    codexRenderer.render(codexScene, codexCam);
    codexAnimId = requestAnimationFrame(animateCodex);
  } else {
    codexAnimId = null;
  }
}

const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2();

window.addEventListener("pointerdown", e => {
  if (document.getElementById("travel-popup").style.display === "flex") return;
  if (e.target.closest('#ui-stack')) return;
  
  if (e.button === 1 || e.button === 2) {
    isRotating = true;
    prevMouseX = e.clientX;
    prevMouseY = e.clientY;
    return;
  }

  if(!gameStarted || processingTurn || state.hp <= 0 || hero.userData.isMoving || hero.userData.isSpawning) return;
  if (e.button !== 0) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1; mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);
  const hit = ray.intersectObjects(tiles)[0];
  if(!hit) return;
  const q = hit.object.userData.q; const r = hit.object.userData.r;
  const dist = HexUtils.dist(state.q, state.r, q, r);
  if(spell){
    if (spell === "teleport") {
      const lvl = state.spells["Teleport Scroll"] || 1;
      const tpRange = lvl * 2;
      if (dist > tpRange) { log(`Teleport range is ${tpRange} hexes at your level.`); spell = null; updateUI(); return; }
      if (state.ap < 2) { log("Not enough AP! Teleport requires 2 AP."); SoundSystem.playBuzzer(); spell = null; updateUI(); return; }
      const tile = tileLookup.get(`${q},${r}`);
      if (!tile || isWaterBiome(tile.userData.biomeKey)) { log("Cannot teleport onto water."); spell = null; updateUI(); return; }
      const occupied = enemies.some(e => e.hp > 0 && e.q === q && e.r === r) || (state.q === q && state.r === r) ||
        prisons.some(p => p.q === q && p.r === r) || churches.some(c => c.q === q && c.r === r) || enclaves.some(e => e.q === q && e.r === r);
      if (occupied) { log("Target hex is occupied."); spell = null; updateUI(); return; }
      state.ap -= 2;
      spawnTeleportFx(hero.position.clone());
      place(hero, q, r);
      state.q = q; state.r = r;
      spawnTeleportFx(hero.position.clone());
      triggerCameraShake(0.2);
      log(`<span style='color:#818cf8;'>Teleported to [${q}, ${r}].</span>`);
      spell = null; updateUI(); return;
    }

    let cost = 1;
    if (spell === "soul drain" || spell === "lightning bolt") cost = 2;

    if (dist > SPELL_RANGE[spell]) { log(`Target out of reach for ${spell}.`); spell = null; updateUI(); return; }
    if (state.ap < cost) { log("Magic disrupted! Action Points depleted."); SoundSystem.playBuzzer(); spell = null; updateUI(); return; }

    state.ap -= cost; triggerCameraShake(0.35);
    if(spell === "fireball") spawnFireballFx(hit.point);
    if(spell === "soul drain") spawnSoulDrainFx(hero.position, hit.point);
    if(spell === "lightning bolt") spawnLightningBoltFx(hero.position, hit.point);
    if(spell === "weapon strike" || spell === "melee swing") SoundSystem.playSlash();

    enemies.forEach(enemy => {
      if(enemy.hp > 0 && HexUtils.dist(q, r, enemy.q, enemy.r) <= (spell === "fireball" ? 1 : 0)){
        const spellMap = { "fireball": "Fireball Scroll", "soul drain": "Soul Drain Scroll", "lightning bolt": "Lightning Bolt Scroll" };
        const lvl = state.spells[spellMap[spell]] || 1;
        let baseDmg;
        if (spell === "fireball") baseDmg = 12 + state.wis * 2;
        else if (spell === "soul drain") baseDmg = 20 + state.wis * 2;
        else if (spell === "lightning bolt") baseDmg = 16 + state.wis * 2;
        else if (spell === "melee swing") baseDmg = state.str * 2 + Math.floor(state.army / 4);
        else baseDmg = state.str + Math.floor(state.army / 4);
        
        let dmg = (spell === "weapon strike" || spell === "melee swing") ? baseDmg : baseDmg * lvl;

        enemy.hp -= dmg;
        log(`${spell} (Lvl ${lvl}) impacts ${enemy.type} for ${dmg} damage.`);
        const popColor = spell === "fireball" ? "#f97316" : (spell === "lightning bolt" ? "#fbbf24" : (spell === "weapon strike" ? "#fb923c" : (spell === "melee swing" ? "#f97316" : "#c084fc")));
        createDamagePopup(`-${dmg}`, enemy.mesh.position, popColor);
        SoundSystem.playDamage();
        if(enemy.hp <= 0) onEnemySlain(enemy, spell === "weapon strike" || spell === "melee swing");
      }
    });

    if (spell === "fireball") {
      const lvl = state.spells["Fireball Scroll"] || 1;
      const dmg = (12 + state.wis * 2) * lvl;
      prisons.forEach(prison => {
        if (prison.hp > 0 && HexUtils.dist(q, r, prison.q, prison.r) <= 1) {
          prison.hp -= dmg;
          log(`fireball (Lvl ${lvl}) impacts the prison cart for ${dmg} damage.`);
          createDamagePopup(`-${dmg}`, prison.mesh.position, "#f97316");
          SoundSystem.playDamage();
          if (prison.hp <= 0) {
            prison.mesh.visible = false;
            const rubble = createRubble(); worldContainer.add(rubble);
            place(rubble, prison.q, prison.r);
            rubbles.push(rubble);
            log("<span style='color:#fbbf24;'>The prison cart has been smashed open!</span>");
            if (Math.random() < 0.4) {
              const spawnCount = Math.random() < 0.5 ? 1 : 2;
              log(`<span style='color:#fca5a5;'>${spawnCount} desperate prisoner(s) emerge from the wreckage!</span>`);
              for (let i = 0; i < spawnCount; i++) {
                const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].sort(() => Math.random() - 0.5);
                for (const d of dirs) {
                  const nq = prison.q + d[0], nr = prison.r + d[1];
                  const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr);
                  if (!occupied) { spawnAlly("Freed Prisoner", nq, nr, prison.q, prison.r); break; }
                }
              }
            }
          }
        }
      });
    }

    spell = null; updateUI(); return;
  }
  let enemyOnHex = enemies.find(e => e.hp > 0 && e.q === q && e.r === r);
  if(enemyOnHex) {
    if(dist > 1) { log("Target anomaly is out of blade reach."); return; }
    if(state.ap < 1) { log("Not enough AP!"); SoundSystem.playBuzzer(); return; }
    state.ap -= 1; const damage = state.str + Math.floor(state.army/4); enemyOnHex.hp -= damage;
    log(`Greatsword slashes ${enemyOnHex.type} for <span style="color:#fb923c;">${damage} damage</span>!`);
    triggerCameraShake(0.25); createDamagePopup(`-${damage}`, enemyOnHex.mesh.position, "#fb923c");
    SoundSystem.playSlash();
    if(enemyOnHex.hp <= 0) onEnemySlain(enemyOnHex, true);
    checkDeath();
    updateUI(); return;
  }
  
  let churchOnHex = churches.find(c => c.hp > 0 && c.q === q && c.r === r);
  if(churchOnHex) {
    if(dist > 1) { log("The Church is beyond your reach."); return; }
    if(state.ap < 1) { log("Not enough AP!"); SoundSystem.playBuzzer(); return; }
    state.ap -= 1; const damage = state.str + Math.floor(state.army/4); churchOnHex.hp -= damage;
    log(`You strike the Church for <span style="color:#fb923c;">${damage} damage</span>!`);
    triggerCameraShake(0.2); createDamagePopup(`-${damage}`, churchOnHex.mesh.position, "#ffffff");
    SoundSystem.playSlash();
    if(churchOnHex.hp <= 0){
      churchOnHex.mesh.visible = false;
      const rubble = createRubble(); worldContainer.add(rubble);
      place(rubble, churchOnHex.q, churchOnHex.r);
      rubbles.push(rubble);
      log("<span style='color:#fbbf24;'>The Church has been razed! A vengeful Priest emerges from the debris! (+50 Scars)</span>");
      sampleSpawn("Priest", q, r);
      gainScars(50);
    }
    updateUI(); return;
  }

  let allyOnHex = allies.find(a => a.hp > 0 && a.q === q && a.r === r);
  if(allyOnHex) {
    log(`This is a friendly ${allyOnHex.type}.`);
    return; // Prevent attacking allies
  }

  let prisonOnHex = prisons.find(p => p.hp > 0 && p.q === q && p.r === r);
  if(prisonOnHex) {
    if(dist > 1) { log("The prison cart is beyond your reach."); return; }
    if(state.ap < 1) { log("Not enough AP!"); SoundSystem.playBuzzer(); return; }
    state.ap -= 1; const damage = state.str + Math.floor(state.army/4); prisonOnHex.hp -= damage;
    log(`You strike the prison cart for <span style="color:#fb923c;">${damage} damage</span>!`);
    triggerCameraShake(0.2); createDamagePopup(`-${damage}`, prisonOnHex.mesh.position, "#ffffff");
    SoundSystem.playSlash();
    if(prisonOnHex.hp <= 0){
      prisonOnHex.mesh.visible = false;
      const rubble = createRubble(); worldContainer.add(rubble);
      place(rubble, prisonOnHex.q, prisonOnHex.r);
      rubbles.push(rubble);
      log("<span style='color:#fbbf24;'>The prison cart has been smashed open!</span>");
      if (Math.random() < 0.4) { // 40% chance to spawn prisoners
        const spawnCount = Math.random() < 0.5 ? 1 : 2;
        log(`<span style='color:#fca5a5;'>${spawnCount} desperate prisoner(s) emerge from the wreckage!</span>`);
        for (let i = 0; i < spawnCount; i++) {
          const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].sort(() => Math.random() - 0.5);
          for (const d of dirs) {
            const nq = q + d[0], nr = r + d[1];
            const occupied = enemies.some(e => e.hp > 0 && e.q === nq && e.r === nr);
            if (!occupied) { spawnAlly("Freed Prisoner", nq, nr, q, r); break; }
          }
        }
      }
    }
    updateUI(); return;
  }

  // Detect map-edge travel: click on edge water, or click in a direction that has an edge neighbor
  let travelDir = null;
  const clickDist = HexUtils.dist(0, 0, q, r);
  const isMapEdge = clickDist > R * 0.4 || Math.abs(q) >= R - 2 || Math.abs(r) >= R - 2 || Math.abs(-q-r) >= R - 2;
  // Check 1: clicked directly on a non-passable edge tile (any direction from hero position)
  if (!isPassableBiome(hit.object.userData.biomeKey) && isMapEdge) {
    const dq = q - state.q;
    const dr = r - state.r;
    if (Math.abs(dq) <= 5 && Math.abs(dr) <= 5 && Math.abs(-dq-dr) <= 5) {
      travelDir = { dq, dr };
    }
  }
  // Check 2: click direction matches a known edge-neighbor direction (hero is already at edge)
  if (!travelDir && availableTravelDirs.length > 0) {
    const dq = q - state.q;
    const dr = r - state.r;
    const hexDirs = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
    let best = null, bestDot = -Infinity;
    for (const [hdq, hdr] of hexDirs) {
      const dot = dq*hdq + dr*hdr + (dq+dr)*(hdq+hdr);
      if (dot > bestDot) { bestDot = dot; best = [hdq, hdr]; }
    }
    if (best && availableTravelDirs.some(d => d.dq === best[0] && d.dr === best[1])) {
      travelDir = { dq: best[0], dr: best[1] };
    }
  }
  if (travelDir) {
    const currentSnap = mapCache.get(currentMapKey);
    let targetKey = currentSnap ? currentSnap.getConnected(travelDir.dq, travelDir.dr) : null;
    if (!targetKey) {
      const nx = currentMapCoords.x + travelDir.dq;
      const ny = currentMapCoords.y + travelDir.dr;
      targetKey = mapKey(currentMapCoords.chapter, nx, ny);
    }
    promptTravel(targetKey, travelDir.dq, travelDir.dr);
    return;
  }

  if (dist !== 1) { log("Invalid pathing."); return; }
  if (state.ap < 1) { log("Insufficient Action Points."); SoundSystem.playBuzzer(); return; }
  
  state.ap -= 1;
  hero.userData.startPos = hero.position.clone();
  const pTarget = HexUtils.toWorld(q, r);
  hero.userData.targetPos = new THREE.Vector3(pTarget.x, hit.object.position.y, pTarget.z);
  hero.userData.moveT = 0;
  hero.userData.isMoving = true;
  state.q = q; state.r = r;

  enclaves.forEach(enc => {
    if(enc.q === q && enc.r === r){
      if(state.shillings >= 25){
        state.shillings -= 25; state.army += 4;
        log("<span style='color:#60a5fa;'>Conscripted 4 fighters from enclave ruins. (-25 shillings)</span>");
        SoundSystem.playLevelUp();
      } else {
        log("<span style='color:#94a3b8;'>Enclave drafting requires 25 shillings.</span>");
      }
    }
  });
  headstones.forEach(h => {
    if(!h.looted && h.q === q && h.r === r){
      h.looted = true;
      state.shillings += 22;
      log(`<span style='color:#fbbf24;'>Grave scavenged! +22 shillings looted.</span>`);
      tryLoot(0.5);
      SoundSystem.playLevelUp();
    }
  });
  corpses.forEach(c => {
    if(!c.looted && c.q === q && c.r === r){
      c.looted = true;
      state.shillings += 22;
      log(`<span style='color:#6b7280;'>Corpse scavenged! +22 shillings looted.</span>`);
      tryLoot(0.3);
      SoundSystem.playLevelUp();
      if (Math.random() < 0.15) {
        const occupied = enemies.some(e => e.hp > 0 && e.q === c.q && e.r === c.r) || (state.q === c.q && state.r === c.r);
        if (!occupied && HexUtils.isValid(c.q, c.r)) {
          const zMesh = createZombie();
          worldContainer.add(zMesh);
          place(zMesh, c.q, c.r);
          enemies.push({
            type: "Zombie", q: c.q, r: c.r,
            hp: 20, maxHp: 20, atk: 7, range: 1,
            mesh: zMesh, faction: 'undead', maxAp: 2, aggroRange: 6
          });
          log(`<span style='color:#6b7280;'>A Zombie erupts from the corpse!</span>`);
        }
      }
    }
  });
  const portalHere = portals.find(p => p.q === state.q && p.r === state.r && p.targetChapter);
  if (portalHere) {
    teleportViaPortal(portalHere.targetChapter);
    updateUI();
    checkDeath();
    return;
  }
  updateUI();
  checkDeath();
});

function applyDynamicColors(key) {
  const rgb = activeColors[key], hex = rgbToHex(rgb), threeColor = rgbToThreeColor(rgb);

  if (key === "grass") { biomeMaterials.BUSH_TWIST.color.copy(threeColor); biomeMaterials.BUSH_TWIST.needsUpdate = true; }
  else if (key === "silt") { biomeMaterials.SILT.color.copy(threeColor); biomeMaterials.SILT.needsUpdate = true; }
  else if (key === "deadScrub") { biomeMaterials.DEAD_SCRUB.color.copy(threeColor); biomeMaterials.DEAD_SCRUB.needsUpdate = true; }
  else if (key === "crag") { biomeMaterials.CRAG.color.copy(threeColor); biomeMaterials.CRAG.needsUpdate = true; }
  else if (key === "forestHaven") { biomeMaterials.FOREST_HAVEN.color.copy(threeColor); biomeMaterials.FOREST_HAVEN.needsUpdate = true; }
  else if (key === "deepWater") { biomeMaterials.DEEP_WATER.color.copy(threeColor); biomeMaterials.DEEP_WATER.needsUpdate = true; }
  else if (key === "shallowWater") { /* No longer needed as it's tied to river */ }
  else if (key === "river") { biomeMaterials.RIVER.color.copy(threeColor); biomeMaterials.RIVER.needsUpdate = true; }
  else if (key === "house") { biomeMaterials.HOUSE.color.copy(threeColor); biomeMaterials.HOUSE.needsUpdate = true; }
  else if (key === "dirt") { biomeMaterials.DIRT.color.copy(threeColor); biomeMaterials.DIRT.needsUpdate = true; }
  else if (key === "lake") { biomeMaterials.LAKE.color.copy(threeColor); biomeMaterials.LAKE.needsUpdate = true; }
  else if (key === "gold") { brightGoldMat.color.copy(threeColor); brightGoldMat.needsUpdate = true; }
  else if (key === "crimson") { royalCrimsonMat.color.copy(threeColor); royalCrimsonMat.needsUpdate = true; }
  // When river color changes, update shallow water and lake too
  if (key === "river") {
    biomeMaterials.SHALLOW_WATER.color.copy(threeColor); biomeMaterials.SHALLOW_WATER.needsUpdate = true;
    biomeMaterials.LAKE.color.copy(threeColor); biomeMaterials.LAKE.needsUpdate = true;
  }
  if (key === "silt") {
    biomeMaterials.FARM.color.copy(threeColor); biomeMaterials.FARM.needsUpdate = true;
    biomeMaterials.FIELD.color.copy(threeColor); biomeMaterials.FIELD.needsUpdate = true;
  }
  else if (key === "wretch") { wretchCarapaceMat.color.copy(threeColor); wretchCarapaceMat.needsUpdate = true; }
  else if (key === "husk") { huskRobeMat.color.copy(threeColor); huskRobeMat.needsUpdate = true; }
  else if (key === "abomination") { abomBodyMat.color.copy(threeColor); abomBodyMat.needsUpdate = true; }
  else if (key === "uiBg") { document.documentElement.style.setProperty('--color-bg', hex); scene.background.copy(threeColor); }
  else if (key === "uiAccent") { 
    document.documentElement.style.setProperty('--color-accent', hex);

  }
}

Object.keys(activeColors).forEach(applyDynamicColors);

const shakeOffset = new THREE.Vector3();
renderer.setAnimationLoop(() => {
  const now = Date.now();
  const delta = clock.getDelta();
  const frameAdjust = delta * 60; // Normalize to 60fps base

  if (hero && hero.userData.isSpawning) {
    hero.position.y = THREE.MathUtils.lerp(hero.position.y, hero.userData.targetY, 0.12);
    if (Math.abs(hero.position.y - hero.userData.targetY) < 0.05) {
      hero.position.y = hero.userData.targetY;
      hero.userData.isSpawning = false;
      triggerCameraShake(0.2);
      SoundSystem.playDamage();
      checkEdgeNeighbors();
    }
  }

  if (hero && hero.userData.isMoving) {
    hero.userData.moveT += 0.08 * frameAdjust;
    const t = Math.min(hero.userData.moveT, 1);
    
    // Parabolic Arc logic
    const jumpHeight = 2.5;
    hero.position.x = THREE.MathUtils.lerp(hero.userData.startPos.x, hero.userData.targetPos.x, t);
    hero.position.z = THREE.MathUtils.lerp(hero.userData.startPos.z, hero.userData.targetPos.z, t);
    const baseHeight = THREE.MathUtils.lerp(hero.userData.startPos.y, hero.userData.targetPos.y, t);
    hero.position.y = baseHeight + Math.sin(t * Math.PI) * jumpHeight;

    if (t >= 1) {
      hero.userData.isMoving = false;
      hero.position.copy(hero.userData.targetPos);
      triggerCameraShake(0.2);
      SoundSystem.playDamage();
      checkEdgeNeighbors();
      if (availableTravelDirs.length > 0) {
        const dir = availableTravelDirs[0];
        const currentSnap = mapCache.get(currentMapKey);
        let targetKey = currentSnap ? currentSnap.getConnected(dir.dq, dir.dr) : null;
        if (!targetKey) {
          targetKey = mapKey(currentMapCoords.chapter, currentMapCoords.x + dir.dq, currentMapCoords.y + dir.dr);
        }
        promptTravel(targetKey, dir.dq, dir.dr);
      }
    }
  }

  enemies.forEach(e => {
    if (e.hp > 0 && e.mesh && e.mesh.userData.isMoving) {
      e.mesh.userData.moveT += 0.08 * frameAdjust;
      const t = Math.min(e.mesh.userData.moveT, 1);
      const jumpHeight = 2.0;
      e.mesh.position.x = THREE.MathUtils.lerp(e.mesh.userData.startPos.x, e.mesh.userData.targetPos.x, t);
      e.mesh.position.z = THREE.MathUtils.lerp(e.mesh.userData.startPos.z, e.mesh.userData.targetPos.z, t);
      const bH = THREE.MathUtils.lerp(e.mesh.userData.startPos.y, e.mesh.userData.targetPos.y, t);
      e.mesh.position.y = bH + Math.sin(t * Math.PI) * jumpHeight;
      if (t >= 1) {
        e.mesh.userData.isMoving = false;
        e.mesh.position.copy(e.mesh.userData.targetPos);
        triggerCameraShake(0.1);
      }
    }
  });

  allies.forEach(a => {
    if (a.hp > 0 && a.mesh && a.mesh.userData.isMoving) {
      a.mesh.userData.moveT += 0.08 * frameAdjust;
      const t = Math.min(a.mesh.userData.moveT, 1);
      const jumpHeight = 1.5;
      a.mesh.position.x = THREE.MathUtils.lerp(a.mesh.userData.startPos.x, a.mesh.userData.targetPos.x, t);
      a.mesh.position.z = THREE.MathUtils.lerp(a.mesh.userData.startPos.z, a.mesh.userData.targetPos.z, t);
      const bH = THREE.MathUtils.lerp(a.mesh.userData.startPos.y, a.mesh.userData.targetPos.y, t);
      a.mesh.position.y = bH + Math.sin(t * Math.PI) * jumpHeight;
      if (t >= 1) {
        a.mesh.userData.isMoving = false;
        a.mesh.position.copy(a.mesh.userData.targetPos);
        triggerCameraShake(0.1);
      }
    }
  });

  prisons.forEach(p => {
    if (p.mesh && p.mesh.userData.isMoving) {
      p.mesh.userData.moveT += 0.08 * frameAdjust;
      const t = Math.min(p.mesh.userData.moveT, 1);
      const jumpHeight = 1.0;
      p.mesh.position.x = THREE.MathUtils.lerp(p.mesh.userData.startPos.x, p.mesh.userData.targetPos.x, t);
      p.mesh.position.z = THREE.MathUtils.lerp(p.mesh.userData.startPos.z, p.mesh.userData.targetPos.z, t);
      const bH = THREE.MathUtils.lerp(p.mesh.userData.startPos.y, p.mesh.userData.targetPos.y, t);
      p.mesh.position.y = bH + Math.sin(t * Math.PI) * jumpHeight;
      if (t >= 1) {
        p.mesh.userData.isMoving = false;
        p.mesh.position.copy(p.mesh.userData.targetPos);
      }
    }
  });

  if (boss && boss.hp > 0) {
    if (boss._light) boss._light.intensity = 4 + Math.sin(now * 0.004) * 2.5;
    boss.mesh.rotation.y += 0.008;
  }

  shakeOffset.set(0, 0, 0);
  if (shakeTime > 0) {
    shakeTime--;
    const s = shakeIntensity * (shakeTime / 12);
    shakeOffset.set((Math.random() - 0.5) * s, (Math.random() - 0.5) * s * 0.5, (Math.random() - 0.5) * s);
  }

  camera.position.copy(hero.position).add(baseCamPos).add(shakeOffset);
  camera.lookAt(hero.position);

  for (let i = activeFx.length - 1; i >= 0; i--) {
    if (activeFx[i].tick()) { 
      scene.remove(activeFx[i].mesh);
      if(activeFx[i].mesh.geometry && activeFx[i].mesh.geometry !== smokeGeo) activeFx[i].mesh.geometry.dispose();
      // Crucial: dispose cloned materials
      if(activeFx[i].mesh.material) activeFx[i].mesh.material.dispose();
      activeFx.splice(i, 1); 
    }
  }
  if (weatherSystem) {
    weatherSystem.update(frameAdjust);
  }

  renderer.render(scene, camera);

  if (gameStarted && now % 150 < 16) {
    rubbles.forEach(r => { if(Math.random() < 0.3) spawnSmokePuff(r.position); });
  }
});

// Automatically trigger the game start on load
const autoStartGame = () => {
  const startBtn = document.getElementById("start-game-btn");
  if (startBtn) {
    startBtn.click();
  }
};

if (document.readyState === "complete" || document.readyState === "interactive") {
  autoStartGame();
} else {
  window.addEventListener("DOMContentLoaded", autoStartGame);
}

// Resume audio context on first user gesture
const resumeAudio = () => {
  if (SoundSystem.ctx && SoundSystem.ctx.state === 'suspended') {
    SoundSystem.ctx.resume();
  }
  window.removeEventListener('pointerdown', resumeAudio);
  window.removeEventListener('keydown', resumeAudio);
};
window.addEventListener('pointerdown', resumeAudio);
window.addEventListener('keydown', resumeAudio);

</script>
